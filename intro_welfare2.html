<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사회복지학개론 예상문제</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --primary: #1a5276;
    --primary-light: #2e86c1;
    --accent: #e74c3c;
    --accent2: #f39c12;
    --bg: #f0f4f8;
    --card: #ffffff;
    --sidebar: #1a3a5c;
    --sidebar-text: #cfe2f3;
    --correct: #1e8449;
    --wrong: #c0392b;
    --bookmark: #e67e22;
    --border: #d5e8f0;
    --text: #1a252f;
    --muted: #7f8c8d;
    --header-h: 56px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  #header {
    background: var(--primary);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: var(--header-h);
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    z-index: 100;
  }
  #header .title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  #header .title span { font-weight: 300; font-size: 14px; margin-left: 8px; opacity: 0.8; }
  #header .right-info { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  #header .right-info .tag { background: rgba(255,255,255,0.15); border-radius: 4px; padding: 3px 9px; font-size: 12px; }

  /* 헤더 우상단 채점/처음으로 버튼 */
  .header-action-btn {
    padding: 6px 13px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    transition: opacity .15s;
    display: none;
  }
  .header-action-btn:hover { opacity: .85; }
  #btn-header-grade { background: #e74c3c; color: #fff; }
  #btn-header-retry { background: #e67e22; color: #fff; }
  #btn-header-home  { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); }

  /* ── TAB BAR ── */
  #tabbar {
    background: #eaf2f8;
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: flex-end;
    padding: 0 20px;
    gap: 4px;
    flex-shrink: 0;
  }
  .tab-btn {
    padding: 8px 20px;
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    background: #dce9f5;
    color: var(--primary);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    transition: background .15s;
  }
  .tab-btn.active { background: var(--card); color: var(--primary); font-weight: 700; }

  /* ── BODY LAYOUT ── */
  #body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── MAIN AREA ── */
  #main {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    position: relative;
  }

  /* ── START SCREEN ── */
  #start-screen {
    max-width: 560px;
    margin: 60px auto;
    background: var(--card);
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    padding: 48px 40px;
    text-align: center;
  }
  #start-screen h2 { font-size: 22px; color: var(--primary); margin-bottom: 8px; }
  #start-screen p { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
  .start-options { display: flex; flex-direction: column; gap: 14px; }
  .start-btn {
    padding: 18px 24px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: #f7fbff;
    cursor: pointer;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    color: var(--primary);
    transition: all .2s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .start-btn:hover { border-color: var(--primary-light); background: #eaf3fb; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.08); }
  .start-btn .icon { font-size: 26px; }
  .start-btn small { display: block; font-size: 12px; font-weight: 400; color: var(--muted); margin-top: 2px; }

  /* ── QUESTION CARD ── */
  .q-num { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.5px; }
  .q-text {
    font-size: 15px;
    line-height: 1.75;
    font-weight: 500;
    margin-bottom: 20px;
    color: var(--text);
  }
  .q-box {
    background: #f8fbfd;
    border-left: 3px solid var(--primary-light);
    border-radius: 4px;
    padding: 14px 16px;
    margin-bottom: 20px;
    font-size: 14px;
    line-height: 1.8;
    color: #1c2e3e;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    background: var(--card);
    transition: all .15s;
    font-size: 14px;
    line-height: 1.6;
  }
  .option:hover { border-color: var(--primary-light); background: #eaf3fb; }
  /* 사용자가 선택한 답: 파란 배경으로 문제번호와 명확히 구분 */
  .option.selected { border-color: var(--primary); background: #d6eaf8; color: var(--primary); font-weight: 600; }
  .option.correct { border-color: var(--correct); background: #eafaf1; color: var(--correct); }
  .option.wrong { border-color: var(--wrong); background: #fdedec; color: var(--wrong); }
  .option.show-correct { border-color: var(--correct); background: #eafaf1; color: var(--correct); }
  .option .num { font-weight: 700; min-width: 20px; }

  /* explanation */
  .explanation {
    display: none;
    margin-top: 16px;
    padding: 14px 16px;
    background: #fdfaf0;
    border-left: 3px solid var(--accent2);
    border-radius: 4px;
    font-size: 13.5px;
    line-height: 1.75;
    color: #5d4037;
  }
  .explanation.show { display: block; }
  .exp-label { font-weight: 700; color: var(--accent2); margin-bottom: 4px; }

  /* instant feedback banner */
  .feedback-banner {
    display: none;
    margin-top: 14px;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    text-align: center;
    letter-spacing: -0.2px;
  }
  .feedback-banner.show { display: block; }
  .feedback-banner.correct-fb { background: #eafaf1; color: var(--correct); border: 1.5px solid var(--correct); }
  .feedback-banner.wrong-fb   { background: #fdedec; color: var(--wrong);   border: 1.5px solid var(--wrong); }

  /* bottom nav */
  .q-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .nav-btn {
    padding: 9px 22px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--card);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--primary);
    transition: all .15s;
  }
  .nav-btn:hover { background: #eaf3fb; border-color: var(--primary-light); }
  .nav-btn:disabled { opacity: .35; cursor: not-allowed; }
  .nav-btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .nav-btn.primary:hover { background: var(--primary-light); }

  .bm-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 16px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--card);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    transition: all .15s;
  }
  .bm-btn.bookmarked { color: var(--bookmark); border-color: var(--bookmark); background: #fef5e7; }
  .bm-btn:hover { border-color: var(--bookmark); color: var(--bookmark); }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 220px;
    background: var(--sidebar);
    overflow-y: auto;
    flex-shrink: 0;
    padding: 16px 12px;
  }
  #sidebar h4 { color: var(--sidebar-text); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; opacity: 0.7; }
  #q-grid { display: flex; flex-direction: column; gap: 4px; }
  .q-dot {
    width: 100%;
    border-radius: 5px;
    background: rgba(255,255,255,0.1);
    display: flex;
    flex-direction: row;
    align-items: center;
    padding: 7px 10px;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: all .15s;
    border: 1.5px solid transparent;
  }
  .q-dot:hover { background: rgba(255,255,255,0.2); }
  .q-dot.current { border-color: #7fb3d3; color: #fff; background: rgba(255,255,255,0.15); }
  .q-dot.answered { background: rgba(255,255,255,0.15); color: #aed6f1; }
  .q-dot.bookmarked-dot { background: rgba(230,126,34,0.35); border-color: var(--bookmark); color: #f0a500; }
  .q-dot.correct-dot { background: rgba(30,132,73,0.4); color: #82e0aa; }
  .q-dot.wrong-dot { background: rgba(192,57,43,0.45); color: #f1948a; }

  .q-dot .dot-num {
    min-width: 22px;
    font-weight: 700;
    color: rgba(255,255,255,0.75);
    font-size: 11px;
  }
  /* 선택된 답 표시: 흰 배경 뱃지 - 문제번호와 배경 명확히 구분 */
  .q-dot .dot-ans {
    font-size: 12px;
    margin-left: 4px;
    background: rgba(255,255,255,0.88);
    color: var(--sidebar);
    border-radius: 3px;
    padding: 1px 5px;
    font-weight: 700;
  }

  .sidebar-score {
    margin-top: 18px;
    padding: 12px;
    background: rgba(255,255,255,0.07);
    border-radius: 8px;
    color: var(--sidebar-text);
    font-size: 12px;
    line-height: 1.8;
  }
  .sidebar-score strong { font-size: 20px; color: #fff; }

  .score-actions { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .score-actions button {
    padding: 8px 10px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
  }
  .btn-grade { background: var(--accent); color: #fff; }
  .btn-retry { background: var(--bookmark); color: #fff; }
  .btn-home { background: rgba(255,255,255,0.15); color: #fff; }

  /* result screen */
  #result-screen {
    max-width: 580px;
    margin: 40px auto;
    background: var(--card);
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    padding: 40px 36px;
    text-align: center;
  }
  #result-screen h2 { font-size: 24px; color: var(--primary); margin-bottom: 6px; }
  .score-big { font-size: 64px; font-weight: 700; color: var(--primary); line-height: 1; margin: 20px 0 8px; }
  .score-sub { font-size: 15px; color: var(--muted); margin-bottom: 24px; }
  .result-grid { display: flex; gap: 16px; justify-content: center; margin-bottom: 28px; }
  .result-stat { flex: 1; padding: 16px; border-radius: 10px; }
  .result-stat.c { background: #eafaf1; color: var(--correct); }
  .result-stat.w { background: #fdedec; color: var(--wrong); }
  .result-stat.b { background: #fef5e7; color: var(--bookmark); }
  .result-stat .label { font-size: 12px; margin-bottom: 4px; }
  .result-stat .val { font-size: 28px; font-weight: 700; }
  .result-actions { display: flex; flex-direction: column; gap: 10px; }
  .result-actions button {
    padding: 14px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    transition: opacity .15s;
  }
  .result-actions button:hover { opacity: .85; }
  .btn-a { background: var(--accent); color: #fff; }
  .btn-b { background: var(--bookmark); color: #fff; }
  .btn-c { background: var(--primary); color: #fff; }
  .btn-d { background: #ecf0f1; color: var(--text); }

  .hidden { display: none !important; }

  /* ── EXPAND ALL VIEW ── */
  #expand-all-screen { display: none; padding: 24px 28px; }
  #expand-all-screen.active { display: block; }
  .all-q-card {
    background: var(--card);
    border-radius: 10px;
    border: 1.5px solid var(--border);
    padding: 20px 22px;
    margin-bottom: 18px;
  }
  .all-q-card .q-num { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 700; }
  .all-q-card .q-text { font-size: 14px; font-weight: 600; margin-bottom: 14px; line-height: 1.7; }
  .all-q-card .options { gap: 7px; }
  .all-q-card .option { padding: 9px 13px; font-size: 13px; }

  #timer-box { display: none; }

  .timer-danger { color: #ff6b6b !important; animation: blink .8s step-end infinite; }
  @keyframes blink { 50% { opacity: .4; } }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: #b0c4d8; border-radius: 3px; }
</style>
</head>
<body>

<div id="header">
  <div class="title">사회복지학개론 <span>예상문제</span></div>
  <div class="right-info">
    <span class="tag" id="mode-tag">모드 선택 중</span>
    <span id="progress-text" style="font-size:13px;opacity:.85"></span>
    <div id="timer-box" style="display:none;align-items:center;gap:8px;background:rgba(255,255,255,0.12);border-radius:6px;padding:4px 12px;">
      <span style="font-size:11px;opacity:.8;line-height:1.3;">남은<br>시간</span>
      <span id="timer-display" style="font-size:20px;font-weight:700;letter-spacing:1px;font-variant-numeric:tabular-nums;">20:00</span>
    </div>
    <button id="btn-header-grade" class="header-action-btn" onclick="gradeQuiz()">📊 채점하기</button>
    <button id="btn-header-retry" class="header-action-btn" onclick="retryQuiz()">🔄 다시하기</button>
    <button id="btn-header-home"  class="header-action-btn" onclick="showStart()">🏠 처음으로</button>
    <button id="expand-btn" onclick="toggleExpandView()" title="전체보기/한문제씩" style="display:none;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.3);border-radius:6px;color:#fff;width:38px;height:38px;font-size:20px;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;">⇅</button>
  </div>
</div>

<div id="tabbar" class="hidden"></div>

<div id="body">
  <div id="main">
    <!-- Start Screen -->
    <div id="start-screen">
      <h2>📚 사회복지학개론</h2>
      <p>1강~15강 예상문제 · 총 90문항</p>
      <div class="start-options">
        <button class="start-btn" onclick="startQuiz('random')">
          <span class="icon">🎲</span>
          <div>
            랜덤 30문제
            <small>전체 문제 중 무작위로 30문항 출제 · ⏱ 20분 제한</small>
          </div>
        </button>
        <button class="start-btn" onclick="startQuiz('all')">
          <span class="icon">📋</span>
          <div>
            전체 문제 풀기
            <small>1강부터 15강까지 전체 90문항 · 시간 제한 없음</small>
          </div>
        </button>
        <button class="start-btn" onclick="startQuiz('bookmark')">
          <span class="icon">🔖</span>
          <div>
            책갈피 문제만 풀기
            <small>저장된 책갈피 문제만 출제</small>
          </div>
        </button>
        <button class="start-btn" onclick="startQuiz('wrong')">
          <span class="icon">❌</span>
          <div>
            틀린 문제만 다시 풀기
            <small>이전 채점에서 틀린 문제만 출제</small>
          </div>
        </button>
      </div>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="hidden">
      <div class="q-num" id="q-num-label"></div>
      <div class="q-text" id="q-text"></div>
      <div class="q-box hidden" id="q-box"></div>
      <div class="options" id="options"></div>
      <div class="feedback-banner" id="feedback-banner"></div>
      <div class="explanation" id="explanation">
        <div class="exp-label">💡 해설</div>
        <div id="exp-text"></div>
      </div>
      <div class="q-nav">
        <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">◀ 이전</button>
        <div style="display:flex;gap:10px;">
          <button class="bm-btn" id="bm-btn" onclick="toggleBookmark()">🔖 책갈피</button>
        </div>
        <button class="nav-btn primary" id="btn-next" onclick="navigate(1)">다음 ▶</button>
      </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="hidden">
      <h2>🎉 채점 결과</h2>
      <div class="score-big" id="res-score"></div>
      <div class="score-sub" id="res-sub"></div>
      <div class="result-grid">
        <div class="result-stat c"><div class="label">✅ 정답</div><div class="val" id="res-c"></div></div>
        <div class="result-stat w"><div class="label">❌ 오답</div><div class="val" id="res-w"></div></div>
        <div class="result-stat b"><div class="label">🔖 책갈피</div><div class="val" id="res-b"></div></div>
      </div>
      <div class="result-actions">
        <button class="btn-a" onclick="startQuiz('wrong')">❌ 틀린 문제만 다시 풀기</button>
        <button class="btn-b" onclick="startQuiz('bookmark')">🔖 책갈피 문제 풀기</button>
        <button class="btn-c" onclick="startQuiz('all')">📋 전체 문제 다시 풀기</button>
        <button class="btn-d" onclick="showStart()">🏠 처음으로</button>
      </div>
    </div>

    <!-- Expand All Screen -->
    <div id="expand-all-screen"></div>
  </div>

  <div id="sidebar" class="hidden">
    <h4>문제 현황</h4>
    <div id="q-grid"></div>
  </div>
</div>

<script>
// ==============================
// QUESTION DATA (90 questions)
// ==============================
const ALL_QUESTIONS = [
  // 1강
  {lec:1, q:"참치 캔 사고를 대하는 태도 중, 문제의 원인을 구조나 권력이 아닌 자신보다 약한 주변 사람들에게 돌리는 현상을 무엇이라 하는가?", opts:["수평적 폭력","수직적 폭력","제도적 폭력","상징적 폭력"], ans:0, exp:"프레이리가 제안한 개념으로, 문제의 근본 원인인 구조와 싸우기보다 자신과 비슷하거나 약한 처지의 사람(가족, 동료 등)을 비난하는 태도를 의미한다."},
  {lec:1, q:"'사회적 위험'에 대한 설명으로 가장 적절한 것은?", opts:["개인의 선천적인 성격이나 덜렁댐으로 인해 발생하는 위험","전적으로 가족의 돌봄 소홀로 인해 발생하는 위험","사회적 책무성을 가지며, 국가의 규제나 정책으로 예방 가능한 위험","운명적으로 결정되어 있어 인간이 통제할 수 없는 위험"], ans:2, exp:"사회적 위험은 개인의 책임을 넘어 사회적 합의와 국가의 안전 기준 강화를 통해 충분히 막을 수 있는 위험을 말한다."},
  {lec:1, q:"우리가 흔히 알고 있는 '장애를 극복한 위인'으로서의 헬렌 켈러 이미지가 만들어진 배경과 가장 관련이 깊은 이론은?", opts:["상징적 상호작용론","푸코의 지식권력론","구조기능주의","사회계약론"], ans:1, exp:"푸코는 지식의 이면에 권력이 있으며, 권력이 자신들에게 유리한 지식을 유포하여 특정한 상식(이미지)을 만든다고 주장했다."},
  {lec:1, q:"다음 중 '손상을 장애로 만드는 것'에 대한 사회적 관점의 질문으로 옳은 것은?", opts:["당신의 신체적 결함이 무엇입니까?","당신은 왜 남들처럼 걷지 못합니까?","사회의 어떤 디자인 결함이 당신의 이동을 방해합니까?","당신의 건강 상태가 여행을 어렵게 만듭니까?"], ans:2, exp:"사회적 관점(올리버 등)은 문제의 원인을 개인의 신체적 손상이 아닌, 그 손상을 수용하지 못하는 사회의 물리적·태도적 장벽에서 찾는다."},
  {lec:1, q:"마서스 비니어드 섬의 사례가 우리에게 주는 시사점은 무엇인가?", opts:["장애는 의학적으로 완치되어야 할 질병이다.","환경(수어 공용화)에 따라 손상이 장애가 되지 않을 수 있다.","장애인은 반드시 비장애인의 도움을 받아야 생존할 수 있다.","유전적인 결함은 사회적으로 해결할 수 없는 문제이다."], ans:1, exp:"모두가 수어를 하는 환경에서는 청각 손상이 소통의 장벽(장애)이 되지 않는다는 점을 통해 장애가 사회적으로 구성됨을 보여준다."},
  {lec:1, q:"벼룩 실험을 통해 설명하고자 하는 '학습된 무기력'의 본질은 무엇인가?", opts:["벼룩의 생물학적 한계로 인해 높이 뛰지 못하는 것","환경에 적응하여 스스로 자신의 가능성을 제한하게 되는 것","누군가 강제로 다리를 묶어 놓아 움직이지 못하는 것","벼룩의 지능이 낮아 뚜껑이 열린 것을 인지하지 못하는 것"], ans:1, exp:"처음에는 통제에 의해 제한받지만, 시간이 지나면 통제가 사라져도 스스로 그 틀에 맞춰 더 이상 시도하지 않게 되는 상태를 의미한다."},

  // 2강
  {lec:2, q:"중세 봉건제 사회의 특징을 설명한 것으로 가장 적절한 것은?", opts:["토지는 누구나 자유롭게 사고팔 수 있는 매매 가능한 상품이었다.","시장의 '보이지 않는 손'에 의해 생산과 소비의 질서가 유지되었다.","권력과 부의 원천인 토지의 실질적 소유주는 신(하나님)으로 간주되었다.","개인이 이윤을 추구하고 재산을 축적하는 행위가 사회적으로 적극 권장되었다."], ans:2, exp:"중세 봉건제 시대에는 태양 아래 모든 토지와 만물의 실질적 소유자가 신이라고 믿었다. 교황은 신의 대리인으로서 막대한 토지를 점유하였고, 이익을 추구하는 관념 자체를 금기시하였다."},
  {lec:2, q:"데카르트의 명제 '나는 생각한다, 고로 존재한다'가 근대 사회에 미친 사상적 영향으로 가장 알맞은 것은?", opts:["신 중심의 사고를 한층 강화하여 교황의 권위를 공고히 하였다.","진리와 존재의 판단 기준을 신에서 '인간의 이성'으로 이동시켰다.","만유인력의 법칙을 사회 현상에 적용하여 자연신론을 확립하였다.","인간의 이기심이 곧 국부의 원천이라는 자본주의 논리를 완성하였다."], ans:1, exp:"데카르트의 명제는 생각의 주체가 '신(God)'에서 '나(I, 인간)'로 전환되는 근대의 획기적인 변화를 상징한다."},
  {lec:2, q:"존 로크가 <통치론>에서 주장한 '사유재산'의 형성 원리로 올바른 것은?", opts:["국가가 제정한 법률에 의해 각 개인에게 균등하게 할당될 때 재산이 된다.","교황이나 군주에게 바친 충성과 헌신의 대가로 하사받은 것만이 재산이다.","만인의 공유물인 자연의 산물에 개인의 '노동'을 섞을 때 비로소 사유재산이 된다.","타인과의 합리적인 거래와 시장에서의 화폐 교환을 통해서만 재산이 창출된다."], ans:2, exp:"존 로크는 유일하게 온전한 자신의 것인 '자신의 몸(노동)'을 자연 상태의 대상에 가미할 때 그것이 정당한 개인의 소유, 즉 사유재산이 된다고 주장하였다."},
  {lec:2, q:"애덤 스미스의 경제 사상과 <국부론>의 내용으로 가장 알맞은 것은?", opts:["개인이 철저히 이타적으로 행동하고 양보할 때만 국가의 부가 증가한다.","시장 참여자들이 이기심을 바탕으로 경쟁할 때 '보이지 않는 손'에 의해 사회 전체의 이익이 커진다.","국가가 생산과 분업의 과정을 엄격하게 통제해야만 원활한 부의 축적이 가능하다.","이윤 추구를 비도덕적으로 보았던 중세의 관점을 계승하여 상인들의 폭리를 비판하였다."], ans:1, exp:"애덤 스미스는 각자가 이익을 추구할 때 시장이라는 '신의 보이지 않는 손'을 통해 가격이 합리적으로 조정되고 국가 전체가 부유해진다고 주장하였다."},
  {lec:2, q:"'죄수 딜레마 게임'이 애덤 스미스의 주장에 던지는 반론적 시사점은?", opts:["보이지 않는 손은 범죄자들에게도 똑같이 적용되어 시장의 질서를 유지한다.","타인을 돕고자 하는 이타심이 오히려 자신에게 해로운 결과를 가져올 수 있음을 증명한다.","각 개인이 합리적이고 이기적인 선택을 하더라도 상호 불신으로 인해 전체적으로는 최악의 결과를 초래할 수 있다.","자유로운 경쟁 시장에서는 이기심이 언제나 가장 효율적이고 도덕적인 결과를 보장한다."], ans:2, exp:"죄수 딜레마는 각자 합리적 판단을 내렸음에도 침묵했을 때보다 더 무거운 형벌을 받게 되는 최악의 결과를 보여준다. 이기심이 항상 사회를 잘 돌아가게 한다는 주장이 틀릴 수 있음을 입증한다."},
  {lec:2, q:"절대평가제에서 협력하던 학생들이 상대평가제로 바뀌자 이기적으로 변한 사례가 궁극적으로 말하고자 하는 바는?", opts:["인간의 본성은 원래 악하며 어떤 제도를 도입하든 이기심은 숨길 수 없다.","교육의 본질은 무한 경쟁을 통해 우수한 인재를 선발하는 데 있다.","인간의 태도와 성격은 고정된 것이 아니라, 처해 있는 상황이나 제도적 환경에 따라 다르게 형성된다.","절대평가 제도는 학생들의 학업 성취도를 떨어뜨리므로 엄격한 상대평가가 필수적이다."], ans:2, exp:"동일한 학생이라도 절대평가에서는 친구를 돕지만 상대평가에서는 경쟁자로 인식하는 것은 사회적 구조와 환경에 의해 그 본성과 태도가 구성된다는 점을 보여준다."},

  // 3강
  {lec:3, q:"울리히 벡의 '위험사회' 이론과 재난 불평등에 대한 설명으로 올바른 것은?", opts:["재난은 모든 계급에 동일한 피해를 주므로 계급 불평등을 일시적으로 해소한다.","위험은 하층에 축적되고, 부는 상층에 축적된다.","시장의 자율성에 맡기면 빈곤층의 피해가 가장 먼저 복구된다.","재난의 책임은 철저히 개인의 안전 불감증과 대비 부족에 있다."], ans:1, exp:"재난 자체는 누구에게나 똑같이 찾아오지만 그 피해는 철저히 계급적이다. 부유층은 재난 복구 과정에서도 이익을 얻어 부를 축적하지만 빈민층은 삶의 터전을 잃고 더 큰 위험을 떠안게 된다."},
  {lec:3, q:"강의에서 물고기가 계속 죽어가는 상황을 설명한 '어항의 비유'가 시사하는 바는?", opts:["물고기 개체의 선천적인 면역력 결핍이 가장 큰 원인이다.","물고기를 꺼내 집중적으로 치료하는 선별적 복지가 가장 효과적이다.","환경과 무관하게 물고기 스스로 자생력을 길러야 한다.","문제의 근본 원인은 개인이 아니라 어항의 크기와 수질이라는 사회적 구조에 있다."], ans:3, exp:"물고기가 병드는 근본 원인은 오염된 물과 좁은 어항(구조와 환경)이므로, 개별 물고기를 치료하는 데 그치지 않고 환경 자체를 바꾸어야 함을 시사한다."},
  {lec:3, q:"불평등과 비인간화를 막기 위해 국가가 개입하여 자본주의를 수정해야 한다고 주장하는 이념은?", opts:["자유주의","사회민주주의","사회주의","신자유주의"], ans:1, exp:"사회민주주의는 자본주의 체제를 전면 철폐하지는 않되, 과도한 경쟁과 불평등을 막기 위해 국가가 적극 개입하여 제도를 개선해야 한다고 주장한다."},
  {lec:3, q:"닉 부이치치나 헬렌 켈러의 장애 극복 사례를 무비판적으로 칭송할 때 발생할 수 있는 가장 큰 부작용은?", opts:["모든 시민이 자발적으로 기부에 참여하게 된다.","국가가 장애인 복지 예산을 과도하게 증액하여 재정 부담을 겪는다.","장애인들이 부당한 권력에 맞서 적극적으로 연대하게 된다.","구조적 문제는 은폐되고 가난이나 장애가 개인의 노력 부족 탓으로 전가된다."], ans:3, exp:"극단적인 역경 극복 사례를 표준으로 삼으면 다수의 약자들에게 기적을 강요하게 되며, 사회의 구조적 책임을 개인의 나태함으로 치환하는 억압적 폭력이 될 수 있다."},
  {lec:3, q:"모두가 수어를 사용하는 '마서스비니어드 섬'의 사례를 통해 도출할 수 있는 결론은?", opts:["섬의 고립된 환경이 유전적 질환을 급증시켰다.","사회가 환경을 맞추면 개인의 신체적 '손상'은 사회적 '장애'가 되지 않는다.","장애 극복을 위해서는 비장애인의 기준에 맞추는 철저한 재활 훈련이 필수적이다.","의료 기술의 발전만이 장애 문제를 해결할 수 있는 유일한 대안이다."], ans:1, exp:"신체의 결함(손상) 자체가 문제가 아니라 이를 수용하지 못하는 물리적·제도적 환경이 장애를 만든다. 수어라는 대안적 소통 환경이 갖춰지면 청각 손상은 더 이상 장애가 되지 않음을 보여준다."},
  {lec:3, q:"1942년 영국 <베버리지 보고서>에서 국가가 공적으로 막아야 한다고 지목한 '5대 거인(사회악)'에 포함되지 않는 것은?", opts:["나태(Idleness)","결핍(Want)","불평등(Inequality)","질병(Disease)"], ans:2, exp:"베버리지 보고서가 지목한 5대 거인은 결핍(소득 문제), 무지(교육 문제), 질병(의료 문제), 불결(주택 문제), 나태(고용 문제)이다. 불평등 자체는 5대 거인의 명칭에 명시적으로 포함되지 않았다."},

  // 4강
  {lec:4, q:"<나의 라임오렌지나무>의 제제와 신창원의 사례를 비교하며 도출할 수 있는 결론으로 올바른 것은?", opts:["불행을 극복하기 위해서는 훌륭한 이웃을 만나는 운이 가장 중요하다.","범죄나 빈곤의 원인은 전적으로 개인의 선천적인 악한 본성에 있다.","불행을 막기 위해서는 이웃의 자선보다 빈곤과 실업 등 근본적 원인을 해결하는 국가 제도(권리)가 필요하다.","무상교육과 실업급여는 개인을 나태하게 만들어 오히려 불행을 초래한다."], ans:2, exp:"제제와 신창원의 사례는 운 좋은 이웃과의 만남(자선)에 의존하는 것을 넘어, 빈곤과 실업이라는 구조적 원인을 사전에 방지하는 국가의 공적 개입(사회권 보장)이 필요함을 시사한다."},
  {lec:4, q:"'급진사회복지실천(Radical Social Work)'이 '전통적 사회복지실천'과 가장 크게 대비되는 점은?", opts:["개인의 인접 환경에 초점을 맞추어 적응 능력을 키우는 데 집중한다.","상처를 유발한 사회경제적 구조와 권력관계 자체를 변화시키려 한다.","클라이언트를 철저히 동정과 시혜의 대상으로 대한다.","자본주의 체제에 개인이 불만 없이 순응하도록 돕는 것을 최종 목표로 삼는다."], ans:1, exp:"전통적 실천이 개인을 인접 환경에 '적응'시켜 겉으로 드러난 상처를 치료하는 데 집중한다면, 급진적 실천은 상처의 근본 원인인 구조와 권력관계를 통제하고 변화시키는 데 초점을 둔다."},
  {lec:4, q:"마르크스가 자본주의의 불평등 구조를 설명하며 제시한 주장으로 올바른 것은?", opts:["노동자가 가난한 이유는 자본가의 개인적인 악한 성품 때문이다.","자본가의 이윤은 노동자가 생산한 잉여가치를 착취함으로써 발생한다.","자유 시장의 경쟁을 통해 부는 결국 모든 계급에 평등하게 분배된다.","생산수단의 사적 소유를 장려해야만 노동자의 임금이 지속적으로 상승한다."], ans:1, exp:"마르크스는 노동자가 생산한 가치 중 임금으로 받지 못하고 자본가에게 귀속되는 '잉여가치'를 착취로 보았으며, 이는 자본주의 시스템의 필연적 결과라고 설명했다."},
  {lec:4, q:"에스핑 안데르센이 제시한 '탈상품화(Decommodification)'의 개념을 가장 잘 설명한 것은?", opts:["국가의 모든 공공 서비스를 민간 시장에 매각하여 상업화하는 현상이다.","개인이 노동력을 팔지 않고도 국가로부터 교육, 의료 등 필수 서비스를 제공받아 삶을 유지할 수 있는 정도이다.","복지 혜택을 받기 위해 클라이언트가 반드시 노동 의무를 이행해야 하는 상태이다.","자본가들이 상품의 가격을 임의로 높여 노동자의 구매력을 떨어뜨리는 현상이다."], ans:1, exp:"탈상품화는 시민이 생존에 필수적인 재화와 서비스(의료, 교육, 주택 등)를 시장에서 돈을 주고 구매하지 않고 공적으로(권리로서) 제공받을 수 있는 수준을 의미한다."},
  {lec:4, q:"복지국가에서 '탈상품화' 수준과 '계층화(Stratification)' 수준의 일반적인 상관관계로 올바른 것은?", opts:["탈상품화 수준이 높아지면 계층화 수준도 함께 높아진다.","탈상품화 수준이 높아지면 계층화 수준은 낮아진다.","탈상품화와 계층화는 아무런 연관성이 없는 독립적 지표이다.","탈상품화 수준이 낮아질수록 사회의 평등이 완벽하게 실현된다."], ans:1, exp:"탈상품화가 고도화되어 누구나 필수적인 공공 서비스를 누리게 되면, 부자와 빈자 간의 격차나 신분적 불평등을 나타내는 '계층화'의 수준은 자연스럽게 낮아지게 된다."},
  {lec:4, q:"핀란드의 '소득 비례 범칙금' 제도가 보여주는 조세 정치와 복지국가의 원리로 가장 적절한 것은?", opts:["모든 사람에게 소득과 무관하게 동일한 액수를 걷는 인두세 원칙이다.","부유층의 세금 부담을 줄여 낙수효과를 노리는 경제 성장 원칙이다.","소득이 많은 사람이 더 많이 부담하여 사회적 형평성(조건의 평등)을 달성하려는 원칙이다.","법을 어긴 사람의 모든 복지 혜택을 영구히 박탈하는 징벌적 원칙이다."], ans:2, exp:"핀란드처럼 일당이 높은 부자에게 막대한 범칙금을 물리는 제도는, 소득과 능력에 비례하여 부담을 지우고 기울어진 운동장의 균형을 맞추려는 복지국가의 철학(조건의 평등)을 보여준다."},

  // 5강
  {lec:5, q:"자본주의 초기(산업혁명기)에 지배적이었던 빈곤관으로 가장 적절한 것은?", opts:["빈곤은 신이 내린 피할 수 없는 운명이므로 참고 견뎌야 한다.","빈곤은 개인의 게으름과 도덕적 결함으로 인해 발생한 죄악이다.","빈곤은 사회 구조적 모순으로 발생한 국가의 공적인 책임이다.","빈곤은 귀족들의 노블레스 오블리주를 통해 해결해야 할 명예로운 과제이다."], ans:1, exp:"자본주의 초기에는 빈곤을 개인의 의지 박약과 나태함의 결과로 보아 가난을 죄악시하고 개인의 책임을 강하게 묻는 자유주의적 관점이 지배적이었다."},
  {lec:5, q:"1601년 제정된 영국 엘리자베스 1세의 구빈법(빈민법)의 특징에 대한 설명으로 올바른 것은?", opts:["빈민에 대한 모든 지원을 민간 종교 단체로 완전히 이관하였다.","노동 능력이 있는 빈민에게는 무조건적인 현금 급여를 넉넉하게 지급하였다.","국가가 빈곤 문제에 개입한 최초의 법률이나, 실질적으로는 노동을 강제하고 처벌하는 성격이 강했다.","노동 능력이 없는 빈민이라도 부양할 가족이 있다면 국가가 전적으로 생계를 책임졌다."], ans:2, exp:"엘리자베스 구빈법은 국가 개입을 공식화했으나, 노동 가능한 자를 노동교화소로 보내 일을 시키고 가족 부양 책임을 우선시하는 등 구제보다는 빈민을 통제하고 처벌하는 성격이 짙었다."},
  {lec:5, q:"스핀햄랜드 제도가 결국 실패하고 훗날 '복지가 사람을 게으르게 만든다'는 편견을 낳게 된 가장 큰 이유는?", opts:["지주들이 임금을 삭감해도 구호금으로 보전된다는 점을 악용하여 임금을 삭감했고, 노동자들 역시 근로 의욕을 상실했기 때문이다.","제도의 혜택이 오직 도시의 공장 노동자들에게만 집중되어 농촌 경제가 완전히 붕괴되었기 때문이다.","구호금을 받은 노동자들이 대규모 폭동을 일으켜 지주 계급을 타도하려 했기 때문이다.","빈민 구호 지방세를 전적으로 왕실 재정에서만 부담하여 국가 재정이 심각하게 파탄 났기 때문이다."], ans:0, exp:"지주들은 노동자 임금을 고의로 깎아 구호금에 의존하게 만들었고, 노동자 입장에서도 일하든 안 하든 동일한 최저 소득만 받게 되어 노동 의욕을 잃는 심각한 도덕적 해이가 발생했다."},
  {lec:5, q:"1834년 신빈민법의 핵심 원칙 중 하나로, 구빈원에서 제공하는 구호의 수준이 가장 낮은 계층의 자립 노동자의 생활 수준보다 무조건 열악해야 한다는 원칙은?", opts:["원외 구호 금지의 원칙","소득 비례의 원칙","국가 최소한의 원칙","열등 처우의 원칙"], ans:3, exp:"열등 처우의 원칙은 복지 수급자의 삶을 가장 가난한 자립 노동자보다 열악하게 유지함으로써, 사람들이 스스로 구빈원에 들어오는 것을 꺼리게 만들고 나태함을 방지하고자 한 징벌적 원칙이다."},
  {lec:5, q:"찰스 부스와 라운트리가 실시한 과학적인 사회조사 결과가 사회복지 역사에 미친 가장 중요한 영향은?", opts:["빈곤의 원인이 개인의 도덕적 결함(나태함)에 있음을 통계적으로 최종 입증하였다.","민간 자선 단체(COS)의 구호 활동이 국가 주도의 복지보다 훨씬 효율적임을 증명하였다.","런던 빈민의 수가 전체 인구의 2% 미만이라는 사실을 밝혀내어 복지 예산을 대폭 삭감시켰다.","빈곤의 근본 원인이 저임금, 실업 등 사회 구조적 문제임을 입증하여 국가 개입의 정당성을 제공하였다."], ans:3, exp:"부스와 라운트리의 조사는 전체 인구의 약 30%가 빈곤 상태이며, 그 원인이 개인의 게으름이 아니라 노령, 질병, 불리한 노동 환경 등 구조적 한계임을 과학적으로 밝혀내어 보편적 복지의 튼튼한 근거를 마련했다."},
  {lec:5, q:"영국 왕립빈민법위원회(1905)에서 제출된 '다수파 보고서'와 '소수파 보고서'의 근본적인 시각 차이를 바르게 설명한 것은?", opts:["다수파는 빈곤을 사회 구조적 문제로, 소수파는 개인의 도덕적 결함으로 보았다.","다수파는 민간 자선의 축소를, 소수파는 국가 개입의 전면적 철폐를 주장했다.","다수파는 빈민의 나태함을 탓하며 엄격한 조치를, 소수파는 사회적 책임을 강조하며 공적 개입을 주장했다.","다수파는 보편적 기본소득 도입을, 소수파는 선별적 구빈원 수용을 지지했다."], ans:2, exp:"다수파는 기존 신빈민법의 기조를 이어받아 빈민의 자활 의지를 불신하고 엄격한 통제를 요구한 반면, 소수파는 구조적 모순을 지적하며 복지국가로의 체제 전환을 요구했다."},

  // 6강
  {lec:6, q:"노동조합을 단순히 임금 인상을 요구하는 기구를 넘어 '민주주의의 학교'라고 부르는 이유는?", opts:["조합원들에게 정규 대학과 동등한 학위를 수여하기 때문이다.","노동자가 일터에서 경영에 참여하고 권리와 타협의 과정을 실질적으로 경험하기 때문이다.","기업을 전복하고 노동자 독재 체제를 구축하는 법을 가르치기 때문이다.","정부의 모든 정책에 무조건적으로 순응하도록 사상 교육을 실시하기 때문이다."], ans:1, exp:"노동조합은 해고의 두려움을 딛고 노동자가 기업 경영의 파트너로서 발언하고 토론하며 타협하는 과정을 통해, 일상(일터)에서 민주주의를 훈련하는 학교 역할을 한다."},
  {lec:6, q:"노동자가 노동시장에서 노동력을 팔아 직접 버는 '시장임금' 외에, 국가가 복지 제도를 통해 보장해 주는 혜택을 뜻하는 용어는?", opts:["기본소득","최저임금","사회임금","성과급"], ans:2, exp:"시민의 생존(빵)은 회사에서 받는 시장임금과 국가에서 복지 혜택으로 받는 사회임금의 합으로 결정된다."},
  {lec:6, q:"서유럽과 북유럽의 노동조합이 주로 채택하고 있는 '개혁적(사회적) 노동조합주의'의 특징으로 올바른 것은?", opts:["기업 내의 개별적인 임금 협상 등 경제적 실리 추구에만 전념한다.","노사 대립을 극대화하여 사회주의 혁명을 통한 체제 전복만을 목표로 삼는다.","직장 내 문제를 넘어 정당과 연대하여 국가의 거시적 사회정책에 적극 참여한다.","정치와는 철저히 거리를 두며, 조합원 개인의 친목 도모에만 집중한다."], ans:2, exp:"개혁적 노동조합주의는 사회임금을 늘리고 복지국가를 구축하기 위해 정당을 지지하고 국가 정책 결정 과정에 적극적으로 개입한다."},
  {lec:6, q:"스웨덴이 보편적 복지국가 체제를 성공적으로 구축할 수 있었던 가장 핵심적인 정치적 배경은?", opts:["전체 노동자의 다수를 포괄하는 노동조합(LO)과 사회민주당의 강력한 연대가 있었기 때문이다.","소수의 귀족들이 자발적으로 막대한 재산을 빈민들에게 기부했기 때문이다.","미국식 자유방임주의를 적극 수용하여 시장 규제를 전면 철폐했기 때문이다.","노동조합의 정치 참여를 법으로 원천 차단하고 관료 중심의 행정을 폈기 때문이다."], ans:0, exp:"스웨덴 노총(LO)이라는 거대한 노동조직의 강력한 지지가 있었기에 사민당의 69년 장기 집권과 안정적인 복지국가 건설이 가능했다."},
  {lec:6, q:"영국 노동조합과 노동당의 관계 변화 사례로, 대처 정부 이후 토니 블레어 등이 노동조합의 당내 영향력을 축소하기 위해 취한 조치는?", opts:["노동조합 위원장에게 블록투표(Block Voting) 권한을 독점적으로 부여했다.","당헌 4조(사회주의 이념)를 폐기하고 블록투표 대신 1인 1표제를 도입했다.","영국의 모든 노동조합을 노동당 산하의 강제 소속 기관으로 편입시켰다.","노동조합의 파업권과 단체교섭권을 완전히 박탈하는 법안을 통과시켰다."], ans:1, exp:"토니 블레어의 신노동당은 당내에서 노동조합의 막강한 영향력을 축소하기 위해 사회주의 강령을 삭제하고, 노조위원장의 블록투표 권한을 축소하며 일반 당원 중심의 1인 1표제를 도입했다."},
  {lec:6, q:"제2차 세계대전 중 영국의 시민들이 <베버리지 보고서>를 대했던 태도와 그 결과로 올바른 것은?", opts:["복지 확대가 세금 폭탄을 부를 것이라며 거세게 반대하여 처칠의 영구 집권을 이끌었다.","전쟁의 공포에 질려 보고서에 무관심했으며, 복지 논의는 전면 백지화되었다.","방공호 속에서도 열띠게 토론하며 복지국가를 열망했고, 결국 노동당의 압승을 이끌었다.","보고서가 너무 난해하여 극소수의 엘리트 지식인들만 비밀리에 읽고 제도를 폐기하였다."], ans:2, exp:"폭탄이 떨어지는 전쟁 중에도 시민들은 방공호에서 보고서를 읽고 열띠게 토론하며 복지국가를 열망했고, 이는 복지에 미온적이던 처칠을 낙선시키고 노동당 정부를 탄생시킨 원동력이 되었다."},

  // 7강
  {lec:7, q:"윌렌스키와 르보가 복지국가의 발전 양상을 설명하기 위해 구분한 두 가지 복지 제도의 형태로 올바른 것은?", opts:["공공 복지와 민간 자선","적극적 복지와 소극적 복지","잔여적 복지와 제도적 복지","보편적 복지와 선택적 복지"], ans:2, exp:"윌렌스키와 르보는 시장에서 탈락한 극빈층만 임시로 돕는 '잔여적 복지'에서, 모든 시민의 기본권을 보장하는 정상적이고 항구적인 '제도적 복지'로 복지국가가 발전한다고 설명하였다."},
  {lec:7, q:"스웨덴 등 노르딕 국가들의 '사회민주주의 복지국가' 모델이 지향하는 바를 가장 잘 나타낸 한손 총리의 표현은?", opts:["가장의 집 (Breadwinner's Home)","연민의 집 (House of Pity)","경쟁의 집 (House of Competition)","국민의 집 (People's Home)"], ans:3, exp:"'국민의 집'은 특권층이나 천대받는 자 없이, 국가가 모든 시민을 하나의 훌륭한 가족처럼 동등하고 차별 없이 보살피는 보편적 복지국가의 이상을 상징한다."},
  {lec:7, q:"사회민주주의(노르딕) 복지국가 모델의 '탈상품화'와 '계층화' 수준의 특징으로 올바르게 짝지어진 것은?", opts:["탈상품화 수준 낮음 / 계층화 수준 높음","탈상품화 수준 중간 / 계층화 수준 높음","탈상품화 수준 높음 / 계층화 수준 낮음","탈상품화 수준 낮음 / 계층화 수준 낮음"], ans:2, exp:"권리로서의 보편적 급여를 통해 생계 유지의 시장 의존도(탈상품화)를 대폭 높이고, 적극적인 누진세와 소득 이전으로 불평등(계층화)을 크게 낮추는 가장 평등한 분배 형태를 띤다."},
  {lec:7, q:"미국, 영국 등의 '자유주의 복지국가' 모델(연민의 집)에 대한 설명으로 가장 적절한 것은?", opts:["블루칼라 남성 가장을 중심으로 한 사회보험 제도를 강력하게 발달시켰다.","국가가 보육과 노인 돌봄을 전적으로 책임져 가족의 부담을 완전히 없앤다.","시장에서 탈락한 극빈층에게만 엄격한 자산 조사를 거쳐 최소한의 선별적 구제(연민)를 제공한다.","모든 시민에게 기여 여부와 상관없이 무조건적인 기본소득을 균등하게 지급한다."], ans:2, exp:"자유주의 체제는 개인의 시장 적응력을 최우선시하며, 경쟁에서 도태된 이들에게만 낙인감(스티그마)을 수반한 제한적인 시혜를 베풀어 노동 의욕 저하를 막으려 한다."},
  {lec:7, q:"독일, 프랑스 등 대륙 국가에서 발달한 '조합주의(보수주의) 복지국가' 모델의 핵심적인 특징은?", opts:["조세를 통한 소득 재분배를 극대화하여 계층화 수준을 전 세계에서 가장 낮추었다.","남성 가장(Breadwinner) 중심의 사회보험 제도를 통해 전통적인 가부장적 가족주의를 유지한다.","국가의 개입을 전면 차단하고 철저히 민간 자본 중심의 의료 및 연금 체계를 갖춘다.","남녀 공동 육아를 전폭적으로 장려하여 여성의 노동 시장 참여율을 세계 최고 수준으로 이끌었다."], ans:1, exp:"조합주의(보수주의) 모델은 밖에서 일하는 남성 가장의 직업적 지위와 연금에 전 가족의 생계가 연동되도록 제도를 설계하여, 보수적이고 전통적인 성역할을 강화하는 성격을 띤다."},
  {lec:7, q:"스웨덴 등 북유럽 국가에서 '라떼파파(Latte Papa)'가 일상화될 수 있었던 가장 중요한 제도적 배경은?", opts:["국가가 아동 보육과 남성 육아 휴직 제도를 강력히 지원하여 가족의 돌봄 부담을 줄이는 '탈가족화'를 이루었기 때문이다.","남성들이 직장을 완전히 그만두고 가사 노동에만 전념하도록 강제하는 법률이 존재하기 때문이다.","사교육 시장이 극도로 발달하여 부모 대신 사설 학원이 육아를 모두 책임지기 때문이다.","여성들의 사회 진출을 원천 차단하여 남성들만 모든 경제와 육아의 주도권을 갖도록 만들었기 때문이다."], ans:0, exp:"적극적인 남성 육아 휴직 수당 지원과 공보육 확대를 통해 여성이 전담하던 돌봄의 짐을 국가와 남성이 평등하게 나누는 튼튼한 '탈가족화' 제도가 확립되어 있기 때문이다."},

  // 8강
  {lec:8, q:"현금과 현물 급여의 장단점을 비교한 설명으로 가장 적절한 것은?", opts:["현물은 소비자의 선택권을 극대화하지만 본래 목적과 다르게 오용될 우려가 있다.","현금은 정책 목적 달성에 매우 효율적이나 물품을 배달하는 행정 비용이 많이 든다.","현금은 소비자의 선택권을 보장하지만 오용의 우려가 있고, 현물은 정책 목적을 달성하기 용이하다.","현물은 현금에 비해 클라이언트 개인의 다양한 기호와 욕구를 완벽하게 반영한다."], ans:2, exp:"현금은 클라이언트의 기호에 맞게 쓸 수 있는 선택의 자유를 주지만 다른 용도로 쓰일 수 있습니다. 반면, 현물은 정해진 목적대로 재화가 사용되도록 통제하기 쉽지만 행정 비용이 높고 기호를 반영하기 어렵다."},
  {lec:8, q:"현금과 현물의 단점을 보완하기 위해 도입된 '바우처(Voucher, 증서)' 급여의 핵심적인 특징은?", opts:["용도의 제한이 전혀 없어 어떤 물건이든 무제한으로 교환할 수 있다.","정해진 범위 내에서 소비자의 선택권을 보장하면서 동시에 목적 외 사용을 막는 사회적 통제가 가능하다.","현금으로 자유롭게 환전할 수 있도록 국가가 지급을 보증하는 유가증권이다.","물품을 직접 자택으로 배달해 주어 행정 비용이 현물보다 더 크게 발생한다."], ans:1, exp:"바우처(예: 도서상품권, 아동급식카드)는 지정된 가맹점이나 품목 내에서만 자유롭게 쓸 수 있게 하여, 현금의 장점(선택권)과 현물의 장점(통제)을 결합한 절충형 급여이다."},
  {lec:8, q:"아동급식카드를 사용할 때 아동들이 겪을 수 있는 '낙인감(Stigma)'에 대한 설명으로 가장 적절한 것은?", opts:["국가의 혜택을 받는 특별한 존재로서 느끼는 강한 자부심을 뜻한다.","복지 혜택을 받기 위해 까다로운 행정 절차를 거치며 느끼는 피로감이다.","카드를 내미는 순간 저소득층임이 드러나 편견과 차별, 부끄러움을 겪게 되는 심리적 현상이다.","바우처가 본래 목적과 다르게 불법으로 현금화되는 경제적 부작용을 일컫는다."], ans:2, exp:"낙인감은 과거 노예의 몸에 찍힌 인두 자국(낙인)처럼, 특정 혜택(선별적 복지)을 받는 사람이 타인으로부터 가난하다는 표식을 받아 겪게 되는 수치심과 열등감을 뜻한다."},
  {lec:8, q:"사회복지 급여 중 수급자에게 비물질적 급여인 '권력(Power)'을 분배하는 사례로 올바른 것은?", opts:["노인들이 복지관 운영위원회에 대표로 참석하여 프로그램과 정책을 직접 제안하는 것","장애인의 경제적 자립을 위해 의무 고용 할당 비율을 법으로 정하는 것","저소득층 가구의 세금을 감면해 주어 가처분 소득을 간접적으로 늘려주는 것","거동이 불편한 노인에게 요양보호사를 파견하여 가사 활동을 돕는 것"], ans:0, exp:"클라이언트가 단순한 서비스 수혜자를 넘어 기관의 운영위원회나 이사회 등에 당사자로 참여하여 의사결정과 자원 통제력을 행사하는 것은 비물질적 급여인 '권력'을 배분받은 대표적 사례이다."},
  {lec:8, q:"사회복지 급여 형태로서 '기회(Opportunity)'를 제공하는 사례에 해당하는 것은?", opts:["주민참여예산제에 시민단체가 참여하여 예산을 심의하는 것","사회적 배려 대상자에게 대학 특례 입학을 허용하거나 장애인 고용 할당제를 실시하는 것","근로 능력이 없는 자에게 생계 유지를 위한 기초생활수급비를 현금으로 입금하는 것","일정 범위 내에서 식료품만 구매할 수 있는 전용 카드를 발급하는 것"], ans:1, exp:"취약 계층이 사회 활동이나 교육에 진입할 수 있도록 특별한 유인책이나 출발선의 조건을 보장해 주는 혜택이 바로 '기회' 급여의 전형적인 사례입니다. 예산 심의는 '권력'에 해당한다."},
  {lec:8, q:"사회복지 정책에서 '전달체계(Delivery System)'가 의미하는 바를 가장 정확히 설명한 것은?", opts:["다양한 사회복지 급여를 수급자에게 효과적으로 제공하기 위해 마련된 실천 및 행정적 조직 장치이다.","복지 재원을 낭비하는 공무원을 색출하기 위한 정부 내 독립적인 감사 기관이다.","빈곤층에게만 무상으로 식품과 의류를 제공하는 민간 자선단체의 모금 시스템이다.","복지 혜택을 받기 위해 클라이언트가 의무적으로 이수해야 하는 도덕성 교육 과정이다."], ans:0, exp:"전달체계는 국가의 복지 정책으로 만들어진 급여(돈, 서비스)가 클라이언트에게까지 도달하기 위해 거치는 파이프라인으로, 노인복지관 같은 실천 조직(집행체계)과 행정 조직을 모두 포함한다."},

  // 9강
  {lec:9, q:"우리나라 산재 사고의 주된 원인으로 지적하고 있는 것은?", opts:["노동자 개개인의 단순한 부주의와 나태함","노동조합의 무리한 파업과 태업","위험을 외주화하는 하청 구조와 비정규직의 과로 등 구조적 문제","안전 교육의 전면적인 부재"], ans:2, exp:"본문은 산재가 단순한 부주의가 아니라 중소기업, 하청업체, 비정규직 등 취약한 구조적 요인에 의해 발생하는 '구조적 살인'임을 강조한다."},
  {lec:9, q:"한국의 산재 처벌 현실과 비교하여 언급된 영국 제도의 특징은?", opts:["산재 발생 시 노동자에게 모든 민형사상 책임을 묻는다.","산재가 발생해도 기업주에게는 어떠한 벌금도 부과하지 않는다.","범칙금이 매우 낮아 기업들이 안전 시설 투자를 전면 중단하였다.","산재 사망에 대해 막대한 벌금을 부과하고, 기업주를 직접 구속할 수 있는 '기업살인죄'를 도입하여 강력히 처벌한다."], ans:3, exp:"한국은 벌금형이나 책임자 구속이 매우 미미한 반면, 영국은 천문학적인 벌금과 '기업살인죄'를 통해 구조적인 안전을 강제하고 있다."},
  {lec:9, q:"현대 한국 노동 시장에서 고용보험의 혜택을 제대로 받지 못하는 사각지대에 놓인 대표적인 직군은?", opts:["공기업 정규직 노동자","대기업 사무직 노동자","공무원 및 사립학교 교직원","배달 앱 라이더 등 플랫폼 노동자와 특수고용직 노동자"], ans:3, exp:"플랫폼 노동자나 특수고용직(특고)은 실질적인 노동자임에도 계약상 '개인사업자'로 분류되어 고용보험의 사각지대에 놓여 있다."},
  {lec:9, q:"영화 <식코(Sicko)>를 통해 비판하고 있는 미국 의료 제도의 근본적인 문제점은?", opts:["국가가 모든 병원을 국유화하여 의료 서비스의 질이 하락했다.","전 국민 무상 의료를 실시하여 막대한 재정 적자가 발생했다.","의료가 철저히 민영화되어 서민들이 살인적인 병원비와 민간 보험료의 부담으로 제대로 된 치료를 받지 못한다.","의사들이 노동조합을 결성하여 지속적인 파업을 일으키고 있다."], ans:2, exp:"미국은 공공 의료보험이 취약하고 의료가 철저히 시장화(민영화)되어 있어, 돈이 없는 사람은 거액의 수술비 때문에 온전한 치료를 포기해야 하는 현실을 보여준다."},
  {lec:9, q:"국민연금이 민간 보험과 구별되는 공적 사회보험으로서 지니는 가장 큰 특징이자 장점은?", opts:["개인이 낸 보험료에 정확히 비례하여 수익을 배분하므로 소득 재분배 효과가 전혀 없다.","국가가 운영하여 파산 위험이 없고, 고소득층보다 저소득층에게 더 유리하게 설계되어 소득 재분배 효과를 지닌다.","자신이 낸 보험료를 중간에 언제든지 자유롭게 전액 인출하여 사용할 수 있다.","가입이 전적으로 개인의 자율에 맡겨져 있어 원하지 않으면 가입하지 않아도 된다."], ans:1, exp:"국민연금은 국가가 지급을 보장하는 강제 가입의 공적 보험이며, 수익 구조가 하후상박으로 설계되어 빈부격차를 줄이는 소득 재분배 기능을 적극적으로 수행한다."},
  {lec:9, q:"치매나 중풍 등으로 일상생활이 어려운 노인을 지원하는 '노인장기요양보험'이 지향하는 복지 철학으로 가장 알맞은 것은?", opts:["돌봄은 전적으로 효심 깊은 자녀(개인)가 도맡아야 할 사적인 책임이다.","돌봄의 부담을 줄이기 위해 노인들을 모두 강제로 해외 시설로 이주시킨다.","노인 돌봄을 시민의 정당한 권리이자 국가와 사회의 공적인 의무로 전환하여 가족의 부담을 던다.","요양 시설을 100% 영리 기업에 매각하여 철저한 시장 경쟁 원리를 도입한다."], ans:2, exp:"노인장기요양보험은 개인과 가족이 떠안던 돌봄의 짐을 사회 보험 방식을 통해 국가의 공적 책임과 보편적인 시민의 권리로 끌어올린 대표적인 제도이다."},

  // 10강
  {lec:10, q:"사회복지 실천현장을 기관의 주요 목적과 기능에 따라 1차 현장과 2차 현장으로 구분할 때, 2차 현장(Secondary Setting)에 해당하는 것은?", opts:["노인복지관","장애인 거주시설","지역아동센터","학교 및 병원"], ans:3, exp:"1차 현장은 복지관 등 사회복지사가 중심이 되어 활동하는 곳이며, 2차 현장은 학교, 병원, 교도소 등 타 전문 기관이지만 서비스 효과성을 높이기 위해 사회복지가 부분적으로 개입하는 장소이다."},
  {lec:10, q:"바움린드가 분류한 양육 태도 중, '권위적인(authoritative, 민주적)' 태도와 구별되는 '권위주의적인(authoritarian, 독재적)' 태도의 특징은?", opts:["아이와 동등한 위치에서 소통하고 의견을 묻는다.","합리적인 규칙을 세우고 그 이유를 타당하게 설명한다.","부모나 교사의 뜻대로 아이를 일방적으로 통제하고 복종을 강요한다.","자녀를 천부인권을 지닌 독립된 시민으로 대우한다."], ans:2, exp:"'권위적인 것'이 소통과 존중을 통해 자연스럽게 인정받는 민주적 리더십이라면, '권위주의적인 것'은 일방적 지시와 맹목적 복종을 강요하는 독재적이고 억압적인 태도를 뜻한다."},
  {lec:10, q:"'여자는 태어나는 것이 아니라 만들어진다'는 시몬 드 보부아르의 말이 사회복지 및 젠더 영역에서 시사하는 바는?", opts:["여성의 생물학적 신체 구조가 남성보다 모든 면에서 우월하다는 뜻이다.","사적이고 의존적이라는 이른바 '여성성'은 본능이 아니라, 가부장적 사회 구조와 남성 지배 이데올로기에 의해 강요되고 길들여진 사회적 성(gender)이라는 의미이다.","여성은 태어날 때부터 모성애와 헌신적인 태도를 유전적으로 가지고 있다는 뜻이다.","남녀의 불평등한 역할 차이는 자연의 섭리이므로 운명으로 받아들여야 한다는 뜻이다."], ans:1, exp:"생물학적 성(sex)과 달리 사회적 성(gender)은 사회가 부여한 편견과 구조에 의해 형성된 것이므로, 이를 깨닫고 남녀가 동등한 시민으로서 구조적 불평등을 바꾸어 나가야 함을 시사한다."},
  {lec:10, q:"나이 든 사람을 'No人' 담론과 'Know人' 담론이 가지는 공통적인 한계는?", opts:["두 가지 모두 노인을 고유한 개성과 욕구를 지닌 평범한 보통 사람(시민)으로 대하지 않고 양극단으로 대상화한다는 점이다.","노인들이 지닌 막대한 경제력과 소비력을 지나치게 과대평가한다는 점이다.","노인을 오직 노동 시장의 핵심 인력으로만 간주하여 과로를 유발한다는 점이다.","청년층보다 노인층에게 훨씬 더 많은 복지 예산을 낭비하게 만든다는 점이다."], ans:0, exp:"돌봄만 받아야 하는 무능력자나 비현실적인 현자로 규정하는 것은 모두 노인의 실제 일상과 개성을 지우고 사회와 분리시키는 왜곡된 시각이다."},
  {lec:10, q:"최근 미디어를 통해 자주 등장하는 '액티브 시니어(Active Senior)' 모델이 모든 노인의 보편적 대안이 되기 어려운 이유는?", opts:["여행과 여가를 즐기기에는 모든 노인의 체력이 절대적으로 부족하기 때문이다.","이 모델은 본질적으로 돈 걱정을 하지 않아도 되는 풍부한 경제력과 재산이 뒷받침된 소수에게만 가능하기 때문이다.","국가에서 액티브 시니어의 활동을 법으로 엄격히 금지하고 있기 때문이다.","노인들은 본성상 새로운 것을 배우거나 문화적으로 소비하는 것을 극도로 싫어하기 때문이다."], ans:1, exp:"액티브 시니어의 여유로운 삶은 성공과 자본을 바탕으로 하므로, 노인 빈곤율이 45%에 달하는 한국의 현실에서 대다수 평범한 노인들에게는 적용하기 힘든 모델이다."},
  {lec:10, q:"한국의 노년층이 자신들의 '사회권(인간답게 살 권리)'을 요구하는 데에는 거부감을 느끼는 역사적 배경은?", opts:["대한민국 헌법에 복지나 사회권에 대한 내용이 전혀 명시되어 있지 않기 때문이다.","과거 반공주의와 '조국 근대화' 이데올로기 속에서 국가를 위한 맹목적 희생과 의무만을 강요받으며 살아왔기 때문이다.","이미 젊은 시절 국가로부터 넘칠 만큼 과도한 무상 복지 혜택을 경험했기 때문이다.","서구의 쾌락주의와 개인주의 사상을 너무 일찍부터 무비판적으로 수용했기 때문이다."], ans:1, exp:"산업화 시대에 국가 중흥을 위해 몸과 마음을 바치라는 정언명령(의무)만 주입받았을 뿐, 헌법에 보장된 마땅한 권리를 요구하고 누리는 교육을 받지 못했기 때문이다."},

  // 11강
  {lec:11, q:"오드리 헵번과 헬렌 켈러의 자원봉사 방식을 비교하여 설명한 핵심적인 차이는?", opts:["헵번은 정치적 투쟁을 중시했고, 켈러는 단순한 구호 물품 전달을 중시했다.","헵번은 빈곤의 원인을 개인의 탓으로 보았고, 켈러는 신의 뜻으로 보았다.","헵번은 사후 대처와 시혜적 구제(잔여주의)에 머물렀으나, 켈러는 빈곤과 장애를 고착화하는 사회 구조적 모순을 비판하고 변혁(제도주의)하려 했다.","헵번은 자본주의를 전면 부정했고, 켈러는 자본주의 시장 논리를 철저히 옹호했다."], ans:2, exp:"헵번의 자원봉사는 훌륭한 선행이지만 구조적 비판 없이 피해자를 돕는 데(잔여적 실천) 그쳤고, 켈러는 불평등한 사회 구조와 권력을 직시하고 이를 바꾸려는 정치적 투쟁(제도적 실천)을 전개했다는 차이가 있다."},
  {lec:11, q:"나눔의 역사적 경향 중 '자선조직협회(COS)'와 '인보관 운동'에 대한 설명으로 올바른 것은?", opts:["자선조직협회는 문제의 원인을 사회 구조에서 찾았다.","인보관 운동의 대표적 활동가는 귀족들로 구성된 '우애 방문단(Friendly Visitor)'이었다.","자선조직협회는 문제의 원인을 개인의 태도나 능력에서 찾았고, 인보관 운동은 지역사회 환경과 구조를 바꾸는 데 집중했다.","두 운동 모두 자본주의 체제를 전복하려는 급진적 마르크스주의 혁명 운동이었다."], ans:2, exp:"자선조직협회(나눔 1.0)는 빈곤을 개인의 도덕적 결함으로 보고 시혜를 베푼 반면, 인보관 운동(나눔 2.0)은 지식인들이 빈민가에 들어가 주민과 합심해 거시적 환경을 개혁하고자 했다."},
  {lec:11, q:"희곡 <어느 세일즈맨의 죽음>의 주인공 윌리의 죽음을 통해 주로 강조하고자 한 사회복지적 관점은?", opts:["대공황과 같은 거대한 사회 구조적 폭력 앞에서는 개인의 피나는 노력만으로는 생존하기 어려움을 보여준다.","가난은 전적으로 개인의 게으름과 도덕적 결함 때문임을 명백히 증명한다.","아들 비프가 열심히 일하지 않았기 때문에 아버지가 대신 처벌을 받은 것이다.","세일즈맨이라는 직업 자체가 원래 수명이 짧고 위험한 직종임을 경고한다."], ans:0, exp:"윌리의 죽음이나 현대 한국 사회의 세 모녀 자살 사건 등은 개인의 노력이 부족해서가 아니라, 사회적 안전망이 부재한 국가 구조의 실패(구조적 타살)임을 역설하는 사례이다."},
  {lec:11, q:"스웨덴의 뮈르달 부부가 심각한 저출산 위기를 극복하기 위해 제안한 '예방적 사회정책'의 핵심 내용은?", opts:["여성들이 직장을 그만두고 가사 및 육아에만 전념하도록 법으로 강제하는 것이다.","일회성 출산 장려금만 지급하고 국가는 육아에 일절 개입하지 않는 것이다.","저출산을 구조적 문제로 보고 육아, 교육, 의료, 주거 등을 국가가 포괄적으로 지원하는 보편적 복지 환경을 조성하는 것이다.","다자녀 가정에만 선별적으로 세금을 감면해주고, 무자녀 가정에는 막대한 벌금을 부과하는 것이다."], ans:2, exp:"저출산을 개인의 책임으로 돌리지 않고, 아이를 낳고 기를 수 있는 환경(무상의료, 무상교육 등 보편적 복지 인프라)을 국가가 구조적으로 마련하여 위기를 극복했다."},
  {lec:11, q:"잔여적 실천인 '사례관리'를 극복하기 위한 대안으로 제시된 '사회관리(Social Management)'의 핵심적인 특징은?", opts:["사회복지사를 위로자나 시혜적 봉사자(천사)로만 한정하여 실천한다.","부정 수급자를 철저히 걸러내기 위해 중앙 단위의 엄격한 자산 조사 시스템을 운영한다.","클라이언트를 권리를 지닌 주체적 '시민'으로 규정하고, 억압적 사회 구조에 맞서 당당히 권리를 요구하도록 연대하고 조직화한다.","개인의 심리적 부적응을 치료하기 위해 정신역동이론과 심리치료 기술에 전적으로 의존한다."], ans:2, exp:"사회관리는 문제의 원인이 억압적 국가 구조와 정책에 있음을 깨닫게 하고, 시민들이 권력을 자각하여 연대함으로써 부당한 구조를 변혁하는 인권 활동가적 실천을 도모한다."},
  {lec:11, q:"잔여적 사회복지 실천과 제도적 사회복지 실천이 채택하는 '기반 이론'을 바르게 짝지은 것은?", opts:["잔여적 실천: 페미니즘적 접근 / 제도적 실천: 해결중심이론","잔여적 실천: 심리사회 모델, 정신역동이론 / 제도적 실천: 비판이론, 급진적 사회복지실천론","잔여적 실천: 반억압·반차별이론 / 제도적 실천: 인지행동 모델","잔여적 실천: 마르크스주의 / 제도적 실천: 프로이트의 정신분석학"], ans:1, exp:"개인의 심리와 적응에 초점을 맞추는 잔여주의는 정신역동이나 심리사회 모델을, 권력과 구조 변혁을 지향하는 제도주의는 비판이론과 급진적 사회복지실천론 등을 기반으로 한다."},

  // 12강
  {lec:12, q:"한국 자본주의가 서유럽과 비교하여 '예외적'이라고 평가받는 가장 핵심적인 이유는?", opts:["부르주아지가 구체제에 강력하게 저항하며 자본주의를 자생적으로 형성했기 때문이다.","발전국가가 소수 재벌을 지렛대로 삼아 전폭적으로 지원하며 국가 주도형 경제를 이끌었기 때문이다.","노동조합 주도로 자본과 권력을 통제하며 경제 성장을 이루었기 때문이다.","일찍부터 강력한 사회복지 제도를 완비하여 자본주의의 구조적 모순을 선제적으로 해결했기 때문이다."], ans:1, exp:"서유럽은 부르주아지가 구체제에 저항하며 아래로부터 시장을 형성했으나, 한국은 발전국가(군부와 정부)가 재벌을 후견하고 전폭적으로 지원하여 위로부터 자본주의를 형성한 예외적 특징을 지닌다."},
  {lec:12, q:"1987년 민주화와 노동자 대투쟁이 지닌 역사적 의의와 함께 지적하고 있는 근본적인 한계는?", opts:["절차적 민주화에는 성공했으나, 사회권이나 계급 정치로 나아가지 못하고 대기업 정규직 중심의 '전투적 경제주의'에 머물렀다.","노동자들의 투쟁이 완전히 실패하여 어떠한 민주 노조도 결성하지 못했다.","신자유주의를 적극적으로 수용하여 재벌 중심의 경제 체제를 스스로 완성했다.","서유럽식 복지국가 체제를 완벽하게 도입하여 노동 배제적 정치를 영구적으로 종식시켰다."], ans:0, exp:"1987년 체제는 대표 선출의 절차적 민주주의와 노조 조직화에는 성공했지만, 시민들의 보편적 삶을 지키는 탈상품화의 정치(복지 정치)로 발전하지 못하고 임금 인상에 치중하는 한계를 보였다."},
  {lec:12, q:"과거 '국민교육헌장'과 '국기에 대한 경례' 등에 담긴 국가주의적 사상이 내포하고 있는 본질적인 성격은?", opts:["시민 개개인의 천부인권과 자유를 최우선으로 보장하고 보호하는 사상이다.","국가 발전과 민족 중흥이라는 명분 아래 국가에 대한 개인의 맹목적인 충성과 복종을 정당화하는 사상이다.","보편적 복지국가를 건설하기 위한 조세 형평성의 중요성을 알리는 사상이다.","노동자와 농민의 정치적 권리를 강화하여 계급 갈등을 해소하려는 사상이다."], ans:1, exp:"조국과 민족을 위해 몸과 마음을 바칠 것을 강요하는 이러한 구호들은, 개인을 국가의 부속품으로 여기며 정권에 대한 충성과 전체주의적 국가주의를 주입하는 역할을 했다."},
  {lec:12, q:"한국의 복지국가를 하나의 '집'으로 비유할 때, 그 토대와 기둥의 구조를 올바르게 짝지은 것은?", opts:["토양: 보편적 복지 / 기둥: 강력한 노동조합","토양: 페미니즘과 생태주의 / 기둥: 공공의료와 무상교육","토양: 발전주의와 반공주의(한국적 민주주의) / 기둥: 발전국가와 재벌 주도 시장, 그리고 취약한 잔여적 복지","토양: 사회민주주의 / 기둥: 인보관과 자선조직"], ans:2, exp:"한국의 복지 체제는 성장과 반공을 토대로 삼고, 재벌 주도의 정글 자본주의 기둥이 거대하게 솟아 있으며, 여기서 탈락한 이들을 위한 피난처로서 가족과 초라한 '잔여적 복지'의 기둥만이 위태롭게 서 있는 구조이다."},
  {lec:12, q:"<선량한 차별주의자>에서 비판하는 '간접차별'의 개념을 가장 잘 보여주는 사례는?", opts:["여성의 승진을 막기 위해 고의로 인사 고과를 낮게 주는 것","특정 인종의 대학 입학을 명시적으로 금지하는 학칙을 제정하는 것","시각장애인과 비장애인에게 아무런 보조 조치 없이 완전히 동일한 시험 시간을 부여하는 것","저소득층 학생에게만 전액 장학금을 지급하는 것"], ans:2, exp:"겉보기에는 모두에게 동일한 기준을 적용하여 공정한 것처럼 보이지만, 애초에 조건이 다른 소수자(장애인 등)에게는 그 획일적인 기준 자체가 치명적으로 불리하게 작용하는 구조적 폭력을 간접차별이라고 한다."},
  {lec:12, q:"마이클 샌델의 <공정하다는 착각> 등을 인용하여, 현대의 '능력주의(Meritocracy)'가 지닌 치명적인 폐해를 가장 잘 설명한 것은?", opts:["능력주의는 부모의 배경이 미치는 영향을 은폐하며, 승자에게는 오만을, 패자에게는 모든 책임을 전가하는 굴욕과 분노를 안겨 불평등을 정당화한다.","개인의 성취는 오로지 본인의 순수한 노력만으로 이루어짐에도 불구하고 국가가 세금으로 이를 모두 빼앗아 간다.","능력주의는 너무 평등한 결과를 초래하여 사람들의 근로 의욕을 심각하게 저하시킨다.","능력이 뛰어난 소수의 엘리트들이 모든 사회 복지 재정을 전액 부담하고 있어 역차별이 심각하게 발생한다."], ans:0, exp:"능력주의(메리토크라시)는 시험 성적과 지위가 순전히 자신의 노력의 결과라는 착각(승자의 오만)을 심어주고, 탈락자들에게는 능력이 부족한 자신의 탓이라 여기게 만들어 불평등한 세습 구조를 정당화하는 무서운 이데올로기이다."},

  // 13강
  {lec:13, q:"한국 노동조합의 구조적 특징인 '기업별 노조' 체제가 지닌 한계는?", opts:["노동조합의 규모가 너무 거대해져서 국가 정책을 마음대로 좌우한다는 점이다.","동일 산업의 노동자들이 하나로 뭉치지 못하고, 자기가 속한 기업의 이익(임금 등)에만 매몰되어 사회 전체적인 복지 정치 세력으로 성장하기 어렵다는 점이다.","모든 기업의 사장들이 노동조합 위원장을 겸임하여 노조의 독립성이 없다는 점이다.","비정규직 노동자들만이 노조를 독점하여 정규직 노동자들이 차별받는다는 점이다."], ans:1, exp:"서유럽의 '산별 노조'와 달리 한국은 기업 단위로 파편화되어 있어, 대기업 정규직 중심의 이익 추구에 갇히기 쉽고 진보 정당과의 강력한 연대를 통한 보편적 복지 국가 건설에 기여하기 어렵다."},
  {lec:13, q:"1997년 외환위기 이후 노동조합을 공격하기 위해 새롭게 등장하여 강력한 힘을 발휘하고 있는 지배 담론은?", opts:["노동조합은 국가 독립을 방해하는 '매국노' 집단이다.","노동조합은 환경 파괴를 일삼는 '반환경적' 집단이다.","노동조합은 대기업 정규직의 이익만 챙기는 '이기주의 집단(귀족노조)'이다.","노동조합은 모든 시민에게 무상 주택을 공급하라고 요구하는 '급진주의' 집단이다."], ans:2, exp:"신자유주의 확산 이후, 대기업 정규직 노조를 '노동 귀족'으로 낙인찍어 비정규직이나 일반 시민들과 분리시키고 노동운동의 도덕적 정당성을 약화시키려는 담론이 주류를 이루고 있다."},
  {lec:13, q:"배달 앱 라이더와 같이 스마트폰 앱이나 SNS를 통해 노동이 거래되는 고용 형태에서 일하는 노동자들을 일컫는 용어는?", opts:["가상 현실 노동자","플랫폼 노동자","인공지능 노동자","무인 네트워크 노동자"], ans:1, exp:"배달 앱 등 디지털 플랫폼을 매개로 노동력을 제공하는 이들을 플랫폼 노동자라고 하며, 최근 이들의 열악한 노동 조건과 권리 찾기가 중요한 사회적 쟁점이 되고 있다."},
  {lec:13, q:"제레미 리프킨이 <노동의 종말>에서 경고한 정보화 시대의 위협을 극복하기 위해 제안한 대안은?", opts:["모든 자동화 기계를 파괴하고 수작업 시대로 돌아가야 한다.","기술 발전으로 인한 생산성 향상분을 노동시간 단축을 통해 나누고, 시장 밖 '제3부문(사회적 경제)' 일자리를 창출해야 한다.","소수의 지식 엘리트들이 모든 부를 독점하도록 법으로 보장해야 한다.","노동이 필요 없는 사회이므로 시민들을 모두 해외로 이주시켜야 한다."], ans:1, exp:"리프킨은 기술 발전이 노동의 재앙이 되지 않으려면, 이익의 공정한 분배와 함께 시장이 수용하지 못하는 인력을 사회적 기여를 하는 제3부문의 일자리로 흡수해야 한다고 주장했다."},

// ==============================
// STATE
// ==============================
let questions = [];
let currentIdx = 0;
let answers = {};       // idx → chosen option (0-based)
let bookmarks = new Set(JSON.parse(localStorage.getItem('sw_bm') || '[]'));
let wrongSet = new Set(JSON.parse(localStorage.getItem('sw_wrong') || '[]'));
let graded = false;
let currentMode = '';
let expandView = false;

// ── TIMER ──
let timerInterval = null;
let timerSeconds = 20 * 60;

function startTimer() {
  clearInterval(timerInterval);
  timerSeconds = 20 * 60;
  updateTimerDisplay();
  const box = document.getElementById('timer-box');
  box.style.display = 'flex';
  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      alert('⏰ 시험 시간이 종료되었습니다!');
      gradeQuiz();
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  document.getElementById('timer-box').style.display = 'none';
}

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  const txt = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const el = document.getElementById('timer-display');
  el.textContent = txt;
  el.className = timerSeconds <= 60 ? 'timer-danger' : '';
}

// ── EXPAND / COLLAPSE VIEW ──
function toggleExpandView() {
  expandView = !expandView;
  const btn = document.getElementById('expand-btn');
  const quizScreen = document.getElementById('quiz-screen');
  const expandScreen = document.getElementById('expand-all-screen');

  if (expandView) {
    btn.textContent = '⊟';
    btn.title = '한 문제씩 보기';
    quizScreen.classList.add('hidden');
    expandScreen.style.display = 'block';
    renderExpandAll();
  } else {
    btn.textContent = '⇅';
    btn.title = '전체 문제 보기';
    expandScreen.style.display = 'none';
    quizScreen.classList.remove('hidden');
    renderQuestion();
  }
}

function renderExpandAll() {
  const screen = document.getElementById('expand-all-screen');
  screen.innerHTML = '';
  const nums = ['①','②','③','④'];
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'all-q-card';
    card.id = `all-q-${i}`;

    const numDiv = document.createElement('div');
    numDiv.className = 'q-num';
    numDiv.textContent = `${i + 1} / ${questions.length} 번 문제 · ${q.lec}강`;
    card.appendChild(numDiv);

    const textDiv = document.createElement('div');
    textDiv.className = 'q-text';
    textDiv.textContent = q.q;
    card.appendChild(textDiv);

    const optsDiv = document.createElement('div');
    optsDiv.className = 'options';
    q.opts.forEach((opt, oi) => {
      const div = document.createElement('div');
      div.className = 'option';
      div.innerHTML = `<span class="num">${nums[oi]}</span><span>${opt}</span>`;
      if (graded) {
        if (oi === q.ans) div.classList.add('correct');
        else if (answers[i] === oi && answers[i] !== q.ans) div.classList.add('wrong');
      } else {
        if (answers[i] === oi) div.classList.add('selected');
        div.onclick = () => { answers[i] = oi; renderExpandAll(); renderGrid(); };
      }
      optsDiv.appendChild(div);
    });
    card.appendChild(optsDiv);

    if (graded) {
      const expDiv = document.createElement('div');
      expDiv.className = 'explanation show';
      expDiv.innerHTML = `<div class="exp-label">💡 해설</div><div>${q.exp}</div>`;
      card.appendChild(expDiv);
    }

    screen.appendChild(card);
  });
}

function saveBookmarks() {
  localStorage.setItem('sw_bm', JSON.stringify([...bookmarks]));
}
function saveWrong() {
  localStorage.setItem('sw_wrong', JSON.stringify([...wrongSet]));
}

// ==============================
// NAVIGATION
// ==============================
function showStart() {
  document.getElementById('start-screen').classList.remove('hidden');
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('expand-all-screen').style.display = 'none';
  document.getElementById('tabbar').classList.add('hidden');
  document.getElementById('sidebar').classList.add('hidden');
  document.getElementById('mode-tag').textContent = '모드 선택 중';
  document.getElementById('progress-text').textContent = '';
  document.getElementById('expand-btn').style.display = 'none';
  setHeaderBtns(false, false, false);
  stopTimer();
  graded = false;
  answers = {};
  questions = [];
  currentIdx = 0;
  expandView = false;
}

function setHeaderBtns(grade, retry, home) {
  document.getElementById('btn-header-grade').style.display = grade ? 'inline-block' : 'none';
  document.getElementById('btn-header-retry').style.display = retry ? 'inline-block' : 'none';
  document.getElementById('btn-header-home').style.display = home ? 'inline-block' : 'none';
}

function retryQuiz() {
  if (!confirm('다시 풀기 하면 현재 답이 초기화됩니다. 계속하시겠습니까?')) return;
  startQuiz(currentMode);
}

function startQuiz(mode) {
  currentMode = mode;
  graded = false;
  answers = {};
  currentIdx = 0;
  expandView = false;
  let useTimer = false;

  if (mode === 'random') {
    questions = shuffle([...ALL_QUESTIONS]).slice(0, 30);
    document.getElementById('mode-tag').textContent = '랜덤 30문제';
    useTimer = true;  // 랜덤만 20분 타이머
  } else if (mode === 'all') {
    questions = [...ALL_QUESTIONS];
    document.getElementById('mode-tag').textContent = '전체 90문제';
    useTimer = false; // 전체 문제는 시간제한 없음
  } else if (mode === 'bookmark') {
    const bmIds = [...bookmarks];
    questions = ALL_QUESTIONS.filter((_, i) => bmIds.includes(i));
    if (questions.length === 0) { alert('📌 책갈피된 문제가 없습니다.'); return; }
    document.getElementById('mode-tag').textContent = `책갈피 ${questions.length}문제`;
    useTimer = false;
  } else if (mode === 'wrong') {
    questions = [...wrongSet].map(i => ALL_QUESTIONS[i]).filter(Boolean);
    if (questions.length === 0) { alert('✅ 틀린 문제가 없습니다!'); return; }
    document.getElementById('mode-tag').textContent = `오답 ${questions.length}문제`;
    useTimer = false;
  }

  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('expand-all-screen').style.display = 'none';
  document.getElementById('quiz-screen').classList.remove('hidden');
  document.getElementById('tabbar').classList.remove('hidden');
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('expand-btn').style.display = 'flex';
  document.getElementById('expand-btn').textContent = '⇅';
  setHeaderBtns(true, true, true);

  if (useTimer) {
    startTimer();
  } else {
    stopTimer();
  }

  buildTabbar();
  renderQuestion();
  renderGrid();
}

function navigate(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= questions.length) return;
  currentIdx = newIdx;
  renderQuestion();
  renderGrid();
}

function goToQuestion(i) {
  if (expandView) {
    const card = document.getElementById(`all-q-${i}`);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    currentIdx = i;
    renderGrid();
    return;
  }
  currentIdx = i;
  renderQuestion();
  renderGrid();
}

// 강 단위 탭바 동적 생성
function buildTabbar() {
  const bar = document.getElementById('tabbar');
  bar.innerHTML = '';
  const groups = [...new Set(questions.map(q => q.lec))];
  groups.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.dataset.group = g;
    btn.onclick = () => {
      const idx = questions.findIndex(q => q.lec === g);
      if (idx >= 0) goToQuestion(idx);
    };
    bar.appendChild(btn);
  });
  updateTabbar();
}

function updateTabbar() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    const g = parseInt(btn.dataset.group);
    const total = questions.filter(q => q.lec === g).length;
    const done = questions.filter((q, idx) => q.lec === g && answers[idx] !== undefined).length;
    btn.textContent = `${g}강 (${done}/${total})`;
    btn.classList.toggle('active', questions[currentIdx] && questions[currentIdx].lec === g);
  });
}

// ==============================
// RENDER QUESTION
// ==============================
function renderQuestion() {
  const q = questions[currentIdx];
  if (!q) return;

  const origIdx = ALL_QUESTIONS.indexOf(q);
  const label = document.getElementById('q-num-label');
  label.textContent = `${currentIdx + 1} / ${questions.length} 번 문제 · ${q.lec}강`;

  document.getElementById('q-text').textContent = q.q;
  document.getElementById('q-text').style.fontWeight = '600';

  const optsCont = document.getElementById('options');
  optsCont.innerHTML = '';

  const nums = ['①','②','③','④'];
  q.opts.forEach((opt, oi) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = `<span class="num">${nums[oi]}</span><span>${opt}</span>`;

    const answered = answers[currentIdx] !== undefined;

    if (graded) {
      // 채점 후 전체 결과 보기
      const chosen = answers[currentIdx];
      if (oi === q.ans) div.classList.add('correct');
      else if (chosen === oi && chosen !== q.ans) div.classList.add('wrong');
    } else if (answered) {
      // 즉시 피드백: 이미 답을 선택한 상태
      const chosen = answers[currentIdx];
      if (oi === q.ans) div.classList.add('show-correct');          // 정답 강조
      else if (chosen === oi) div.classList.add('wrong');            // 오선택 표시
      // 클릭 불가 (답 고정)
    } else {
      // 아직 미응답
      if (answers[currentIdx] === oi) div.classList.add('selected');
      div.onclick = () => selectOption(oi);
    }
    optsCont.appendChild(div);
  });

  // 즉시 피드백 배너 & 해설
  const feedbackEl = document.getElementById('feedback-banner');
  const expEl = document.getElementById('explanation');
  const expText = document.getElementById('exp-text');

  const answeredNow = answers[currentIdx] !== undefined;

  if (graded) {
    feedbackEl.className = 'feedback-banner';   // 채점 모드에선 배너 숨김
    expEl.classList.add('show');
    expText.textContent = q.exp;
  } else if (answeredNow) {
    const isCorrect = answers[currentIdx] === q.ans;
    feedbackEl.textContent = isCorrect ? '✅ 정답입니다!' : '❌ 오답입니다. 아래 정답과 해설을 확인하세요.';
    feedbackEl.className = 'feedback-banner show ' + (isCorrect ? 'correct-fb' : 'wrong-fb');
    expEl.classList.add('show');
    expText.textContent = q.exp;
  } else {
    feedbackEl.className = 'feedback-banner';
    expEl.classList.remove('show');
  }

  // Bookmark btn
  const bmBtn = document.getElementById('bm-btn');
  if (bookmarks.has(origIdx)) {
    bmBtn.classList.add('bookmarked');
    bmBtn.textContent = '🔖 책갈피됨';
  } else {
    bmBtn.classList.remove('bookmarked');
    bmBtn.textContent = '🔖 책갈피';
  }

  // prev/next
  document.getElementById('btn-prev').disabled = currentIdx === 0;
  document.getElementById('btn-next').textContent = currentIdx === questions.length - 1 ? '완료' : '다음 ▶';

  // progress
  const answered = Object.keys(answers).length;
  document.getElementById('progress-text').textContent = `${answered} / ${questions.length} 문제 응답`;

  updateTabbar();
}

function selectOption(oi) {
  if (graded) return;
  answers[currentIdx] = oi;
  renderQuestion();
  renderGrid();
  document.getElementById('progress-text').textContent = `${Object.keys(answers).length} / ${questions.length} 문제 응답`;
}

function toggleBookmark() {
  const q = questions[currentIdx];
  const origIdx = ALL_QUESTIONS.indexOf(q);
  if (bookmarks.has(origIdx)) bookmarks.delete(origIdx);
  else bookmarks.add(origIdx);
  saveBookmarks();
  renderQuestion();
  renderGrid();
}

// ==============================
// RENDER GRID
// ==============================
function renderGrid() {
  const grid = document.getElementById('q-grid');
  grid.innerHTML = '';
  const nums = ['①','②','③','④'];
  questions.forEach((q, i) => {
    const origIdx = ALL_QUESTIONS.indexOf(q);
    const div = document.createElement('div');
    div.className = 'q-dot';

    const numEl = document.createElement('span');
    numEl.className = 'dot-num';
    numEl.textContent = i + 1;
    div.appendChild(numEl);

    if (answers[i] !== undefined) {
      const ansEl = document.createElement('span');
      ansEl.className = 'dot-ans';
      ansEl.textContent = nums[answers[i]];
      div.appendChild(ansEl);
    }

    div.onclick = () => goToQuestion(i);

    if (i === currentIdx) div.classList.add('current');
    if (bookmarks.has(origIdx)) div.classList.add('bookmarked-dot');
    if (graded) {
      if (answers[i] === q.ans) div.classList.add('correct-dot');
      else if (answers[i] !== undefined) div.classList.add('wrong-dot');
    } else {
      if (answers[i] !== undefined) div.classList.add('answered');
    }
    grid.appendChild(div);
  });
}

// ==============================
// GRADE
// ==============================
function gradeQuiz() {
  graded = true;
  stopTimer();
  document.getElementById('expand-btn').style.display = 'none';
  document.getElementById('expand-all-screen').style.display = 'none';
  expandView = false;
  let correct = 0, wrong = 0;
  const newWrong = new Set();
  questions.forEach((q, i) => {
    const origIdx = ALL_QUESTIONS.indexOf(q);
    if (answers[i] === q.ans) { correct++; wrongSet.delete(origIdx); }
    else { wrong++; newWrong.add(origIdx); wrongSet.add(origIdx); }
  });
  saveWrong();

  const unanswered = questions.length - Object.keys(answers).length;
  const score = Math.round((correct / questions.length) * 100);

  document.getElementById('result-screen').classList.remove('hidden');
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('res-score').textContent = `${score}점`;
  document.getElementById('res-sub').textContent = `총 ${questions.length}문제 중 ${correct}문제 정답`;
  document.getElementById('res-c').textContent = correct;
  document.getElementById('res-w').textContent = wrong + unanswered;
  document.getElementById('res-b').textContent = bookmarks.size;
  setHeaderBtns(false, false, true);

  renderGrid();
}

// ==============================
// UTILS
// ==============================
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
