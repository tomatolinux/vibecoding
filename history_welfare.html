<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사회복지역사 예상문제</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --primary: #1a5276;
    --primary-light: #2e86c1;
    --accent: #e74c3c;
    --accent2: #f39c12;
    --bg: #f0f4f8;
    --card: #ffffff;
    --sidebar: #1a3a5c;
    --sidebar-text: #cfe2f3;
    --correct: #1e8449;
    --wrong: #c0392b;
    --bookmark: #e67e22;
    --border: #d5e8f0;
    --text: #1a252f;
    --muted: #7f8c8d;
    --header-h: 56px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  #header {
    background: var(--primary);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: var(--header-h);
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    z-index: 100;
  }
  #header .title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  #header .title span { font-weight: 300; font-size: 14px; margin-left: 8px; opacity: 0.8; }
  #header .right-info { display: flex; align-items: center; gap: 16px; font-size: 13px; }
  #header .right-info .tag { background: rgba(255,255,255,0.15); border-radius: 4px; padding: 3px 9px; font-size: 12px; }

  /* ── TAB BAR ── */
  #tabbar {
    background: #eaf2f8;
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: flex-end;
    padding: 0 20px;
    gap: 4px;
    flex-shrink: 0;
    overflow-x: auto;
  }
  .tab-btn {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    background: #dce9f5;
    color: var(--primary);
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    white-space: nowrap;
    transition: background .15s;
    flex-shrink: 0;
  }
  .tab-btn.active { background: var(--card); color: var(--primary); font-weight: 700; }

  /* ── BODY LAYOUT ── */
  #body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── MAIN AREA ── */
  #main {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    position: relative;
  }

  /* ── START SCREEN ── */
  #start-screen {
    max-width: 560px;
    margin: 60px auto;
    background: var(--card);
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    padding: 48px 40px;
    text-align: center;
  }
  #start-screen h2 { font-size: 22px; color: var(--primary); margin-bottom: 8px; }
  #start-screen p { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
  .start-options { display: flex; flex-direction: column; gap: 14px; }
  .start-btn {
    padding: 18px 24px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: #f7fbff;
    cursor: pointer;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    color: var(--primary);
    transition: all .2s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .start-btn:hover { border-color: var(--primary-light); background: #eaf3fb; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.08); }
  .start-btn .icon { font-size: 26px; }
  .start-btn small { display: block; font-size: 12px; font-weight: 400; color: var(--muted); margin-top: 2px; }

  /* ── QUESTION CARD ── */
  .q-num { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.5px; }
  .q-text {
    font-size: 15px;
    line-height: 1.75;
    font-weight: 500;
    margin-bottom: 20px;
    color: var(--text);
    white-space: pre-line;
  }
  .q-box {
    background: #f8fbfd;
    border-left: 3px solid var(--primary-light);
    border-radius: 4px;
    padding: 14px 16px;
    margin-bottom: 20px;
    font-size: 14px;
    line-height: 1.8;
    color: #1c2e3e;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    background: var(--card);
    transition: all .15s;
    font-size: 14px;
    line-height: 1.6;
  }
  .option:hover { border-color: var(--primary-light); background: #eaf3fb; }
  .option.selected { border-color: var(--primary); background: #d6eaf8; }
  .option.correct { border-color: var(--correct); background: #eafaf1; color: var(--correct); }
  .option.wrong { border-color: var(--wrong); background: #fdedec; color: var(--wrong); }
  .option .num { font-weight: 700; min-width: 20px; }

  /* OX options */
  .ox-options { display: flex; gap: 16px; margin-top: 4px; }
  .ox-btn {
    flex: 1;
    padding: 18px;
    font-size: 30px;
    font-weight: 700;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    background: var(--card);
    transition: all .15s;
    font-family: inherit;
    text-align: center;
  }
  .ox-btn:hover { border-color: var(--primary-light); background: #eaf3fb; }
  .ox-btn.selected { border-color: var(--primary); background: #d6eaf8; }
  .ox-btn.correct { border-color: var(--correct); background: #eafaf1; color: var(--correct); }
  .ox-btn.wrong { border-color: var(--wrong); background: #fdedec; color: var(--wrong); }

  /* feedback */
  .feedback {
    display: none;
    margin-top: 14px;
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 13.5px;
    font-weight: 600;
    border-left: 3px solid;
  }
  .feedback.correct-fb { display: block; background: #eafaf1; color: var(--correct); border-color: var(--correct); }
  .feedback.wrong-fb { display: block; background: #fdedec; color: var(--wrong); border-color: var(--wrong); }

  /* bottom nav */
  .q-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .nav-btn {
    padding: 9px 22px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--card);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--primary);
    transition: all .15s;
  }
  .nav-btn:hover { background: #eaf3fb; border-color: var(--primary-light); }
  .nav-btn:disabled { opacity: .35; cursor: not-allowed; }
  .nav-btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .nav-btn.primary:hover { background: var(--primary-light); }

  .bm-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 16px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--card);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    transition: all .15s;
  }
  .bm-btn.bookmarked { color: var(--bookmark); border-color: var(--bookmark); background: #fef5e7; }
  .bm-btn:hover { border-color: var(--bookmark); color: var(--bookmark); }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 220px;
    background: var(--sidebar);
    overflow-y: auto;
    flex-shrink: 0;
    padding: 16px 12px;
  }
  #sidebar h4 { color: var(--sidebar-text); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; opacity: 0.7; }
  #q-grid { display: flex; flex-direction: column; gap: 4px; }
  .q-dot {
    width: 100%;
    border-radius: 5px;
    background: rgba(255,255,255,0.1);
    display: flex;
    flex-direction: row;
    align-items: center;
    padding: 7px 10px;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: all .15s;
    border: 1.5px solid transparent;
  }
  .q-dot:hover { background: rgba(255,255,255,0.2); }
  .q-dot.current { border-color: #7fb3d3; color: #fff; background: rgba(255,255,255,0.15); }
  .q-dot.answered { background: rgba(255,255,255,0.15); color: #aed6f1; }
  .q-dot.bookmarked-dot { background: rgba(230,126,34,0.35); border-color: var(--bookmark); color: #f0a500; }
  .q-dot.correct-dot { background: rgba(30,132,73,0.4); color: #82e0aa; }
  .q-dot.wrong-dot { background: rgba(192,57,43,0.45); color: #f1948a; }

  .q-dot .dot-num { min-width: 22px; font-weight: 700; color: rgba(255,255,255,0.75); }
  .q-dot .dot-ans { font-size: 13px; margin-left: 6px; opacity: 0.9; }

  .sidebar-score {
    margin-top: 18px;
    padding: 12px;
    background: rgba(255,255,255,0.07);
    border-radius: 8px;
    color: var(--sidebar-text);
    font-size: 12px;
    line-height: 1.8;
  }
  .sidebar-score strong { font-size: 20px; color: #fff; }
  .score-actions { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .score-actions button {
    padding: 8px 10px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
  }
  .btn-grade { background: var(--accent); color: #fff; }
  .btn-retry { background: var(--bookmark); color: #fff; }
  .btn-home { background: rgba(255,255,255,0.15); color: #fff; }

  /* result screen */
  #result-screen {
    max-width: 580px;
    margin: 40px auto;
    background: var(--card);
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    padding: 40px 36px;
    text-align: center;
  }
  #result-screen h2 { font-size: 24px; color: var(--primary); margin-bottom: 6px; }
  .score-big { font-size: 64px; font-weight: 700; color: var(--primary); line-height: 1; margin: 20px 0 8px; }
  .score-sub { font-size: 15px; color: var(--muted); margin-bottom: 24px; }
  .result-grid { display: flex; gap: 16px; justify-content: center; margin-bottom: 28px; }
  .result-stat { flex: 1; padding: 16px; border-radius: 10px; }
  .result-stat.c { background: #eafaf1; color: var(--correct); }
  .result-stat.w { background: #fdedec; color: var(--wrong); }
  .result-stat.b { background: #fef5e7; color: var(--bookmark); }
  .result-stat .label { font-size: 12px; margin-bottom: 4px; }
  .result-stat .val { font-size: 28px; font-weight: 700; }
  .result-actions { display: flex; flex-direction: column; gap: 10px; }
  .result-actions button {
    padding: 14px; border-radius: 8px; border: none;
    cursor: pointer; font-family: inherit;
    font-size: 14px; font-weight: 700; transition: opacity .15s;
  }
  .result-actions button:hover { opacity: .85; }
  .btn-a { background: var(--accent); color: #fff; }
  .btn-b { background: var(--bookmark); color: #fff; }
  .btn-c { background: var(--primary); color: #fff; }
  .btn-d { background: #ecf0f1; color: var(--text); }

  .hidden { display: none !important; }

  /* ── EXPAND ALL VIEW ── */
  #expand-all-screen { display: none; padding: 24px 28px; }
  .all-q-card {
    background: var(--card);
    border-radius: 10px;
    border: 1.5px solid var(--border);
    padding: 20px 22px;
    margin-bottom: 18px;
  }
  .all-q-card .q-num { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 700; }
  .all-q-card .q-text { font-size: 14px; font-weight: 600; margin-bottom: 14px; line-height: 1.7; white-space: pre-line; }
  .all-q-card .q-box { margin-bottom: 14px; }
  .all-q-card .options { gap: 7px; }
  .all-q-card .option { padding: 9px 13px; font-size: 13px; }
  .all-q-card .ox-options { gap: 12px; }
  .all-q-card .ox-btn { padding: 12px; font-size: 22px; }

  /* timer */
  #timer-box { display: none; }
  .timer-danger { color: #ff6b6b !important; animation: blink .8s step-end infinite; }
  @keyframes blink { 50% { opacity: .4; } }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: #b0c4d8; border-radius: 3px; }
</style>
</head>
<body>

<div id="header">
  <div style="display:flex;align-items:center;gap:14px;">
    <div class="title">사회복지역사 <span>예상문제</span></div>
    <div id="header-quiz-btns" style="display:none;align-items:center;gap:8px;">
      <button onclick="gradeQuiz()" style="padding:6px 14px;border-radius:6px;border:none;background:var(--accent);color:#fff;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;">📊 채점하기</button>
      <button onclick="showStart()" style="padding:6px 14px;border-radius:6px;border:none;background:rgba(255,255,255,0.18);color:#fff;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;">🏠 처음으로</button>
    </div>
  </div>
  <div class="right-info">
    <span class="tag" id="mode-tag">모드 선택 중</span>
    <span id="progress-text" style="font-size:13px;opacity:.85"></span>
    <div id="timer-box" style="display:none;align-items:center;gap:8px;background:rgba(255,255,255,0.12);border-radius:6px;padding:4px 12px;">
      <span style="font-size:11px;opacity:.8;line-height:1.3;">남은<br>시간</span>
      <span id="timer-display" style="font-size:20px;font-weight:700;letter-spacing:1px;font-variant-numeric:tabular-nums;">20:00</span>
    </div>
    <button id="expand-btn" onclick="toggleExpandView()" title="전체 문제 보기" style="display:none;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.3);border-radius:6px;color:#fff;width:38px;height:38px;font-size:20px;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;">⇅</button>
  </div>
</div>

<div id="tabbar" class="hidden"></div>

<div id="body">
  <div id="main">
    <!-- Start Screen -->
    <div id="start-screen">
      <h2>📚 사회복지역사</h2>
      <p>1강~14강 예상문제 · 총 <span id="total-count"></span>문항</p>
      <div class="start-options">
        <button class="start-btn" onclick="startQuiz('random')">
          <span class="icon">🎲</span>
          <div>랜덤 30문제<small>전체 문제 중 무작위로 30문항 출제</small></div>
        </button>
        <button class="start-btn" onclick="startQuiz('all')">
          <span class="icon">📋</span>
          <div>전체 문제 풀기<small>1강부터 14강까지 전체 문항</small></div>
        </button>
        <button class="start-btn" onclick="startQuiz('bookmark')">
          <span class="icon">🔖</span>
          <div>책갈피 문제만 풀기<small>저장된 책갈피 문제만 출제</small></div>
        </button>
        <button class="start-btn" onclick="startQuiz('wrong')">
          <span class="icon">❌</span>
          <div>틀린 문제만 다시 풀기<small>이전 채점에서 틀린 문제만 출제</small></div>
        </button>
      </div>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="hidden">
      <div class="q-num" id="q-num-label"></div>
      <div class="q-text" id="q-text"></div>
      <div class="q-box hidden" id="q-box"></div>
      <div id="options-area"></div>
      <div class="feedback" id="q-feedback"></div>
      <div class="q-nav">
        <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">◀ 이전</button>
        <div style="display:flex;gap:10px;">
          <button class="bm-btn" id="bm-btn" onclick="toggleBookmark()">🔖 책갈피</button>
        </div>
        <button class="nav-btn primary" id="btn-next" onclick="navigate(1)">다음 ▶</button>
      </div>
    </div>

    <!-- Expand All Screen -->
    <div id="expand-all-screen"></div>

    <!-- Result Screen -->
    <div id="result-screen" class="hidden">
      <h2>🎉 채점 결과</h2>
      <div class="score-big" id="res-score"></div>
      <div class="score-sub" id="res-sub"></div>
      <div class="result-grid">
        <div class="result-stat c"><div class="label">✅ 정답</div><div class="val" id="res-c"></div></div>
        <div class="result-stat w"><div class="label">❌ 오답</div><div class="val" id="res-w"></div></div>
        <div class="result-stat b"><div class="label">🔖 책갈피</div><div class="val" id="res-b"></div></div>
      </div>
      <div class="result-actions">
        <button class="btn-a" onclick="startQuiz('wrong')">❌ 틀린 문제만 다시 풀기</button>
        <button class="btn-b" onclick="startQuiz('bookmark')">🔖 책갈피 문제 풀기</button>
        <button class="btn-c" onclick="startQuiz('all')">📋 전체 문제 다시 풀기</button>
        <button class="btn-d" onclick="showStart()">🏠 처음으로</button>
      </div>
    </div>
  </div>

  <div id="sidebar" class="hidden">
    <h4>문제 현황</h4>
    <div id="q-grid"></div>
    <div class="sidebar-score" id="sidebar-score" style="display:none"></div>

  </div>
</div>

<script>
// ==============================
// QUESTION DATA
// ==============================
const ALL_QUESTIONS = [
  // 1강
  {강:"1강",n:1,text:"역사는 인간을 규정한다. 다음 중 역사와 인간의 관계와 가장 거리가 먼 것은 무엇인가?",type:"mc",opts:["인간은 어떤 존재인가","인간은 어떤 권리를 지니는가","누가 인간인가","인간은 어떤 생물학적 특징을 지니는가"],ans:3},
  {강:"1강",n:2,text:"다음 중 역사에 대한 관점이 나머지 셋과 다른 것은 무엇인가?",type:"mc",opts:["역사는 고정불변의 진리이다","역사는 의미의 다발이다","역사는 정치가 빚은 그릇이다","역사는 비판으로 완성된다"],ans:0},
  {강:"1강",n:3,text:"다음 빈칸에 공통적으로 들어갈 내용은 무엇인가?\n모든 사건들이 역사인 것은 아니다. 현재와 과거의 ( ) 과정에서 호명되어 해석된 것들만이 역사적 사실로 기록된다. 한 마디로, 역사는 현재와 과거의 끊임없는 ( )다.",type:"mc",opts:["발전","대화","축적","논증"],ans:1},
  {강:"1강",n:4,text:"다음 내용은 무엇에 관한 것인가?\n역사가와 지식인을 동원한 현재의 권력, 즉 승자가 역사를 결정한다.",type:"mc",opts:["역사는 고정불변의 진리다","역사는 의미의 다발이다","역사는 정치가 빚은 그릇이다","역사는 비판으로 완성된다"],ans:2},
  {강:"1강",n:5,text:"다음 중 사회복지정책의 역사적 맥락을 이해할 때 상관없는 것은 무엇인가?",type:"mc",opts:["이념","세력","정책 발표 요일","물적토대"],ans:2},

  {강:"12강",n:7,text:"다음 중 1981년 제정된 아동복지법, 심신장애자복지법, 노인복지법의 공통된 특징이 아닌 것은 무엇인가?",type:"mc",opts:["가족 책임 우선","시설 수용 중심","잔여주의","국가 책임 중심"],ans:3},
  // 13강
  {강:"13강",n:1,text:"다음 중 1987년 6월 민주항쟁의 성과가 아닌 것은 무엇인가?",type:"mc",opts:["시국사범 석방","대통령 직선제","정당활동 보장","노동 3권 전면 보장"],ans:3},
  {강:"13강",n:2,text:"다음 중 '생산 복지자본주의'의 핵심 특징에 가장 가까운 내용은 무엇인가?",type:"mc",opts:["복지가 경제정책을 결정한다","국가는 시장에 절대 개입하지 않는다","모든 시민에게 보편적 복지를 보장한다","복지는 경제성장의 수단이다"],ans:3},
  {강:"13강",n:3,text:"다음 중 노동자 대투쟁 이후 노동의 최저선을 제도화함으로써, '임금'을 사회정책의 영역으로 편입했다고 평가받는 법률은 무엇인가?",type:"mc",opts:["고용보험","국민연금","최저임금법","의료보험"],ans:2},
  {강:"13강",n:4,text:"다음 중 김대중 정부가 외환위기 극복 과정에서 제시한 복지는 무엇인가?",type:"mc",opts:["선성장 후분배","생산적 복지","잔여적 복지","정의사회 구현"],ans:1},
  {강:"13강",n:5,text:"다음 중 1997년 외환위기 이후 복지가 확대되었던 이유는 무엇인가?",type:"mc",opts:["IMF가 복지 확대를 요구해서","정부 재정이 풍부해져서","사회안전망의 부재가 분명해져서","국민들이 갑자기 부유해져서"],ans:2},
  {강:"13강",n:6,text:"다음 중 1997년 외환위기로 인해 발생한 위기 속에서 국민의 최저생활을 보장하기 위해 제정된 법률은 무엇인가?",type:"mc",opts:["국민기초생활보장법","조선구호령","생활보호법","신빈민법"],ans:0},
  // 14강
  {강:"14강",n:1,text:"다음 중 AI와 인간을 구분하는 것은?",type:"mc",opts:["의사결정하기","의미 이해하기","데이터 분석","패턴 인식"],ans:1},
  {강:"14강",n:2,text:"다음 중 미세노동(Micro-labor)의 특징과 가장 거리가 먼 것은?",type:"mc",opts:["저임금","파편화","노동자성 인정","알고리즘에 의한 작업 지시"],ans:2},
  {강:"14강",n:3,text:"다음 중 디지털 구빈원(Digital Poorhouse)의 특징은 무엇인가?",type:"mc",opts:["신체적 노동 강제","가시적(보이는) 감시","점수에 따른 작동","물리적 격리"],ans:2},
  {강:"14강",n:4,text:"다음 중 노동시장이 유연화되고 플랫폼 노동이 보편화되면서 등장한 프레카리아트(Precariat)는 누구를 의미하는가?",type:"mc",opts:["부유층","실업자","공무원","불안정한 노동계급"],ans:3},
];

document.getElementById('total-count').textContent = ALL_QUESTIONS.length;

// ==============================
// STATE
// ==============================
let questions = [];
let currentIdx = 0;
let answers = {};
let bookmarks = new Set(JSON.parse(localStorage.getItem('sw_hist_bm') || '[]'));
let wrongSet = new Set(JSON.parse(localStorage.getItem('sw_hist_wrong') || '[]'));
let graded = false;
let currentMode = '';
let expandView = false;

// ── TIMER ──
let timerInterval = null;
let timerSeconds = 20 * 60;

function startTimer() {
  clearInterval(timerInterval);
  timerSeconds = 20 * 60;
  updateTimerDisplay();
  const box = document.getElementById('timer-box');
  box.style.display = 'flex';
  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      alert('⏰ 시험 시간이 종료되었습니다!');
      gradeQuiz();
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  document.getElementById('timer-box').style.display = 'none';
}

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  const txt = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const el = document.getElementById('timer-display');
  el.textContent = txt;
  el.className = timerSeconds <= 60 ? 'timer-danger' : '';
}

// ── EXPAND / COLLAPSE ──
function toggleExpandView() {
  expandView = !expandView;
  const btn = document.getElementById('expand-btn');
  const quizScreen = document.getElementById('quiz-screen');
  const expandScreen = document.getElementById('expand-all-screen');
  if (expandView) {
    btn.textContent = '⊟';
    btn.title = '한 문제씩 보기';
    quizScreen.classList.add('hidden');
    expandScreen.style.display = 'block';
    renderExpandAll();
  } else {
    btn.textContent = '⇅';
    btn.title = '전체 문제 보기';
    expandScreen.style.display = 'none';
    quizScreen.classList.remove('hidden');
    renderQuestion();
  }
}

function renderExpandAll() {
  const screen = document.getElementById('expand-all-screen');
  screen.innerHTML = '';
  const nums = ['①','②','③','④'];
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'all-q-card';
    card.id = `all-q-${i}`;

    const numDiv = document.createElement('div');
    numDiv.className = 'q-num';
    numDiv.textContent = `${i + 1} / ${questions.length} 번 문제 · ${q.강}`;
    card.appendChild(numDiv);

    const textDiv = document.createElement('div');
    textDiv.className = 'q-text';
    textDiv.textContent = q.text;
    card.appendChild(textDiv);

    if (q.context) {
      const box = document.createElement('div');
      box.className = 'q-box';
      box.textContent = q.context;
      card.appendChild(box);
    }

    const optsArea = document.createElement('div');
    if (q.type === 'ox') {
      optsArea.className = 'ox-options';
      ['○','X'].forEach(v => {
        const btn = document.createElement('button');
        btn.className = 'ox-btn';
        btn.textContent = v;
        if (answers[i] !== undefined) {
          if (v === q.ans) btn.classList.add('correct');
          if (v === answers[i] && answers[i] !== q.ans) btn.classList.add('wrong');
        } else {
          if (!graded) btn.onclick = () => { answers[i] = v; renderExpandAll(); renderGrid(); };
        }
        optsArea.appendChild(btn);
      });
    } else {
      optsArea.className = 'options';
      q.opts.forEach((opt, oi) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.innerHTML = `<span class="num">${nums[oi]}</span><span>${opt}</span>`;
        if (answers[i] !== undefined) {
          if (oi === q.ans) div.classList.add('correct');
          else if (answers[i] === oi && answers[i] !== q.ans) div.classList.add('wrong');
        } else {
          if (!graded) div.onclick = () => { answers[i] = oi; renderExpandAll(); renderGrid(); };
        }
        optsArea.appendChild(div);
      });
    }
    card.appendChild(optsArea);

    if (answers[i] !== undefined) {
      const fb = document.createElement('div');
      const ok = checkCorrect(q, answers[i]);
      fb.className = `feedback ${ok ? 'correct-fb' : 'wrong-fb'}`;
      if (ok) fb.textContent = '✓ 정답입니다!';
      else {
        const correctAns = q.type === 'ox' ? q.ans : `${nums[q.ans]} ${q.opts[q.ans]}`;
        fb.textContent = `✗ 오답입니다. 정답: ${correctAns}`;
      }
      card.appendChild(fb);
    }

    screen.appendChild(card);
  });
}

function saveBookmarks() { localStorage.setItem('sw_hist_bm', JSON.stringify([...bookmarks])); }
function saveWrong() { localStorage.setItem('sw_hist_wrong', JSON.stringify([...wrongSet])); }

function checkCorrect(q, ua) {
  if (q.type === 'ox') return ua === q.ans;
  return parseInt(ua) === q.ans;
}

// ==============================
// NAVIGATION
// ==============================
function showStart() {
  document.getElementById('start-screen').classList.remove('hidden');
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('expand-all-screen').style.display = 'none';
  document.getElementById('tabbar').classList.add('hidden');
  document.getElementById('sidebar').classList.add('hidden');
  document.getElementById('header-quiz-btns').style.display = 'none';
  stopTimer();
  graded = false; answers = {}; questions = []; currentIdx = 0; expandView = false;
}

function startQuiz(mode) {
  currentMode = mode;
  graded = false; answers = {}; currentIdx = 0; expandView = false;

  if (mode === 'random') {
    questions = shuffle([...ALL_QUESTIONS]).slice(0, 30);
    document.getElementById('mode-tag').textContent = '랜덤 30문제';
  } else if (mode === 'all') {
    questions = [...ALL_QUESTIONS];
    document.getElementById('mode-tag').textContent = `전체 ${ALL_QUESTIONS.length}문제`;
  } else if (mode === 'bookmark') {
    const bmIds = [...bookmarks];
    questions = ALL_QUESTIONS.filter((_, i) => bmIds.includes(i));
    if (questions.length === 0) { alert('📌 책갈피된 문제가 없습니다.'); return; }
    document.getElementById('mode-tag').textContent = `책갈피 ${questions.length}문제`;
  } else if (mode === 'wrong') {
    questions = [...wrongSet].map(i => ALL_QUESTIONS[i]).filter(Boolean);
    if (questions.length === 0) { alert('✅ 틀린 문제가 없습니다!'); return; }
    document.getElementById('mode-tag').textContent = `오답 ${questions.length}문제`;
  }

  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('expand-all-screen').style.display = 'none';
  document.getElementById('quiz-screen').classList.remove('hidden');
  document.getElementById('tabbar').classList.remove('hidden');
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('sidebar-score').style.display = 'none';
  document.getElementById('expand-btn').style.display = 'flex';
  document.getElementById('expand-btn').textContent = '⇅';
  document.getElementById('header-quiz-btns').style.display = 'flex';
  if (mode === 'random') {
    startTimer();
  } else {
    stopTimer();
  }
  buildTabbar();
  renderQuestion();
  renderGrid();
}

function navigate(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= questions.length) return;
  currentIdx = newIdx;
  renderQuestion();
  renderGrid();
}

function goToQuestion(i) {
  if (expandView) {
    const card = document.getElementById(`all-q-${i}`);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    currentIdx = i; renderGrid(); return;
  }
  currentIdx = i; renderQuestion(); renderGrid();
}

// ── TABBAR (강 단위) ──
function buildTabbar() {
  const bar = document.getElementById('tabbar');
  bar.innerHTML = '';
  const groups = [...new Set(questions.map(q => q.강))];
  groups.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.dataset.group = g;
    btn.onclick = () => {
      const idx = questions.findIndex(q => q.강 === g);
      if (idx >= 0) goToQuestion(idx);
    };
    bar.appendChild(btn);
  });
  updateTabbar();
}

function updateTabbar() {
  const groups = [...new Set(questions.map(q => q.강))];
  document.querySelectorAll('.tab-btn').forEach(btn => {
    const g = btn.dataset.group;
    const total = questions.filter(q => q.강 === g).length;
    const done = questions.filter((q, idx) => q.강 === g && answers[idx] !== undefined).length;
    btn.textContent = `${g} (${done}/${total})`;
    btn.classList.toggle('active', questions[currentIdx] && questions[currentIdx].강 === g);
  });
}

// ==============================
// RENDER QUESTION
// ==============================
function renderQuestion() {
  const q = questions[currentIdx];
  if (!q) return;

  document.getElementById('q-num-label').textContent = `${currentIdx + 1} / ${questions.length} 번 문제 · ${q.강}`;
  document.getElementById('q-text').textContent = q.text;

  const qBox = document.getElementById('q-box');
  if (q.context) { qBox.textContent = q.context; qBox.classList.remove('hidden'); }
  else { qBox.classList.add('hidden'); }

  const optsArea = document.getElementById('options-area');
  optsArea.innerHTML = '';

  const nums = ['①','②','③','④'];
  const ua = answers[currentIdx];

  if (q.type === 'ox') {
    const wrap = document.createElement('div');
    wrap.className = 'ox-options';
    ['○','X'].forEach(v => {
      const btn = document.createElement('button');
      btn.className = 'ox-btn';
      btn.textContent = v;
      if (ua !== undefined) {
        if (v === q.ans) btn.classList.add('correct');
        if (v === ua && ua !== q.ans) btn.classList.add('wrong');
      } else {
        if (!graded) btn.onclick = () => selectOption(v);
      }
      wrap.appendChild(btn);
    });
    optsArea.appendChild(wrap);
  } else {
    const wrap = document.createElement('div');
    wrap.className = 'options';
    q.opts.forEach((opt, oi) => {
      const div = document.createElement('div');
      div.className = 'option';
      div.innerHTML = `<span class="num">${nums[oi]}</span><span>${opt}</span>`;
      if (graded || ua !== undefined) {
        if (oi === q.ans) div.classList.add('correct');
        else if (ua === oi && ua !== q.ans) div.classList.add('wrong');
      } else {
        div.onclick = () => selectOption(oi);
      }
      wrap.appendChild(div);
    });
    optsArea.appendChild(wrap);
  }

  // feedback
  const fb = document.getElementById('q-feedback');
  if (ua !== undefined) {
    const ok = checkCorrect(q, ua);
    fb.className = `feedback ${ok ? 'correct-fb' : 'wrong-fb'}`;
    if (ok) fb.textContent = '✓ 정답입니다!';
    else {
      const correctAns = q.type === 'ox' ? q.ans : `${nums[q.ans]} ${q.opts[q.ans]}`;
      fb.textContent = `✗ 오답입니다. 정답: ${correctAns}`;
    }
  } else {
    fb.className = 'feedback';
  }

  // bookmark
  const origIdx = ALL_QUESTIONS.indexOf(q);
  const bmBtn = document.getElementById('bm-btn');
  if (bookmarks.has(origIdx)) { bmBtn.classList.add('bookmarked'); bmBtn.textContent = '🔖 책갈피됨'; }
  else { bmBtn.classList.remove('bookmarked'); bmBtn.textContent = '🔖 책갈피'; }

  document.getElementById('btn-prev').disabled = currentIdx === 0;
  document.getElementById('btn-next').textContent = currentIdx === questions.length - 1 ? '완료' : '다음 ▶';

  const answered = Object.keys(answers).length;
  document.getElementById('progress-text').textContent = `${answered} / ${questions.length} 문제 응답`;

  updateTabbar();
}

function selectOption(val) {
  if (graded) return;
  answers[currentIdx] = val;
  renderQuestion();
  renderGrid();
  document.getElementById('progress-text').textContent = `${Object.keys(answers).length} / ${questions.length} 문제 응답`;
}

function toggleBookmark() {
  const q = questions[currentIdx];
  const origIdx = ALL_QUESTIONS.indexOf(q);
  if (bookmarks.has(origIdx)) bookmarks.delete(origIdx);
  else bookmarks.add(origIdx);
  saveBookmarks();
  renderQuestion();
  renderGrid();
}

// ==============================
// RENDER GRID
// ==============================
function renderGrid() {
  const grid = document.getElementById('q-grid');
  grid.innerHTML = '';
  const nums = ['①','②','③','④'];
  questions.forEach((q, i) => {
    const origIdx = ALL_QUESTIONS.indexOf(q);
    const div = document.createElement('div');
    div.className = 'q-dot';

    const numEl = document.createElement('span');
    numEl.className = 'dot-num';
    numEl.textContent = i + 1;
    div.appendChild(numEl);

    if (answers[i] !== undefined) {
      const ansEl = document.createElement('span');
      ansEl.className = 'dot-ans';
      ansEl.textContent = q.type === 'ox' ? answers[i] : nums[answers[i]];
      div.appendChild(ansEl);
    }

    div.onclick = () => goToQuestion(i);
    if (i === currentIdx) div.classList.add('current');
    if (bookmarks.has(origIdx)) div.classList.add('bookmarked-dot');
    if (graded) {
      if (checkCorrect(q, answers[i])) div.classList.add('correct-dot');
      else if (answers[i] !== undefined) div.classList.add('wrong-dot');
    } else {
      if (answers[i] !== undefined) div.classList.add('answered');
    }
    grid.appendChild(div);
  });
}

// ==============================
// GRADE
// ==============================
function gradeQuiz() {
  graded = true;
  stopTimer();
  document.getElementById('header-quiz-btns').style.display = 'none';
  document.getElementById('expand-btn').style.display = 'none';
  document.getElementById('expand-all-screen').style.display = 'none';
  expandView = false;

  let correct = 0, wrong = 0;
  questions.forEach((q, i) => {
    const origIdx = ALL_QUESTIONS.indexOf(q);
    if (checkCorrect(q, answers[i])) { correct++; wrongSet.delete(origIdx); }
    else { wrong++; wrongSet.add(origIdx); }
  });
  saveWrong();

  const unanswered = questions.length - Object.keys(answers).length;
  const score = Math.round((correct / questions.length) * 100);

  document.getElementById('result-screen').classList.remove('hidden');
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('res-score').textContent = `${score}점`;
  document.getElementById('res-sub').textContent = `총 ${questions.length}문제 중 ${correct}문제 정답`;
  document.getElementById('res-c').textContent = correct;
  document.getElementById('res-w').textContent = wrong + unanswered;
  document.getElementById('res-b').textContent = bookmarks.size;
  renderGrid();
}

// ==============================
// UTILS
// ==============================
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
