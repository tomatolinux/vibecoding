<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>장애인복지론 예상문제 1~150</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --primary: #1a5276;
    --primary-light: #2e86c1;
    --accent: #e74c3c;
    --accent2: #f39c12;
    --bg: #f0f4f8;
    --card: #ffffff;
    --sidebar: #1a3a5c;
    --sidebar-text: #cfe2f3;
    --correct: #1e8449;
    --wrong: #c0392b;
    --bookmark: #e67e22;
    --border: #d5e8f0;
    --text: #1a252f;
    --muted: #7f8c8d;
    --header-h: 56px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  #header {
    background: var(--primary);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: var(--header-h);
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    z-index: 100;
  }
  #header .title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  #header .title span { font-weight: 300; font-size: 14px; margin-left: 8px; opacity: 0.8; }
  #header .right-info { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  #header .right-info .tag { background: rgba(255,255,255,0.15); border-radius: 4px; padding: 3px 9px; font-size: 12px; }

  .header-action-btn {
    padding: 6px 13px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    transition: opacity .15s;
    display: none;
  }
  .header-action-btn:hover { opacity: .85; }
  #btn-header-grade { background: #e74c3c; color: #fff; }
  #btn-header-retry { background: #e67e22; color: #fff; }
  #btn-header-home  { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); }

  #tabbar {
    background: #eaf2f8;
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: flex-end;
    padding: 0 20px;
    gap: 4px;
    flex-shrink: 0;
    overflow-x: auto;
  }
  .tab-btn {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    background: #dce9f5;
    color: var(--primary);
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    transition: background .15s;
    white-space: nowrap;
  }
  .tab-btn.active { background: var(--card); color: var(--primary); font-weight: 700; }

  #body { display: flex; flex: 1; overflow: hidden; }

  #main { flex: 1; overflow-y: auto; padding: 24px 28px; position: relative; }

  #start-screen {
    max-width: 560px;
    margin: 40px auto;
    background: var(--card);
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    padding: 48px 40px;
    text-align: center;
  }
  #start-screen h2 { font-size: 22px; color: var(--primary); margin-bottom: 8px; }
  #start-screen p { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
  .start-options { display: flex; flex-direction: column; gap: 14px; }
  .start-btn {
    padding: 18px 24px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: #f7fbff;
    cursor: pointer;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    color: var(--primary);
    transition: all .2s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .start-btn:hover { border-color: var(--primary-light); background: #eaf3fb; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.08); }
  .start-btn .icon { font-size: 26px; }
  .start-btn small { display: block; font-size: 12px; font-weight: 400; color: var(--muted); margin-top: 2px; }

  .q-num { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.5px; }
  .q-text { font-size: 15px; line-height: 1.75; font-weight: 500; margin-bottom: 20px; color: var(--text); }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    background: var(--card);
    transition: all .15s;
    font-size: 14px;
    line-height: 1.6;
  }
  .option:hover { border-color: var(--primary-light); background: #eaf3fb; }
  .option.selected { border-color: var(--primary); background: #d6eaf8; color: var(--primary); font-weight: 600; }
  .option.correct { border-color: var(--correct); background: #eafaf1; color: var(--correct); }
  .option.wrong { border-color: var(--wrong); background: #fdedec; color: var(--wrong); }
  .option.show-correct { border-color: var(--correct); background: #eafaf1; color: var(--correct); }
  .option .num { font-weight: 700; min-width: 20px; }

  .explanation {
    display: none;
    margin-top: 16px;
    padding: 14px 16px;
    background: #fdfaf0;
    border-left: 3px solid var(--accent2);
    border-radius: 4px;
    font-size: 13.5px;
    line-height: 1.75;
    color: #5d4037;
  }
  .explanation.show { display: block; }
  .exp-label { font-weight: 700; color: var(--accent2); margin-bottom: 4px; }

  .q-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .nav-btn {
    padding: 9px 22px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--card);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--primary);
    transition: all .15s;
  }
  .nav-btn:hover { background: #eaf3fb; border-color: var(--primary-light); }
  .nav-btn:disabled { opacity: .35; cursor: not-allowed; }
  .nav-btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .nav-btn.primary:hover { background: var(--primary-light); }

  .bm-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 16px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--card);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    transition: all .15s;
  }
  .bm-btn.bookmarked { color: var(--bookmark); border-color: var(--bookmark); background: #fef5e7; }
  .bm-btn:hover { border-color: var(--bookmark); color: var(--bookmark); }

  #sidebar {
    width: 220px;
    background: var(--sidebar);
    overflow-y: auto;
    flex-shrink: 0;
    padding: 16px 12px;
  }
  #sidebar h4 { color: var(--sidebar-text); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; opacity: 0.7; }
  #q-grid { display: flex; flex-direction: column; gap: 4px; }
  .q-dot {
    width: 100%;
    border-radius: 5px;
    background: rgba(255,255,255,0.1);
    display: flex;
    flex-direction: row;
    align-items: center;
    padding: 7px 10px;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: all .15s;
    border: 1.5px solid transparent;
  }
  .q-dot:hover { background: rgba(255,255,255,0.2); }
  .q-dot.current { border-color: #7fb3d3; color: #fff; background: rgba(255,255,255,0.15); }
  .q-dot.answered { background: rgba(255,255,255,0.15); color: #aed6f1; }
  .q-dot.bookmarked-dot { background: rgba(230,126,34,0.35); border-color: var(--bookmark); color: #f0a500; }
  .q-dot.correct-dot { background: rgba(30,132,73,0.4); color: #82e0aa; }
  .q-dot.wrong-dot { background: rgba(192,57,43,0.45); color: #f1948a; }
  .q-dot .dot-num { min-width: 22px; font-weight: 700; color: rgba(255,255,255,0.75); font-size: 11px; }
  .q-dot .dot-ans { font-size: 12px; margin-left: 4px; background: rgba(255,255,255,0.88); color: var(--sidebar); border-radius: 3px; padding: 1px 5px; font-weight: 700; }

  .sidebar-score { margin-top: 18px; padding: 12px; background: rgba(255,255,255,0.07); border-radius: 8px; color: var(--sidebar-text); font-size: 12px; line-height: 1.8; }
  .sidebar-score strong { font-size: 20px; color: #fff; }
  .score-actions { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .score-actions button { padding: 8px 10px; border-radius: 6px; border: none; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 700; }
  .btn-grade { background: var(--accent); color: #fff; }
  .btn-retry { background: var(--bookmark); color: #fff; }
  .btn-home { background: rgba(255,255,255,0.15); color: #fff; }

  #result-screen {
    max-width: 580px;
    margin: 40px auto;
    background: var(--card);
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    padding: 40px 36px;
    text-align: center;
  }
  #result-screen h2 { font-size: 24px; color: var(--primary); margin-bottom: 6px; }
  .score-big { font-size: 64px; font-weight: 700; color: var(--primary); line-height: 1; margin: 20px 0 8px; }
  .score-sub { font-size: 15px; color: var(--muted); margin-bottom: 24px; }
  .result-grid { display: flex; gap: 16px; justify-content: center; margin-bottom: 28px; }
  .result-stat { flex: 1; padding: 16px; border-radius: 10px; }
  .result-stat.c { background: #eafaf1; color: var(--correct); }
  .result-stat.w { background: #fdedec; color: var(--wrong); }
  .result-stat.b { background: #fef5e7; color: var(--bookmark); }
  .result-stat .label { font-size: 12px; margin-bottom: 4px; }
  .result-stat .val { font-size: 28px; font-weight: 700; }
  .result-actions { display: flex; flex-direction: column; gap: 10px; }
  .result-actions button { padding: 14px; border-radius: 8px; border: none; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 700; transition: opacity .15s; }
  .result-actions button:hover { opacity: .85; }
  .btn-a { background: var(--accent); color: #fff; }
  .btn-b { background: var(--bookmark); color: #fff; }
  .btn-c { background: var(--primary); color: #fff; }
  .btn-d { background: #ecf0f1; color: var(--text); }

  .hidden { display: none !important; }

  #expand-all-screen { display: none; padding: 24px 28px; }
  .all-q-card { background: var(--card); border-radius: 10px; border: 1.5px solid var(--border); padding: 20px 22px; margin-bottom: 18px; }
  .all-q-card .q-num { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 700; }
  .all-q-card .q-text { font-size: 14px; font-weight: 600; margin-bottom: 14px; line-height: 1.7; }
  .all-q-card .options { gap: 7px; }
  .all-q-card .option { padding: 9px 13px; font-size: 13px; }

  #timer-box { display: none; }
  .timer-danger { color: #ff6b6b !important; animation: blink .8s step-end infinite; }
  @keyframes blink { 50% { opacity: .4; } }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: #b0c4d8; border-radius: 3px; }
</style>
</head>
<body>

<div id="header">
  <div class="title">장애인복지론 <span>예상문제</span></div>
  <div class="right-info">
    <span class="tag" id="mode-tag">모드 선택 중</span>
    <span id="progress-text" style="font-size:13px;opacity:.85"></span>
    <div id="timer-box" style="display:none;align-items:center;gap:8px;background:rgba(255,255,255,0.12);border-radius:6px;padding:4px 12px;">
      <span style="font-size:11px;opacity:.8;line-height:1.3;">남은<br>시간</span>
      <span id="timer-display" style="font-size:20px;font-weight:700;letter-spacing:1px;font-variant-numeric:tabular-nums;">20:00</span>
    </div>
    <button id="btn-header-grade" class="header-action-btn" onclick="gradeQuiz()">📊 채점하기</button>
    <button id="btn-header-retry" class="header-action-btn" onclick="retryQuiz()">🔄 다시하기</button>
    <button id="btn-header-home"  class="header-action-btn" onclick="showStart()">🏠 처음으로</button>
    <button id="expand-btn" onclick="toggleExpandView()" title="전체보기/한문제씩" style="display:none;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.3);border-radius:6px;color:#fff;width:38px;height:38px;font-size:20px;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;">⇅</button>
  </div>
</div>

<div id="tabbar" class="hidden"></div>

<div id="body">
  <div id="main">
    <!-- Start Screen -->
    <div id="start-screen">
      <h2>♿ 장애인복지론</h2>
      <p>예상문제 1~150번 · 총 150문항</p>
      <div class="start-options">
        <button class="start-btn" onclick="startQuiz('random')">
          <span class="icon">🎲</span>
          <div>
            랜덤 30문제
            <small>전체 문제 중 무작위로 30문항 출제 · ⏱ 20분 제한</small>
          </div>
        </button>
        <button class="start-btn" onclick="startQuiz('all')">
          <span class="icon">📋</span>
          <div>
            전체 문제 풀기
            <small>1번부터 150번까지 전체 150문항 · 시간 제한 없음</small>
          </div>
        </button>
        <button class="start-btn" onclick="startQuiz('bookmark')">
          <span class="icon">🔖</span>
          <div>
            책갈피 문제만 풀기
            <small>저장된 책갈피 문제만 출제</small>
          </div>
        </button>
        <button class="start-btn" onclick="startQuiz('wrong')">
          <span class="icon">❌</span>
          <div>
            틀린 문제만 다시 풀기
            <small>이전 채점에서 틀린 문제만 출제</small>
          </div>
        </button>
      </div>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="hidden">
      <div class="q-num" id="q-num-label"></div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options"></div>
      <div class="explanation" id="explanation">
        <div class="exp-label">💡 해설</div>
        <div id="exp-text"></div>
      </div>
      <div class="q-nav">
        <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">◀ 이전</button>
        <div style="display:flex;gap:10px;">
          <button class="bm-btn" id="bm-btn" onclick="toggleBookmark()">🔖 책갈피</button>
        </div>
        <button class="nav-btn primary" id="btn-next" onclick="navigate(1)">다음 ▶</button>
      </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="hidden">
      <h2>🎉 채점 결과</h2>
      <div class="score-big" id="res-score"></div>
      <div class="score-sub" id="res-sub"></div>
      <div class="result-grid">
        <div class="result-stat c"><div class="label">✅ 정답</div><div class="val" id="res-c"></div></div>
        <div class="result-stat w"><div class="label">❌ 오답</div><div class="val" id="res-w"></div></div>
        <div class="result-stat b"><div class="label">🔖 책갈피</div><div class="val" id="res-b"></div></div>
      </div>
      <div class="result-actions">
        <button class="btn-a" onclick="startQuiz('wrong')">❌ 틀린 문제만 다시 풀기</button>
        <button class="btn-b" onclick="startQuiz('bookmark')">🔖 책갈피 문제 풀기</button>
        <button class="btn-c" onclick="startQuiz('all')">📋 전체 문제 다시 풀기</button>
        <button class="btn-d" onclick="showStart()">🏠 처음으로</button>
      </div>
    </div>

    <!-- Expand All Screen -->
    <div id="expand-all-screen"></div>
  </div>

  <div id="sidebar" class="hidden">
    <h4>문제 현황</h4>
    <div id="q-grid"></div>
    <div class="sidebar-score">
      <div id="sb-progress">0 / 0 응답</div>
      <div class="score-actions">
        <button class="btn-grade" onclick="gradeQuiz()">📊 채점하기</button>
        <button class="btn-retry" onclick="retryQuiz()">🔄 다시하기</button>
        <button class="btn-home" onclick="showStart()">🏠 처음으로</button>
      </div>
    </div>
  </div>
</div>

<script>
// ==============================
// QUESTION DATA (150 questions)
// ==============================
const ALL_QUESTIONS = [
  // 1~10
  {n:1, q:"WHO에서 발표한 장애에 관한 분류기준이 아닌 것은?", opts:["ICIDH","ICIDH-2","ICF","IMF"], ans:3, exp:"세계보건기구(WHO)의 국제장애 분류기준은 ICIDH(1980), ICIDH-2(1997), ICF(2001)입니다. IMF는 국제통화기금입니다."},
  {n:2, q:"장애개념의 분류기준이 ICIDH가 아닌 것은?", opts:["손상","기능장애","사회적 불리","참여"], ans:3, exp:"ICIDH(1980)의 기준은 손상, 기능·능력 장애, 사회적 불리입니다. '참여'는 ICIDH-2(1997)와 ICF(2001)에서 사용되는 개념입니다."},
  {n:3, q:"개인적 장애나 질병과 상황적 맥락과의 상호작용에 의해 장애를 설명하는 틀은?", opts:["ICIDH","ICIDH-2","ICF","WHO"], ans:2, exp:"ICF(2001)는 개인의 건강 상태와 상황적 맥락(환경 및 개인적 요소)의 상호작용으로 기능과 장애를 설명하는 보편적인 틀입니다."},
  {n:4, q:"WHO의 장애 개념 분류기준 중 ICF가 아닌 것은?", opts:["참여","활동","환경적 요소","손상"], ans:3, exp:"손상은 ICIDH(1980)와 ICIDH-2(1997)의 기준입니다. ICF는 신체기능과 구조(손상 포함), 활동과 참여, 상황적 요인으로 분류합니다."},
  {n:5, q:"장애개념에 대한 사회적 모델 관점의 설명으로 옳지 않은 것은?", opts:["'사회행동 모델'이라고도 한다.","장애를 사회적 억압에서 비롯된 문제로 간주한다.","심리적 고통을 고려하지 못한다는 지적이 있다.","재활전문가의 역할이 중요하다."], ans:3, exp:"재활전문가의 역할이 중요하다고 보는 것은 장애의 원인을 개인의 결함으로 보는 개별적(의료적) 모델의 관점입니다."},
  {n:6, q:"장애개념에 대한 사회적 모델 관점의 설명으로 옳지 않은 것은?", opts:["손상을 가진 사람을 '장애화'하는 것은 사회라고 본다.","차별적 사회 기제를 없애는 것이 중요한 이슈이다.","장애인 운동을 촉발시키는 계기를 제공하였다.","장애인을 비장애인과 차이가 있는 집단으로 취급한다."], ans:3, exp:"사회적 모델은 장애인을 차이가 있는 집단이 아니라 사회구조와 환경 문제로 인해 차별을 받는 집단으로 봅니다."},
  {n:7, q:"장애개념에 대한 사회적 모델 관점의 설명으로 옳지 않은 것은?", opts:["장애는 사회적 억압에서 비롯된 문제이다.","손상을 가진 사람을 장애화하는 것은 사회이다.","장애인 운동을 촉발시키는 계기가 되었다.","장애 문제가 발생하는 원인은 장애인의 기능적 제한이나 심리적 상실이다."], ans:3, exp:"기능적 제한이나 심리적 상실을 장애의 원인으로 보는 것은 개별적(의료적) 모델의 설명입니다."},
  {n:8, q:"다음 중 장애를 바라보는 관점이 다른 하나는?", opts:["부적절하게 설계된 버스로 인해 휠체어 이용장애인이 버스를 타기가 어렵다.","청각 장애로 인해 다른 사람과 의사소통하는 데 어려움이 있다.","시각 장애로 인해 세미나에 참여할 수 없다.","중증장애로 인해 친구를 만나러 가는 것이 힘들다."], ans:0, exp:"①번은 환경적 요인을 강조하는 사회적 관점이며, 나머지는 장애(손상) 자체에 초점을 둔 개별적 관점입니다."},
  {n:9, q:"다음 중 장애를 바라보는 관점이 다른 하나는?", opts:["부적절하게 설계된 버스로 인해 휠체어 이용장애인이 버스를 이용하는 데 어려움이 있다.","청각상 문제로 다른 사람과 의사소통하는 데 문제가 있다.","내가 가진 장애로 인해 특수학교에 다니고 있다.","장애로 인해 친구를 만나러 가는 것이 힘들다."], ans:0, exp:"①번은 사회적 관점(환경 중심)이며, ②③④번은 개별적 관점입니다."},
  {n:10, q:"다음 중 장애를 바라보는 관점이 다른 하나는?", opts:["사람들이 수어를 사용하지 못해 청각 장애인은 의사소통에 어려움이 있다.","휠체어를 이용하기 때문에 버스를 타는 데 어려움이 있다.","장애를 가지고 있어 취업이 안 된다.","나는 장애인이기 때문에 특수학교에 다닐 수밖에 없다."], ans:0, exp:"①번은 타인의 태도나 사회적 환경을 원인으로 보는 사회적 관점입니다."},

  // 11~20
  {n:11, q:"장애인 정의에 대한 설명으로 옳지 않은 것은?", opts:["'장애인'이라는 단어는 「장애인복지법」에서 처음 사용하였다.","「장애인복지법」상 장애인에 대한 정의는 개별적 모델을 따르는 경향이 크다.","「장애인복지법」상 정신적 장애란 발달장애와 정신장애를 말한다.","장애인 정의와 범주는 모든 국가가 동일하다."], ans:3, exp:"장애인의 정의와 범주는 국가의 정치, 경제, 사회적 상황에 따라 다르게 규정됩니다."},
  {n:12, q:"장애인 명칭에 대한 설명으로 가장 적절하지 않은 것은?", opts:["'장애'라는 표현이 공식화된 것은 1981년 「심신장애자복지법」 제정 이후이다.","'장애우'라는 명칭은 법적 용어가 아니다.","'여성 장애인'보다는 '장애 여성'이라는 명칭이 더 바람직하다.","장애가 없는 사람은 '정상인'으로 표현해야 한다."], ans:3, exp:"장애가 없는 사람은 '정상인'이나 '일반인'이 아니라 '비장애인'으로 표현하는 것이 옳습니다."},
  {n:13, q:"장애와 관련된 호칭으로 적절하지 않은 것은?", opts:["비장애인","장애 여성","휠체어 이용장애인","목발 장애인"], ans:3, exp:"'목발 장애인'보다는 '목발 이용장애인'이 더 적절한 표현입니다."},
  {n:14, q:"장애와 관련된 호칭으로 바른 표현이 아닌 것은?", opts:["장애 여성","농인","휠체어 이용장애인","정상인"], ans:3, exp:"'정상인'은 장애인을 비정상적인 존재로 전제하는 표현이므로 '비장애인'으로 써야 합니다."},
  {n:15, q:"장애인복지의 이념으로 가장 적절하지 않은 것은?", opts:["정상화","자기 결정","사회정의","자유와 민주화"], ans:3, exp:"장애인복지의 주요 이념은 인간의 존엄성과 인권, 정상화, 자기 결정, 사회정의, 사회통합 등입니다."},
  {n:16, q:"장애인복지 이념에 대한 설명으로 옳지 않은 것은?", opts:["「헌법」에는 인권존중의 이념이 담겨 있다.","정상화는 일반적인 생활환경 속에서 일상적인 생활을 하도록 하는 이념이다.","사회통합은 제한이 없는 환경으로 정의할 수 있다.","자기 결정은 행동의 독립적인 수행만을 의미하는 개념이다."], ans:3, exp:"자기 결정은 단순히 행동을 혼자 하는 것을 넘어 자신의 삶을 스스로 선택하고 통제하는 것을 의미합니다."},
  {n:17, q:"장애인복지 이념 중 타인에게 의존하는 삶을 최소화하면서 자신의 삶을 스스로 통제하는 것은?", opts:["자기 결정","정상화","사회정의","사회통합"], ans:0, exp:"이는 자기 결정(Self-determination)에 대한 정의입니다."},
  {n:18, q:"장애인복지 이념 중 차별 또는 배제 없이 장애인도 비장애인과 함께 지역사회에서 사회구성원으로 살아가는 과정은?", opts:["사회통합","사회정의","자기 결정","정상화"], ans:0, exp:"이는 사회통합(Social Integration)에 대한 설명입니다."},
  {n:19, q:"장애인복지 패러다임의 변화단계가 순서대로 바르게 연결된 것은?", opts:["보호 - 지원 - 자립","지원 - 자립 - 보호","지원 - 보호 - 자립","보호 - 자립 - 지원"], ans:0, exp:"패러다임은 시설 수용(보호)에서 재활(지원), 그리고 지역사회 참여(자립)로 변화해 왔습니다."},
  {n:20, q:"자립 생활 모델에 대한 설명으로 옳지 않은 것은?", opts:["자립 생활 모델이 추구하는 목표는 자립 생활이다.","문제를 환경, 사회, 재활 과정으로 본다.","장애에 대하여 있는 그대로 승인하는 긍정과 지지가 중요하다.","문제해결을 위해서 의사 등 전문가가 반드시 필요하다."], ans:3, exp:"전문가 중심의 해결을 강조하는 것은 '재활 모델'이며, 자립 생활 모델은 소비자(장애인 당사자) 주권과 동료 상담을 중시합니다."},

  // 21~30
  {n:21, q:"장애인복지 패러다임에 대한 설명으로 옳지 않은 것은?", opts:["재활 모델에서 자립 생활 모델로 변화되었다.","서비스 제공자 중심에서 소비자 중심 관점으로 전환되었다.","자립 생활 모델은 장애인 당사자의 역량 강화를 중요하게 고려한다.","자립 생활 모델에서 문제는 장애인 개인에게 있다고 본다."], ans:3, exp:"자립 생활 모델은 문제의 원인이 개인이 아닌 환경이나 사회적 장벽에 있다고 봅니다."},
  {n:22, q:"장애인에 대한 부정적 태도를 변화시키기 위한 가장 바람직한 방법은?", opts:["장애인 접촉과 정보제공을 동시에 제공","장애인과 접촉강화","장애인에 대한 정보제공","장애체험"], ans:0, exp:"접촉 없는 정보제공은 지식만 늘릴 뿐 태도 변화에는 한계가 있으므로 접촉과 정보를 병행하는 것이 가장 효과적입니다."},
  {n:23, q:"장애인에 대한 태도 개선을 위해 적절하지 않은 것은?", opts:["장애인과의 접촉이 중요하다.","장애에 대한 정보제공이 필요하다.","'역할 바꾸어보기'가 필요하다.","'장애체험'은 장애인에 대한 태도 개선의 바람직한 방법이 아니다."], ans:3, exp:"장애체험은 이해를 높일 수도 있지만 동정심 유발 등의 부작용이 있으므로 '역할 바꾸어보기' 등의 긍정적 방법과 병행해야 합니다."},
  {n:24, q:"장애인과 관련해서 언론이 가장 신중하게 사용해야 할 단어는?", opts:["극복","인권","자립 생활","사회통합"], ans:0, exp:"'극복'이라는 표현은 장애를 반드시 이겨내야 할 부정적인 것으로 전제하며, 실패 시 개인의 노력 부족으로 치부할 위험이 있습니다."},
  {n:25, q:"「장애인복지법」상 장애범주에 포함되지 않는 장애 유형은?", opts:["지적장애","호흡기장애","뇌전증장애","알코올중독"], ans:3, exp:"우리나라는 법정 15개 장애 유형을 규정하고 있으며, 알코올중독은 포함되지 않습니다."},
  {n:26, q:"「장애인복지법」상 장애범주에 포함되지 않는 유형은?", opts:["뇌병변장애","장루·요루장애","뇌전증장애","치매"], ans:3, exp:"치매는 「노인복지법」이나 「장기요양보험법」의 영역이며, 「장애인복지법」상 장애 유형에는 해당하지 않습니다."},
  {n:27, q:"2003년에 장애범주 확대에 따라 추가된 장애 유형이 아닌 것은?", opts:["호흡기장애","안면장애","뇌전증장애","신장장애"], ans:3, exp:"신장장애는 2000년에 이미 추가되었습니다. 2003년에는 호흡기, 간, 안면, 장루·요루, 뇌전증장애가 추가되었습니다."},
  {n:28, q:"장애 유형별 특성에 대한 설명으로 옳지 않은 것은?", opts:["등록장애인 중 지체장애가 가장 많은 비율을 차지하고 있다.","안면장애는 사회적 장애의 대표적인 사례이다.","지적장애는 지능지수가 70 이하인 사람을 말한다.","뇌전증장애는 뇌졸중, 뇌성마비 등으로 발생한 장애이다."], ans:3, exp:"뇌졸중이나 뇌성마비로 인한 장애는 '뇌병변장애'입니다."},
  {n:29, q:"장애 유형별 특성에 대한 설명으로 옳지 않은 것은?", opts:["우리나라의 장애 유형은 15개로 외국의 장애 유형과 다르다.","지적장애는 지능지수가 70 이하로 학습 및 일상생활에 지원이 필요하다.","안면장애는 사회적 장애의 대표적인 장애 유형이다.","등록장애인 중 지적장애가 가장 많은 비율을 차지하고 있다."], ans:3, exp:"등록장애인 중 가장 비율이 높은 것은 지체장애입니다."},
  {n:30, q:"장애 유형별 특성에 대한 설명으로 옳지 않은 것은?", opts:["뇌병변장애 유형에는 뇌성마비, 외상성 뇌 손상 등이 있다.","안면장애는 사회적 장애의 대표적 사례이다.","정신장애 유형에는 조현병, 분열형 정동장애 등이 있다.","시각장애인은 모두 점자해독이 가능하다."], ans:3, exp:"시각장애인 중 점자해독이 가능한 비율은 약 12.4%에 불과합니다."},

  // 31~40
  {n:31, q:"시각장애에 대한 설명으로 옳지 않은 것은?", opts:["시각장애는 시력장애와 시야결손장애로 구분하여 판정한다.","녹내장, 백내장, 트라코마 등은 시각장애의 유형이다.","시각장애인은 약 5% 정도만 점자해독이 가능하다.","시각장애는 1~6 등급으로 구분된다."], ans:2, exp:"실태조사에 따르면 점자 해독률은 12.4%이며, 2019년 7월부터 장애등급제는 폐지되었습니다."},
  {n:32, q:"정신적 장애에 포함되지 않는 장애 유형은?", opts:["지적장애","자폐성 장애","정신장애","뇌전증장애"], ans:3, exp:"뇌전증장애는 '내부 기관 장애'에 포함됩니다."},
  {n:33, q:"불규칙한 지능발달을 보이며 대인관계 형성의 어려움 및 언어·행동장애를 동반하는 장애 유형은?", opts:["자폐성 장애","뇌병변장애","지적장애","정신장애"], ans:0, exp:"이는 자폐성 장애의 전형적인 특징입니다."},
  {n:34, q:"정신장애의 대표적인 유형에 해당하지 않는 것은?", opts:["조현병","정동장애","우울장애","다운증후군"], ans:3, exp:"다운증후군은 지적장애의 한 원인으로 분류됩니다."},
  {n:35, q:"조현병, 양극성 정동장애, 반복성 우울장애의 유형을 가진 장애 유형은?", opts:["정신장애","지적장애","자폐성 장애","뇌병변장애"], ans:0, exp:"「장애인복지법」상 정신장애의 주요 유형들입니다."},
  {n:36, q:"현대 서구 장애인복지 역사에 대한 설명으로 옳지 않은 것은?", opts:["장애인복지의 태동은 전쟁에서 장애를 입은 장애인에서 시작되었다.","UN은 1981년을 '세계장애인의 해'로 정하였다.","1990년대 이후 총체적 개념의 장애인복지 형태를 갖추기 시작하였다.","'UN 장애인 권리협약'은 장애인 권리를 선언한 최초의 규정이다."], ans:3, exp:"장애인 권리를 선언한 최초의 규정은 1975년 '장애인 권리선언'입니다."},

  {n:121, q:"장애인 인권에 대한 설명으로 옳지 않은 것은?", opts:["인간이기 때문에 가지는 당연한 권리이다.","시혜나 동정이 아닌 권리 차원에서 접근해야 한다.","UN 등 국제사회는 인권 향상을 위한 다양한 선언을 채택했다.","우리나라 장애인 정책종합계획에는 인권 문제가 명시되어 있지 않다."], ans:3, exp:"장애인 정책종합계획의 핵심 분야 중 하나가 인권 및 안전 강화입니다."},
  {n:122, q:"장애인 인권 향상을 위한 국제사회의 선언이 아닌 것은?", opts:["장애인 권리선언(1975)","세계장애인의 해(1981)","비와코 새천년 행동계획(2002)","UN 인간환경선언"], ans:3, exp:"④번은 환경 관련 선언입니다."},
  {n:123, q:"2006년 UN 총회에서 채택되어 장애인의 인권 향상에 대한 국가의 법적 책임을 명확히 한 것은?", opts:["장애인 권리협약","지적장애인 권리선언","세계장애인 행동계획","장애인 기회 평등을 위한 표준규칙"], ans:0, exp:"장애인 권리협약(CRPD)은 법적 구속력을 가진 구체적인 권리 보장 규정입니다."},
  {n:124, q:"우리나라에서 장애인의 인권을 명시한 관련 법률이 아닌 것은?", opts:["헌법","장애인복지법","국가인권위원회법","건강가정기본법"], ans:3, exp:"장애인 인권은 주로 헌법, 장애인복지법, 장애인차별금지법 등에 명시되어 있습니다."},
  {n:125, q:"장애인 차별 권리구제에 대한 설명으로 옳지 않은 것은?", opts:["유일한 차별시정 전담 국가기구는 국가인권위원회이다.","국가인권위원회 내에 장애인차별시정 소위원회를 두고 있다.","차별시정 명령 불이행 시 과태료를 부과할 수 있다.","장애인 차별 관련 진정 사건은 매년 감소하고 있다."], ans:3, exp:"권리 의식 향상으로 진정 사건은 지속적으로 증가하는 추세입니다."},
  {n:126, q:"「장애인차별금지 및 권리구제 등에 관한 법률」에 대한 설명으로 옳지 않은 것은?", opts:["2007년에 제정되어 2008년부터 시행되었다.","장애인복지 패러다임의 변화(권리 중심)가 반영되었다.","시정기구로서 국가인권위원회의 역할을 명시하고 있다.","차별 유형으로 직접 차별과 간접 차별 '두 가지만' 규정하고 있다."], ans:3, exp:"직접 차별, 간접 차별, 정당한 편의제공 거부, 광고에 의한 차별 등 4가지 유형을 규정합니다."},
  {n:127, q:"장애인차별금지법에서 규정하는 차별영역이 아닌 것은?", opts:["교육","고용","건강권","주거"], ans:3, exp:"법에서 명시한 주요 영역은 고용, 교육, 재화·용역, 사법·행정, 참정권, 모·부성권 등입니다."},
  {n:128, q:"장애인의 입학·전학을 거부하거나 강요할 수 없음을 명시한 차별금지 영역은?", opts:["교육","고용","건강권","정보 접근성"], ans:0, exp:"교육책임자는 장애를 이유로 입학 거부나 전학 강요를 해서는 안 됩니다."},
  {n:129, q:"장애인 고령화에 대한 설명으로 옳지 않은 것은?", opts:["연령이 높아짐에 따라 장애 출현율도 증가한다.","고령 장애인은 기초생활수급자 비율이 높은 편이다.","장애 노인 부양자에 대한 사회적 지원이 확대되어야 한다.","고령 장애인의 욕구는 장애 유형과 관계없이 모두 유사하다."], ans:3, exp:"고령화된 장애인(소득 욕구)과 노화에 따른 장애인(의료 욕구)의 욕구는 서로 상이합니다."},
  {n:130, q:"장애 노인 중 '고령화된 장애인'의 특성으로 옳지 않은 것은?", opts:["질병과 기능적 문제가 비장애인에 비해 빠르게 진행된다.","장애로 인해 노후 준비가 부족해 우울감이 높을 수 있다.","전반적인 사회 활동에 제약을 받는다.","노화와 함께 새롭게 장애를 경험하며 이중적 어려움을 겪는 집단이다."], ans:3, exp:"④번은 평생 비장애인으로 살다 노년에 장애를 입은 '노화에 따른 장애인'에 대한 설명입니다."},

  // 131~140
  {n:131, q:"장애 노인에 대한 설명으로 옳지 않은 것은?", opts:["발생 시점에 따라 '노인성 장애인'과 '고령화된 장애인'으로 구분한다.","취업자의 경우 단순 노무 종사자가 가장 많다.","부양자에 대한 혜택과 지원 강화가 필요하다.","비장애 노인과 비교해 노화 속도에 차이가 없다."], ans:3, exp:"장애인은 비장애인에 비해 조기 노화가 진행되는 경향이 있습니다."},
  {n:132, q:"장애 여성에 대한 설명으로 옳지 않은 것은?", opts:["우리 사회에서 다중 차별을 겪고 있다.","의존적이고 무력한 집단으로 대상화되기도 한다.","학력은 초등학교 졸업 이하 비율이 매우 높다.","장애 남성에 비하여 취업률이 높다."], ans:3, exp:"장애 여성의 고용률은 약 20.8%로 장애 남성에 비해 현저히 낮고 열악합니다."},
  {n:133, q:"장애 여성 복지정책의 과제에 대한 설명으로 옳지 않은 것은?", opts:["여성 특성(임신, 출산 등)을 고려한 정책이 수립되어야 한다.","고용촉진 확대를 위한 정책적 지원방안이 필요하다.","장애 여성을 위한 종합 정보체계 구축이 필요하다.","모든 서비스는 민간을 배제하고 공공기관 중심으로만 이루어져야 한다."], ans:3, exp:"공공기관의 협력뿐만 아니라 민간단체 및 당사자 조직과의 연대가 중요합니다."},
  {n:134, q:"장애학에 대한 설명으로 옳지 않은 것은?", opts:["장애를 규정하는 사회·문화적 요인을 탐구하는 다학제적 학문이다.","영국과 미국에서 장애인 권리 운동과 함께 발전했다.","장애를 개인의 결함으로 보는 개별적 모델에 입각한다.","장애인의 적극적인 사회 참여를 중시한다."], ans:2, exp:"장애학은 장애의 원인을 사회적 억압으로 보는 '사회적 모델'을 채택합니다."},
  {n:135, q:"장애등급제 폐지와 관련한 설명으로 옳지 않은 것은?", opts:["2019년 7월부터 단계적으로 폐지되었다.","등급 대신 '서비스 지원 종합조사'를 통해 수급 자격을 결정한다.","등급제 폐지 후 맞춤형 지원을 위한 전달체계 개편이 필요하다.","기존의 의학적 진단 중심 종합조사표를 그대로 활용하면 된다."], ans:3, exp:"의학적 기준을 넘어 일상생활 수행능력 등 욕구 기반의 새로운 종합조사 도구가 마련되었습니다."},
  {n:136, q:"장애인 탈시설 및 자립에 대한 설명으로 옳지 않은 것은?", opts:["탈시설 개념은 광의와 협의로 구분할 수 있다.","탈시설은 지역공동체에서 평등하게 생활할 수 있는 적극적 권리이다.","인권에 대한 근본적인 관점 변화가 필요하다.","주거에 대한 접근성만 보장하면 탈시설은 완성된다."], ans:3, exp:"주거뿐 아니라 의료, 교육, 고용, 소득 등 전 영역에서 차별 없는 접근이 보장되어야 합니다."},
  {n:137, q:"장애인 교육권에 대한 설명으로 옳지 않은 것은?", opts:["특수교육의 기본 지향점은 통합 교육이다.","제5차 정책계획에는 통합교육 지원 내실화 전략이 담겨 있다.","특수학교 및 특수학급의 신·증설이 계획되어 있다.","통합교육 개념은 특수교육 내에서만 다루어지면 충분하다."], ans:3, exp:"통합교육은 특수교육을 넘어 일반교육 현장 전체에서 다루어져야 합니다."},
  {n:138, q:"장애인복지 향후 과제에 대한 설명으로 옳지 않은 것은?", opts:["인권 보호를 위해 인식개선교육이 강화되어야 한다.","장애인의 고등교육 및 평생교육 지원을 확대해야 한다.","소득보장과 고용지원서비스의 연계가 강화되어야 한다.","장애등급제를 지속적으로 보완하여 유지 발전시켜야 한다."], ans:3, exp:"장애등급제는 2019년 7월 1일부로 폐지되었습니다."},
  {n:139, q:"장애인복지 정책 설계 시 낸시 프레이저(Fraser)가 강조한 다차원적 정의 요소가 아닌 것은?", opts:["경제적 분배","문화적 인정","정치적 참여","의료적 치료"], ans:3, exp:"프레이저는 정의 실현을 위해 분배, 인정, 참여의 세 차원을 강조했습니다."},
  {n:140, q:"장애는 '사회적 구성물'(social constructs)이라는 설명에 가장 부합하는 것은?", opts:["장애는 개인의 신체적·정신적 손상 자체를 의미한다.","장애는 의학적으로만 진단되며 사회와는 무관한 개념이다.","장애는 손상과 별개로 사회적 환경과 태도에 의해 만들어질 수 있다.","장애는 시대나 사회에 따라 변하지 않는 고정적인 개념이다."], ans:2, exp:"장애는 단순 손상이 아니라 사회가 만든 물리적·사회적 장벽으로 인해 발생하는 개념입니다."},

  // 141~150
  {n:141, q:"ICF(2001)의 장애 개념에 대한 설명으로 옳은 것은?", opts:["장애의 원인을 개인의 손상에만 두는 일차원적 모델이다.","신체 기능과 구조, 활동, 참여가 상호 작용하는 다차원적 구조이다.","장애는 오로지 사회가 만든 것이므로 개인 요인은 고려하지 않는다.","장애인을 정상화하는 것이 목표이므로 치료 중심 접근을 강조한다."], ans:1, exp:"ICF는 건강 상태와 배경 요인(환경 및 개인)의 상호작용으로 장애를 이해합니다."},
  {n:142, q:"의료적 모델과 사회적 모델에 대한 설명으로 옳은 것은?", opts:["의료적 모델은 장애를 사회 구조와 차별의 문제로 본다.","사회적 모델은 장애를 개인의 기능 손실로만 본다.","의료적 모델은 장애를 '결함'으로, 사회적 모델은 '사회가 만든 것'으로 본다.","사회적 모델은 장애 해결을 치료·재활 중심으로 본다."], ans:2, exp:"의료적 모델은 개인의 문제로, 사회적 모델은 구조적 장벽의 문제로 봅니다."},
  {n:143, q:"장애학(Disability Studies)의 주요 관점으로 옳지 않은 것은?", opts:["장애는 사회적 구성물이라는 관점을 포함한다.","장애인의 권리, 정체성, 사회 구조 분석을 중요하게 본다.","장애는 복지와 보호의 대상이라는 관점을 유지한다.","장애를 개인적 문제가 아닌 사회적 문제로 본다."], ans:2, exp:"장애학은 시혜·보호 중심 접근을 비판하고 권리 중심의 분석을 수행합니다."},
  {n:144, q:"마타 러셀의 「자본주의와 장애」에서 주장하는 내용으로 가장 적절한 것은?", opts:["자본주의는 장애인의 고용과 생산성을 높이는 체계이다.","자본주의는 장애인의 생존을 복지제도로 보장한다.","자본주의는 생산성 기준에 맞지 않는 장애인을 구조적으로 배제한다.","자본주의는 장애인을 지역공동체 중심의 통합 대상으로 본다."], ans:2, exp:"자본주의가 경쟁·효율 중심 체계 속에서 장애인을 '비생산적 존재'로 취급하며 배제한다고 분석합니다."},
  {n:145, q:"우리나라에서 장애인으로 공식 인정받기 위해 필요한 절차는?", opts:["장애등급심사 자동 등록","지방자치단체가 지정하는 대상자 자동 선정","병원 진단서 제출만으로 등록 처리","장애인 등록 신청 및 심사"], ans:3, exp:"장애인등록제를 통해 신청, 진단, 심사의 과정을 거쳐 등록이 이루어집니다."},
  {n:146, q:"장애등급제가 폐지된 주요 이유로 가장 적절한 것은?", opts:["급수를 더 세분화하기 위해서이다.","개별 욕구가 아니라 의학적 손상 정도만 반영했기 때문이다.","모든 장애인에게 동일한 서비스를 주기 위해서이다.","장애 유형 구분을 없애기 위해서이다."], ans:1, exp:"과거 등급제는 일상생활 욕구를 반영하지 못하고 차별적인 체제를 만든다는 비판을 받았습니다."},
  {n:147, q:"2019년 장애등급제 폐지 이후 도입된 서비스 지원 방식은?", opts:["장애특성 분류 시스템","소득기반 자격제도","장애인 서비스 지원 종합조사","의료진 중심 심사평가제도"], ans:2, exp:"종합조사는 기능 평가 외에 사회활동, 환경 등을 평가하여 욕구 기반으로 서비스를 배분합니다."},
  {n:148, q:"장애인 실태조사가 가지는 주요 정책적 의미로 옳은 것은?", opts:["장애인의 삶의 조건을 파악하여 정책 근거 자료로 활용된다.","장애 발생 원인만을 조사하여 통계화한다.","의료기록을 통해 진단체계를 표준화한다.","장애 범주를 축소하여 관리 편의성을 높인다."], ans:0, exp:"실태조사는 소득, 고용, 건강 등 장애인의 현실을 수치로 보여주어 정책 및 예산 편성의 근거가 됩니다."},
  {n:149, q:"우리나라 장애인의 삶과 관련된 설명으로 옳은 것은?", opts:["실태조사를 통해 개별 장애인의 모든 삶을 완벽히 파악할 수 있다.","실태조사는 2000년대 이후에 처음 시작되었다.","일상생활을 도와주는 사람은 대부분 전문 인력이다.","장애 원인의 약 88%는 사고나 질병 등 후천적 원인이다."], ans:3, exp:"실태조사는 1990년대부터 시작되었으며, 일상생활 지원 주체는 가족(82.1%)이 대부분입니다."},
  {n:150, q:"장애인복지를 '권리'로 보는 관점에 대한 설명으로 가장 적절한 것은?", opts:["장애인은 보호의 대상이므로 복지는 선택적으로 제공된다.","복지는 개인의 능력에 따라 차등적으로 보장되어야 한다.","국가는 인간다운 삶을 보장할 의무가 있으며 복지는 시민의 권리이다.","장애인복지는 민간 중심 자선체계를 기반으로 한다."], ans:2, exp:"권리 기반 관점은 복지를 '시혜'가 아닌 국가의 '의무'와 '시민권'으로 인식합니다."},
];

// ==============================
// STATE
// ==============================
let questions = [];
let currentIdx = 0;
let answers = {};
let revealed = {}; // 클릭으로 확정한 문제 인덱스 기록
let bookmarks = new Set(JSON.parse(localStorage.getItem('pw_bm') || '[]'));
let wrongSet = new Set(JSON.parse(localStorage.getItem('pw_wrong') || '[]'));
let graded = false;
let currentMode = '';
let expandView = false;

let timerInterval = null;
let timerSeconds = 20 * 60;

function startTimer() {
  clearInterval(timerInterval);
  timerSeconds = 20 * 60;
  updateTimerDisplay();
  document.getElementById('timer-box').style.display = 'flex';
  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      alert('⏰ 시험 시간이 종료되었습니다!');
      gradeQuiz();
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  document.getElementById('timer-box').style.display = 'none';
}

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  const txt = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const el = document.getElementById('timer-display');
  el.textContent = txt;
  el.className = timerSeconds <= 60 ? 'timer-danger' : '';
}

function toggleExpandView() {
  expandView = !expandView;
  const btn = document.getElementById('expand-btn');
  const quizScreen = document.getElementById('quiz-screen');
  const expandScreen = document.getElementById('expand-all-screen');
  if (expandView) {
    btn.textContent = '⊟';
    quizScreen.classList.add('hidden');
    expandScreen.style.display = 'block';
    renderExpandAll();
  } else {
    btn.textContent = '⇅';
    expandScreen.style.display = 'none';
    quizScreen.classList.remove('hidden');
    renderQuestion();
  }
}

function renderExpandAll() {
  const screen = document.getElementById('expand-all-screen');
  screen.innerHTML = '';
  const nums = ['①','②','③','④'];
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'all-q-card';
    card.id = `all-q-${i}`;

    const numDiv = document.createElement('div');
    numDiv.className = 'q-num';
    numDiv.textContent = `${i + 1} / ${questions.length} 번 문제 (원번호 ${q.n}번)`;
    card.appendChild(numDiv);

    const textDiv = document.createElement('div');
    textDiv.className = 'q-text';
    textDiv.textContent = q.q;
    card.appendChild(textDiv);

    const optsDiv = document.createElement('div');
    optsDiv.className = 'options';
    q.opts.forEach((opt, oi) => {
      const div = document.createElement('div');
      div.className = 'option';
      div.innerHTML = `<span class="num">${nums[oi]}</span><span>${opt}</span>`;
      const isRev = revealed[i] !== undefined;
      if (graded || isRev) {
        if (oi === q.ans) div.classList.add('correct');
        else if (answers[i] === oi && answers[i] !== q.ans) div.classList.add('wrong');
        div.style.cursor = 'default';
        div.style.pointerEvents = 'none';
      } else {
        if (answers[i] === oi) div.classList.add('selected');
        div.onclick = () => { selectOption(oi); renderExpandAll(); };
      }
      optsDiv.appendChild(div);
    });
    card.appendChild(optsDiv);

    if (graded || revealed[i] !== undefined) {
      const expDiv = document.createElement('div');
      expDiv.className = 'explanation show';
      expDiv.innerHTML = `<div class="exp-label">💡 해설</div><div>${q.exp}</div>`;
      card.appendChild(expDiv);
    }
    screen.appendChild(card);
  });
}

function saveBookmarks() { localStorage.setItem('pw_bm', JSON.stringify([...bookmarks])); }
function saveWrong() { localStorage.setItem('pw_wrong', JSON.stringify([...wrongSet])); }

function showStart() {
  document.getElementById('start-screen').classList.remove('hidden');
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('expand-all-screen').style.display = 'none';
  document.getElementById('tabbar').classList.add('hidden');
  document.getElementById('sidebar').classList.add('hidden');
  document.getElementById('mode-tag').textContent = '모드 선택 중';
  document.getElementById('progress-text').textContent = '';
  document.getElementById('expand-btn').style.display = 'none';
  setHeaderBtns(false, false, false);
  stopTimer();
  graded = false;
  answers = {};
  revealed = {};
  questions = [];
  currentIdx = 0;
  expandView = false;
}

function setHeaderBtns(grade, retry, home) {
  document.getElementById('btn-header-grade').style.display = grade ? 'inline-block' : 'none';
  document.getElementById('btn-header-retry').style.display = retry ? 'inline-block' : 'none';
  document.getElementById('btn-header-home').style.display = home ? 'inline-block' : 'none';
}

function retryQuiz() {
  if (!confirm('다시 풀기 하면 현재 답이 초기화됩니다. 계속하시겠습니까?')) return;
  startQuiz(currentMode);
}

function startQuiz(mode) {
  currentMode = mode;
  graded = false;
  answers = {};
  revealed = {};
  currentIdx = 0;
  expandView = false;
  let useTimer = false;

  if (mode === 'random') {
    questions = shuffle([...ALL_QUESTIONS]).slice(0, 30);
    document.getElementById('mode-tag').textContent = '랜덤 30문제';
    useTimer = true;
  } else if (mode === 'all') {
    questions = [...ALL_QUESTIONS];
    document.getElementById('mode-tag').textContent = '전체 150문제';
    useTimer = false;
  } else if (mode === 'bookmark') {
    const bmIds = [...bookmarks];
    questions = ALL_QUESTIONS.filter((_, i) => bmIds.includes(i));
    if (questions.length === 0) { alert('📌 책갈피된 문제가 없습니다.'); return; }
    document.getElementById('mode-tag').textContent = `책갈피 ${questions.length}문제`;
    useTimer = false;
  } else if (mode === 'wrong') {
    questions = [...wrongSet].map(i => ALL_QUESTIONS[i]).filter(Boolean);
    if (questions.length === 0) { alert('✅ 틀린 문제가 없습니다!'); return; }
    document.getElementById('mode-tag').textContent = `오답 ${questions.length}문제`;
    useTimer = false;
  }

  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('expand-all-screen').style.display = 'none';
  document.getElementById('quiz-screen').classList.remove('hidden');
  document.getElementById('tabbar').classList.remove('hidden');
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('expand-btn').style.display = 'flex';
  document.getElementById('expand-btn').textContent = '⇅';
  setHeaderBtns(true, true, true);

  if (useTimer) startTimer();
  else stopTimer();

  buildTabbar();
  renderQuestion();
  renderGrid();
}

function navigate(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= questions.length) return;
  currentIdx = newIdx;
  renderQuestion();
  renderGrid();
}

function goToQuestion(i) {
  if (expandView) {
    const card = document.getElementById(`all-q-${i}`);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    currentIdx = i;
    renderGrid();
    return;
  }
  currentIdx = i;
  renderQuestion();
  renderGrid();
}

function buildTabbar() {
  const bar = document.getElementById('tabbar');
  bar.innerHTML = '';
  // 10문제씩 그룹으로 탭 생성
  const total = questions.length;
  const groupSize = 10;
  const numGroups = Math.ceil(total / groupSize);
  for (let g = 0; g < numGroups; g++) {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.dataset.group = g;
    const start = g * groupSize + 1;
    const end = Math.min((g + 1) * groupSize, total);
    btn.textContent = `${start}~${end}`;
    btn.onclick = () => goToQuestion(g * groupSize);
    bar.appendChild(btn);
  }
  updateTabbar();
}

function updateTabbar() {
  const groupSize = 10;
  document.querySelectorAll('.tab-btn').forEach(btn => {
    const g = parseInt(btn.dataset.group);
    const start = g * groupSize;
    const end = Math.min((g + 1) * groupSize, questions.length);
    const total = end - start;
    const done = Object.keys(answers).filter(k => parseInt(k) >= start && parseInt(k) < end).length;
    const numStart = start + 1;
    const numEnd = end;
    btn.textContent = `${numStart}~${numEnd} (${done}/${total})`;
    const curGroup = Math.floor(currentIdx / groupSize);
    btn.classList.toggle('active', g === curGroup);
  });
}

function renderQuestion() {
  const q = questions[currentIdx];
  if (!q) return;

  const origIdx = ALL_QUESTIONS.indexOf(q);
  document.getElementById('q-num-label').textContent = `${currentIdx + 1} / ${questions.length} 번 문제 (원번호 ${q.n}번)`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('q-text').style.fontWeight = '600';

  const optsCont = document.getElementById('options');
  optsCont.innerHTML = '';

  const nums = ['①','②','③','④'];
  const isRevealed = revealed[currentIdx] !== undefined;

  q.opts.forEach((opt, oi) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = `<span class="num">${nums[oi]}</span><span>${opt}</span>`;

    if (graded) {
      // 최종 채점 후 보기
      const chosen = answers[currentIdx];
      if (oi === q.ans) div.classList.add('correct');
      else if (chosen === oi && chosen !== q.ans) div.classList.add('wrong');
    } else if (isRevealed) {
      // 클릭 직후 즉시 피드백 (랜덤/전체 모드)
      const chosen = answers[currentIdx];
      if (oi === q.ans) div.classList.add('correct');
      else if (chosen === oi) div.classList.add('wrong');
      div.style.cursor = 'default';
      div.style.pointerEvents = 'none';
    } else {
      if (answers[currentIdx] === oi) div.classList.add('selected');
      div.onclick = () => selectOption(oi);
    }
    optsCont.appendChild(div);
  });

  const expEl = document.getElementById('explanation');
  const expText = document.getElementById('exp-text');
  if (graded || isRevealed) {
    expEl.classList.add('show');
    expText.textContent = q.exp;
  } else {
    expEl.classList.remove('show');
  }

  const bmBtn = document.getElementById('bm-btn');
  if (bookmarks.has(origIdx)) {
    bmBtn.classList.add('bookmarked');
    bmBtn.textContent = '🔖 책갈피됨';
  } else {
    bmBtn.classList.remove('bookmarked');
    bmBtn.textContent = '🔖 책갈피';
  }

  document.getElementById('btn-prev').disabled = currentIdx === 0;
  document.getElementById('btn-next').textContent = currentIdx === questions.length - 1 ? '완료' : '다음 ▶';

  const answered = Object.keys(revealed).length;
  document.getElementById('progress-text').textContent = `${answered} / ${questions.length} 문제 응답`;
  document.getElementById('sb-progress').textContent = `${answered} / ${questions.length} 응답`;

  updateTabbar();
}

function selectOption(oi) {
  if (graded) return;
  if (revealed[currentIdx] !== undefined) return; // 이미 확정된 문제는 재클릭 불가
  answers[currentIdx] = oi;
  revealed[currentIdx] = oi;

  // 오답 세트 즉시 업데이트
  const q = questions[currentIdx];
  const origIdx = ALL_QUESTIONS.indexOf(q);
  if (oi === q.ans) wrongSet.delete(origIdx);
  else wrongSet.add(origIdx);
  saveWrong();

  renderQuestion();
  renderGrid();
}

function toggleBookmark() {
  const q = questions[currentIdx];
  const origIdx = ALL_QUESTIONS.indexOf(q);
  if (bookmarks.has(origIdx)) bookmarks.delete(origIdx);
  else bookmarks.add(origIdx);
  saveBookmarks();
  renderQuestion();
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('q-grid');
  grid.innerHTML = '';
  const nums = ['①','②','③','④'];
  questions.forEach((q, i) => {
    const origIdx = ALL_QUESTIONS.indexOf(q);
    const div = document.createElement('div');
    div.className = 'q-dot';

    const numEl = document.createElement('span');
    numEl.className = 'dot-num';
    numEl.textContent = q.n;
    div.appendChild(numEl);

    if (answers[i] !== undefined) {
      const ansEl = document.createElement('span');
      ansEl.className = 'dot-ans';
      ansEl.textContent = nums[answers[i]];
      div.appendChild(ansEl);
    }

    div.onclick = () => goToQuestion(i);

    if (i === currentIdx) div.classList.add('current');
    if (bookmarks.has(origIdx)) div.classList.add('bookmarked-dot');
    if (graded) {
      if (answers[i] === q.ans) div.classList.add('correct-dot');
      else if (answers[i] !== undefined) div.classList.add('wrong-dot');
    } else if (revealed[i] !== undefined) {
      if (answers[i] === q.ans) div.classList.add('correct-dot');
      else div.classList.add('wrong-dot');
    } else {
      if (answers[i] !== undefined) div.classList.add('answered');
    }
    grid.appendChild(div);
  });
}

function gradeQuiz() {
  graded = true;
  stopTimer();
  document.getElementById('expand-btn').style.display = 'none';
  document.getElementById('expand-all-screen').style.display = 'none';
  expandView = false;
  let correct = 0, wrong = 0;
  questions.forEach((q, i) => {
    const origIdx = ALL_QUESTIONS.indexOf(q);
    if (answers[i] === q.ans) { correct++; wrongSet.delete(origIdx); }
    else { wrong++; wrongSet.add(origIdx); }
  });
  saveWrong();

  const unanswered = questions.length - Object.keys(revealed).length;
  const score = Math.round((correct / questions.length) * 100);

  document.getElementById('result-screen').classList.remove('hidden');
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('res-score').textContent = `${score}점`;
  document.getElementById('res-sub').textContent = `총 ${questions.length}문제 중 ${correct}문제 정답`;
  document.getElementById('res-c').textContent = correct;
  document.getElementById('res-w').textContent = wrong + unanswered;
  document.getElementById('res-b').textContent = bookmarks.size;
  setHeaderBtns(false, false, true);
  renderGrid();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
