<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>장애인복지론 예상문제 151~300</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --primary: #1a5276;
    --primary-light: #2e86c1;
    --accent: #e74c3c;
    --accent2: #f39c12;
    --bg: #f0f4f8;
    --card: #ffffff;
    --sidebar: #1a3a5c;
    --sidebar-text: #cfe2f3;
    --correct: #1e8449;
    --wrong: #c0392b;
    --bookmark: #e67e22;
    --border: #d5e8f0;
    --text: #1a252f;
    --muted: #7f8c8d;
    --header-h: 56px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  #header {
    background: var(--primary);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: var(--header-h);
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    z-index: 100;
  }
  #header .title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  #header .title span { font-weight: 300; font-size: 14px; margin-left: 8px; opacity: 0.8; }
  #header .right-info { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  #header .right-info .tag { background: rgba(255,255,255,0.15); border-radius: 4px; padding: 3px 9px; font-size: 12px; }

  .header-action-btn {
    padding: 6px 13px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    transition: opacity .15s;
    display: none;
  }
  .header-action-btn:hover { opacity: .85; }
  #btn-header-grade { background: #e74c3c; color: #fff; }
  #btn-header-retry { background: #e67e22; color: #fff; }
  #btn-header-home  { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); }

  #tabbar {
    background: #eaf2f8;
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: flex-end;
    padding: 0 20px;
    gap: 4px;
    flex-shrink: 0;
    overflow-x: auto;
  }
  .tab-btn {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    background: #dce9f5;
    color: var(--primary);
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    transition: background .15s;
    white-space: nowrap;
  }
  .tab-btn.active { background: var(--card); color: var(--primary); font-weight: 700; }

  #body { display: flex; flex: 1; overflow: hidden; }

  #main { flex: 1; overflow-y: auto; padding: 24px 28px; position: relative; }

  #start-screen {
    max-width: 560px;
    margin: 40px auto;
    background: var(--card);
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    padding: 48px 40px;
    text-align: center;
  }
  #start-screen h2 { font-size: 22px; color: var(--primary); margin-bottom: 8px; }
  #start-screen p { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
  .start-options { display: flex; flex-direction: column; gap: 14px; }
  .start-btn {
    padding: 18px 24px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: #f7fbff;
    cursor: pointer;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    color: var(--primary);
    transition: all .2s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .start-btn:hover { border-color: var(--primary-light); background: #eaf3fb; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.08); }
  .start-btn .icon { font-size: 26px; }
  .start-btn small { display: block; font-size: 12px; font-weight: 400; color: var(--muted); margin-top: 2px; }

  .q-num { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.5px; }
  .q-text { font-size: 15px; line-height: 1.75; font-weight: 500; margin-bottom: 20px; color: var(--text); }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    background: var(--card);
    transition: all .15s;
    font-size: 14px;
    line-height: 1.6;
  }
  .option:hover { border-color: var(--primary-light); background: #eaf3fb; }
  .option.selected { border-color: var(--primary); background: #d6eaf8; color: var(--primary); font-weight: 600; }
  .option.correct { border-color: var(--correct); background: #eafaf1; color: var(--correct); }
  .option.wrong { border-color: var(--wrong); background: #fdedec; color: var(--wrong); }
  .option.show-correct { border-color: var(--correct); background: #eafaf1; color: var(--correct); }
  .option .num { font-weight: 700; min-width: 20px; }

  .option.disabled { cursor: default; pointer-events: none; opacity: 0.7; }

  .explanation {
    display: none;
    margin-top: 16px;
    padding: 14px 16px;
    background: #fdfaf0;
    border-left: 3px solid var(--accent2);
    border-radius: 4px;
    font-size: 13.5px;
    line-height: 1.75;
    color: #5d4037;
  }
  .explanation.show { display: block; }
  .exp-label { font-weight: 700; color: var(--accent2); margin-bottom: 4px; }

  .q-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .nav-btn {
    padding: 9px 22px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--card);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--primary);
    transition: all .15s;
  }
  .nav-btn:hover { background: #eaf3fb; border-color: var(--primary-light); }
  .nav-btn:disabled { opacity: .35; cursor: not-allowed; }
  .nav-btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .nav-btn.primary:hover { background: var(--primary-light); }

  .bm-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 16px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--card);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    transition: all .15s;
  }
  .bm-btn.bookmarked { color: var(--bookmark); border-color: var(--bookmark); background: #fef5e7; }
  .bm-btn:hover { border-color: var(--bookmark); color: var(--bookmark); }

  #sidebar {
    width: 220px;
    background: var(--sidebar);
    overflow-y: auto;
    flex-shrink: 0;
    padding: 16px 12px;
  }
  #sidebar h4 { color: var(--sidebar-text); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; opacity: 0.7; }
  #q-grid { display: flex; flex-direction: column; gap: 4px; }
  .q-dot {
    width: 100%;
    border-radius: 5px;
    background: rgba(255,255,255,0.1);
    display: flex;
    flex-direction: row;
    align-items: center;
    padding: 7px 10px;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: all .15s;
    border: 1.5px solid transparent;
  }
  .q-dot:hover { background: rgba(255,255,255,0.2); }
  .q-dot.current { border-color: #7fb3d3; color: #fff; background: rgba(255,255,255,0.15); }
  .q-dot.answered { background: rgba(255,255,255,0.15); color: #aed6f1; }
  .q-dot.bookmarked-dot { background: rgba(230,126,34,0.35); border-color: var(--bookmark); color: #f0a500; }
  .q-dot.correct-dot { background: rgba(30,132,73,0.4); color: #82e0aa; }
  .q-dot.wrong-dot { background: rgba(192,57,43,0.45); color: #f1948a; }
  .q-dot .dot-num { min-width: 22px; font-weight: 700; color: rgba(255,255,255,0.75); font-size: 11px; }
  .q-dot .dot-ans { font-size: 12px; margin-left: 4px; background: rgba(255,255,255,0.88); color: var(--sidebar); border-radius: 3px; padding: 1px 5px; font-weight: 700; }

  .sidebar-score { margin-top: 18px; padding: 12px; background: rgba(255,255,255,0.07); border-radius: 8px; color: var(--sidebar-text); font-size: 12px; line-height: 1.8; }
  .sidebar-score strong { font-size: 20px; color: #fff; }
  .score-actions { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .score-actions button { padding: 8px 10px; border-radius: 6px; border: none; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 700; }
  .btn-grade { background: var(--accent); color: #fff; }
  .btn-retry { background: var(--bookmark); color: #fff; }
  .btn-home { background: rgba(255,255,255,0.15); color: #fff; }

  #result-screen {
    max-width: 580px;
    margin: 40px auto;
    background: var(--card);
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    padding: 40px 36px;
    text-align: center;
  }
  #result-screen h2 { font-size: 24px; color: var(--primary); margin-bottom: 6px; }
  .score-big { font-size: 64px; font-weight: 700; color: var(--primary); line-height: 1; margin: 20px 0 8px; }
  .score-sub { font-size: 15px; color: var(--muted); margin-bottom: 24px; }
  .result-grid { display: flex; gap: 16px; justify-content: center; margin-bottom: 28px; }
  .result-stat { flex: 1; padding: 16px; border-radius: 10px; }
  .result-stat.c { background: #eafaf1; color: var(--correct); }
  .result-stat.w { background: #fdedec; color: var(--wrong); }
  .result-stat.b { background: #fef5e7; color: var(--bookmark); }
  .result-stat .label { font-size: 12px; margin-bottom: 4px; }
  .result-stat .val { font-size: 28px; font-weight: 700; }
  .result-actions { display: flex; flex-direction: column; gap: 10px; }
  .result-actions button { padding: 14px; border-radius: 8px; border: none; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 700; transition: opacity .15s; }
  .result-actions button:hover { opacity: .85; }
  .btn-a { background: var(--accent); color: #fff; }
  .btn-b { background: var(--bookmark); color: #fff; }
  .btn-c { background: var(--primary); color: #fff; }
  .btn-d { background: #ecf0f1; color: var(--text); }

  .hidden { display: none !important; }

  #expand-all-screen { display: none; padding: 24px 28px; }
  .all-q-card { background: var(--card); border-radius: 10px; border: 1.5px solid var(--border); padding: 20px 22px; margin-bottom: 18px; }
  .all-q-card .q-num { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 700; }
  .all-q-card .q-text { font-size: 14px; font-weight: 600; margin-bottom: 14px; line-height: 1.7; }
  .all-q-card .options { gap: 7px; }
  .all-q-card .option { padding: 9px 13px; font-size: 13px; }

  #timer-box { display: none; }
  .timer-danger { color: #ff6b6b !important; animation: blink .8s step-end infinite; }
  @keyframes blink { 50% { opacity: .4; } }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: #b0c4d8; border-radius: 3px; }


</style>
</head>
<body>

<div id="header">
  <div class="title">장애인복지론 <span>예상문제</span></div>
  <div class="right-info">
    <span class="tag" id="mode-tag">모드 선택 중</span>
    <span id="progress-text" style="font-size:13px;opacity:.85"></span>
    <div id="timer-box" style="display:none;align-items:center;gap:8px;background:rgba(255,255,255,0.12);border-radius:6px;padding:4px 12px;">
      <span style="font-size:11px;opacity:.8;line-height:1.3;">남은<br>시간</span>
      <span id="timer-display" style="font-size:20px;font-weight:700;letter-spacing:1px;font-variant-numeric:tabular-nums;">20:00</span>
    </div>
    <button id="btn-header-grade" class="header-action-btn" onclick="gradeQuiz()">📊 채점하기</button>
    <button id="btn-header-retry" class="header-action-btn" onclick="retryQuiz()">🔄 다시하기</button>
    <button id="btn-header-home"  class="header-action-btn" onclick="showStart()">🏠 처음으로</button>
    <button id="expand-btn" onclick="toggleExpandView()" title="전체보기/한문제씩" style="display:none;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.3);border-radius:6px;color:#fff;width:38px;height:38px;font-size:20px;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;">⇅</button>
  </div>
</div>

<div id="tabbar" class="hidden"></div>

<div id="body">
  <div id="main">
    <!-- Start Screen -->
    <div id="start-screen">
      <h2>♿ 장애인복지론</h2>
      <p>예상문제 151~300번 · 총 150문항</p>
      <div class="start-options">
        <button class="start-btn" onclick="startQuiz('random')">
          <span class="icon">🎲</span>
          <div>
            랜덤 30문제
            <small>무작위 30문항 · ⏱ 20분 제한 · 답 클릭 즉시 정답·해설 표시</small>
          </div>
        </button>
        <button class="start-btn" onclick="startQuiz('all')">
          <span class="icon">📋</span>
          <div>
            전체 문제 풀기
            <small>151~300번 전체 150문항 · 답 클릭 즉시 정답·해설 표시</small>
          </div>
        </button>
        <button class="start-btn" onclick="startQuiz('bookmark')">
          <span class="icon">🔖</span>
          <div>
            책갈피 문제만 풀기
            <small>저장된 책갈피 문제만 출제 · 답 클릭 즉시 정답·해설 표시</small>
          </div>
        </button>
        <button class="start-btn" onclick="startQuiz('wrong')">
          <span class="icon">❌</span>
          <div>
            틀린 문제만 다시 풀기
            <small>이전에 틀린 문제만 출제 · 답 클릭 즉시 정답·해설 표시</small>
          </div>
        </button>
      </div>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="hidden">
      <div class="q-num" id="q-num-label"></div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options"></div>
      <div class="explanation" id="explanation">
        <div class="exp-label">💡 해설</div>
        <div id="exp-text"></div>
      </div>
      <div class="q-nav">
        <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">◀ 이전</button>
        <div style="display:flex;gap:10px;">
          <button class="bm-btn" id="bm-btn" onclick="toggleBookmark()">🔖 책갈피</button>
        </div>
        <button class="nav-btn primary" id="btn-next" onclick="navigate(1)">다음 ▶</button>
      </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="hidden">
      <h2>🎉 채점 결과</h2>
      <div class="score-big" id="res-score"></div>
      <div class="score-sub" id="res-sub"></div>
      <div class="result-grid">
        <div class="result-stat c"><div class="label">✅ 정답</div><div class="val" id="res-c"></div></div>
        <div class="result-stat w"><div class="label">❌ 오답</div><div class="val" id="res-w"></div></div>
        <div class="result-stat b"><div class="label">🔖 책갈피</div><div class="val" id="res-b"></div></div>
      </div>
      <div class="result-actions">
        <button class="btn-a" onclick="startQuiz('wrong')">❌ 틀린 문제만 다시 풀기</button>
        <button class="btn-b" onclick="startQuiz('bookmark')">🔖 책갈피 문제 풀기</button>
        <button class="btn-c" onclick="startQuiz('all')">📋 전체 문제 다시 풀기</button>
        <button class="btn-d" onclick="showStart()">🏠 처음으로</button>
      </div>
    </div>

    <!-- Expand All Screen -->
    <div id="expand-all-screen"></div>
  </div>

  <div id="sidebar" class="hidden">
    <h4>문제 현황</h4>
    <div id="q-grid"></div>
    <div class="sidebar-score">
      <div id="sb-progress">0 / 0 응답</div>
      <div class="score-actions">
        <button class="btn-retry" onclick="retryQuiz()">🔄 다시하기</button>
        <button class="btn-home" onclick="showStart()">🏠 처음으로</button>
      </div>
    </div>
  </div>
</div>

<script>
// ==============================
// QUESTION DATA (151~300)
// ==============================
const ALL_QUESTIONS = [
  // 151~160
  {n:151, q:"장애는 '사회적 구성물'(social constructs)이라는 설명에 가장 부합하는 것은?", opts:["장애는 개인의 신체적·정신적 손상 자체를 의미한다.","장애는 의학적으로만 진단되며 사회와는 무관한 개념이다.","장애는 손상과 별개로 사회적 환경과 태도에 의해 만들어질 수 있다.","장애는 시대나 사회에 따라 변하지 않는 고정적인 개념이다."], ans:2, exp:"장애는 단순한 손상이 아니라 사회가 만든 물리적·사회적 장벽으로 인해 발생하는 사회적으로 구성된 개념입니다."},
  {n:152, q:"ICF(2001)의 장애 개념에 대한 설명으로 옳은 것은?", opts:["장애의 원인을 개인의 손상에만 두는 일차원적 모델이다.","장애를 신체 기능과 구조, 활동, 사회적 참여가 상호 작용하는 다차원적 구조로 이해한다.","장애는 오로지 사회가 만든 것이므로 개인 요인은 고려하지 않는다.","장애인을 정상화하는 것이 목표이므로 치료 중심 접근을 강조한다."], ans:1, exp:"ICF는 건강상태와 상황요인(환경 및 개인 요인)이 서로 영향을 주고받는 다차원적 구조를 통해 장애를 이해합니다."},
  {n:153, q:"의료적 모델과 사회적 모델에 대한 설명으로 옳은 것은?", opts:["의료적 모델은 장애를 사회 구조와 차별의 문제로 본다.","사회적 모델은 장애를 개인의 기능 손실로만 본다.","의료적 모델은 장애를 '결함'으로, 사회적 모델은 장애를 '사회가 만든 것'으로 본다.","사회적 모델은 장애 해결을 치료·재활 중심으로 본다."], ans:2, exp:"의료적 모델은 장애를 개인의 문제로 보며, 사회적 모델은 사회 구조적 장벽의 문제로 봅니다."},
  {n:154, q:"장애학(Disability Studies)의 주요 관점으로 옳지 않은 것은?", opts:["장애는 사회적 구성물이라는 관점을 포함한다.","장애인의 권리, 정체성, 사회 구조 분석을 중요하게 본다.","장애는 복지와 보호의 대상이라는 관점을 유지한다.","장애를 개인적 문제가 아닌 사회적 문제로 본다."], ans:2, exp:"장애학은 시혜·보호 중심의 접근을 비판하고 장애를 권리와 사회 구조의 문제로 확장하여 분석합니다."},
  {n:155, q:"『자본주의와 장애』(마타 러셀 저)에서 주장하는 내용으로 가장 적절한 것은?", opts:["자본주의는 장애인의 고용과 생산성을 높이는 체계이다.","자본주의는 장애인의 생존을 복지제도로 보장한다.","자본주의는 생산성 기준에 맞지 않는 장애인을 구조적으로 배제한다.","자본주의는 장애인을 지역공동체 중심의 통합 대상으로 본다."], ans:2, exp:"해당 저서에서는 자본주의가 경쟁과 효율 중심 체계 속에서 장애인을 '비생산적 존재'로 취급하며 배제한다고 분석합니다."},
  {n:156, q:"우리나라에서 장애인으로 공식 인정받기 위해 필요한 절차는?", opts:["장애등급심사 자동 등록","지방자치단체가 지정하는 대상자 자동 선정","병원 진단서 제출만으로 등록 처리","장애인 등록 신청 및 심사"], ans:3, exp:"현재 우리나라 장애인복지 서비스는 '장애인등록제'를 통해 신청, 진단, 심사의 과정을 거쳐 이루어집니다."},
  {n:157, q:"장애등급제가 폐지된 주요 이유로 가장 적절한 것은?", opts:["급수를 더 세분화하기 위해서이다.","장애인의 개별 욕구가 아니라 의학적 손상 정도만 반영했기 때문이다.","모든 장애인이 동일한 서비스를 받도록 하기 위해서이다.","장애 유형 구분이 사라졌기 때문이다."], ans:1, exp:"장애등급제는 장애인을 등급으로 구분하여 차별하는 체제를 만든다는 비판과 욕구를 반영하지 못한다는 이유로 폐지되었습니다."},
  {n:158, q:"2019년 장애등급제 폐지 이후 도입된 서비스 지원 방식은?", opts:["장애특성 분류 시스템","소득기반 자격제도","장애인 서비스 지원 종합조사","의료진 중심 심사평가제도"], ans:2, exp:"장애인 서비스 지원 종합조사는 기능적 평가 외에 사회활동과 환경 등을 평가하여 욕구 기반으로 서비스를 배분합니다."},
  {n:159, q:"장애인 실태조사가 가지는 주요 정책적 의미로 옳은 것은?", opts:["장애인의 삶의 조건을 파악하여 정책 근거 자료로 활용된다.","장애 발생 원인만을 조사하여 통계화한다.","의료기록을 통해 진단체계를 표준화한다.","장애 범주를 축소하여 관리 편의성을 높인다."], ans:0, exp:"실태조사는 소득, 고용, 건강, 교육 등 현실을 수치로 보여주며 정책 개선과 예산 편성의 근거가 됩니다."},
  {n:160, q:"우리나라 장애인의 삶과 관련된 설명으로 옳은 것은?", opts:["실태조사를 통해 장애인의 모든 삶을 완벽히 파악할 수 있다.","실태조사는 2000년대 이후에 처음 실시되었다.","일상생활 도움 제공자는 대부분 전문 돌봄 인력이다.","장애인의 장애 원인은 약 88%가 질환이나 사고 등 후천적 원인이다."], ans:3, exp:"실태조사에 따르면 우리나라 장애인의 88%가 후천적 원인으로 장애가 발생하며, 도움 제공자는 가족(82.1%)이 대부분입니다."},

  // 161~170
  {n:161, q:"장애인복지를 '권리'로 보는 관점에 대한 설명으로 가장 적절한 것은?", opts:["장애인은 사회적 보호의 대상이므로 복지는 선택적으로 제공된다.","복지는 개인의 능력에 따라 차등적으로 보장되어야 한다.","국가는 인간다운 삶을 보장할 의무가 있으며 복지는 시민의 권리이다.","장애인복지는 민간 중심 자선체계를 기반으로 한다."], ans:2, exp:"권리 기반 관점은 복지를 '시혜'가 아닌 '국가의 의무'와 '시민권'으로 봅니다."},
  {n:162, q:"정상화(normalization) 원리에 대한 설명으로 옳은 것은?", opts:["장애인이 가능한 한 일반적·일상적 환경에서 살아가도록 보장해야 한다는 원리이다.","장애인의 자립과 선택보다는 안전을 우선시하는 원리이다.","장애인을 특수 환경에서 분리하여 보호하는 것을 의미한다.","정상화는 경제적 자립을 기준으로 장애인을 구분하는 원리이다."], ans:0, exp:"정상화는 장애인의 삶이 분리나 격리가 아닌 일상생활 중심이어야 한다는 원리로, 통합과 자립의 기초가 됩니다."},
  {n:163, q:"자기결정(self-determination) 개념에 대한 설명으로 가장 적절한 것은?", opts:["장애인 스스로 해결해야 하므로 타인의 지원을 배제하는 것이다.","전문가가 대신 결정해 주는 것이 더 안전하다는 관점이다.","장애인이 자신의 삶과 서비스에 대해 선택·결정할 권리를 갖는다는 개념이다.","국가가 정한 기준에 따라 서비스를 일괄적으로 제공하는 방식이다."], ans:2, exp:"자기결정권은 단순히 '혼자 하기'가 아니라 선택권과 통제권을 보장하는 것이 핵심입니다."},
  {n:164, q:"자립생활(independent living) 모델에 대한 설명으로 가장 적절한 것은?", opts:["자립은 타인의 도움 없이 혼자 생활하는 상태를 말한다.","자립은 시설에서 안정적으로 생활하는 것을 강조한다.","자립은 장애인이 필요한 지원을 선택하여 자신의 삶을 통제하는 것이다.","자립 생활에서 가장 우선되는 목표는 직업을 가지는 것이다."], ans:2, exp:"자립생활은 '도움이 없는 것'이 아니라 '도움을 선택할 수 있는 권리'와 자기결정이 핵심입니다."},
  {n:165, q:"장애인복지의 실천 방향으로 가장 적절한 것은?", opts:["사례관리","급진사회복지실천","잔여주의적 사회복지 실천","단순 서비스 제공"], ans:1, exp:"장애인복지는 단순 서비스 제공을 넘어 사회 구조의 변화를 추구하는 급진사회복지실천의 관점이 필요합니다."},
  {n:166, q:"해외 장애인복지 역사에 대한 설명으로 옳은 것은?", opts:["1960년대에는 시설수용정책이 강화되었다.","미국은 1970년대에 장애아동의 교육을 보장하는 법률을 제정하였다.","유엔은 1981년 이후 장기 계획을 수립하지 않았다.","「미국 장애인법(ADA)」은 교육 분야에만 적용되는 제한적 법률이었다."], ans:1, exp:"미국은 1975년 「장애아동교육법」을 제정하여 교육권을 보장했으며, ADA는 고용, 교통 등 사회 전반에 적용되는 포괄적 차별금지법입니다."},
  {n:167, q:"1950~1980년대 한국 장애인복지 역사에 대한 설명으로 옳은 것은?", opts:["1950년대에는 일반 장애인이 국가 복지의 중심 대상이었다.","1961년 「생활보호법」 제정으로 빈곤 장애인도 국가 보호대상에 포함되었다.","1977년 제정된 「특수교육진흥법」은 입학 차별을 허용하였다.","초기에는 산업재해 장애인 지원이 전혀 없었다."], ans:1, exp:"1961년 「생활보호법」은 빈곤 장애인을 보호대상에 포함했으며, 1963년 「산업재해보상보험법」으로 산재 지원이 시작되었습니다."},
  {n:168, q:"1977년 제정되어 장애인의 교육권을 보장한 최초의 법은?", opts:["장애인복지법","발달장애인법","장애인차별금지법","특수교육진흥법"], ans:3, exp:"1977년 제정된 「특수교육진흥법」은 장애인의 교육 기회를 보장하고 입학 차별을 금지한 최초의 법률입니다."},
  {n:169, q:"2007년 제정되어 모든 생활 영역에서 장애인 차별을 금지한 법은?", opts:["장애인차별금지법","장애인연금법","산업재해보상보험법","한국수화언어법"], ans:0, exp:"2007년 제정된 「장애인차별금지 및 권리구제 등에 관한 법률」은 전 영역에서의 차별금지를 명시했습니다."},
  {n:170, q:"장애인 인권 보장을 위한 법·제도 개선 방향으로 가장 적절한 것은?", opts:["장애 유형에 따라 권리를 차등 보장해야 한다.","복지시설 확충이 법 제정보다 우선되어야 한다.","차별금지 조항과 권리구제 절차의 실효성을 확보해야 한다.","문화 인식 개선만 있으면 법은 필요 없다."], ans:2, exp:"우리나라는 법 제정 이후 실제 구제 절차와 집행력 등 실효성을 확보하는 것이 핵심 과제입니다."},

  // 171~180
  {n:171, q:"정치의 삼각형에 대한 설명으로 옳지 않은 것은?", opts:["삼각형 세 요소는 이념, 정책, 세력이다.","정책 이면에는 이념과 세력 관계가 있다.","사회복지는 중립적이기 때문에 정치의 삼각형과 무관하다.","정책의 방향을 이해하려면 이념을 참조해야 한다."], ans:2, exp:"사회복지정책은 특정 이념을 가진 세력이 만드는 것으로, 중립적이지 않은 정치적인 영역입니다."},
  {n:172, q:"장애등급제 폐지 이후 장애인정책의 방향으로 가장 적절한 것은?", opts:["급여를 등급에 따라 일괄 지원한다.","장애인의 욕구·환경을 반영한 맞춤형 서비스를 강화한다.","장애 유형별로 지원을 차별화한다.","서비스를 축소하고 자가부담으로 전환한다."], ans:1, exp:"등급제 폐지의 핵심은 의료 기준이 아닌 '욕구 기반의 맞춤형 서비스 전환'입니다."},
  {n:173, q:"장애인정책의 향후 과제로 옳지 않은 것은?", opts:["서비스 중복과 전달체계 분절 해결","장애인의 선택권·참여권 확대","지역 간 서비스 격차 해소","장애 등을 기준으로 한 선별적 복지 강화"], ans:3, exp:"장애인정책은 선별적·시혜적 복지에서 보편적·권리적 복지로 확장되는 것이 핵심 과제입니다."},
  {n:174, q:"우리나라 장애인정책 전달체계의 기본 구조로 옳은 것은?", opts:["중앙정부 → 민간단체 → 지역사회","지방정부 단독 설계 및 집행","중앙정부 → 광역지방자치단체 → 기초지방자치단체","민간 조직의 선 평가 후 집행"], ans:2, exp:"현재 전달체계는 중앙에서 기초지자체로 이어지는 수직적 구조를 가지고 있습니다."},
  {n:175, q:"장애인정책 전달체계의 문제점으로 가장 적절한 것은?", opts:["단일체계로 운영되어 통합성이 높다.","전달체계가 분절되어 있어 통합 지원이 어렵다.","장애인의 참여가 과도하여 효율성이 떨어진다.","각 지방정부의 서비스 수준이 동일하다."], ans:1, exp:"부처별 분절과 사업 중복, 지역별 편차는 전달체계의 주요 구조적 문제입니다."},
  {n:176, q:"장애인 소득보장이 중요한 이유로 가장 적절한 것은?", opts:["장애인은 노동 참여율이 높아 추가 지원이 필요 없다.","소득보장은 개인 책임이므로 선택적이다.","구조적으로 빈곤 위험이 높고 장애로 인한 추가비용이 발생하기 때문이다.","대부분 가족의 지원으로 생계가 유지되기 때문이다."], ans:2, exp:"장애인은 노동시장 배제와 차별, 추가비용 발생 등으로 빈곤 위험이 높아 공적 소득보장이 필수적입니다."},
  {n:177, q:"'탈상품화'의 개념과 가장 관련이 깊은 것은?", opts:["노동능력에 따른 급여 차등 지급","노동시장 참여와 관계없이 최소한의 삶을 유지하도록 보장하는 것","생산성 향상을 위한 경제 보조금","시장 노동 참여 시에만 복지 권리 확대"], ans:1, exp:"탈상품화는 인간이 노동력을 상품으로 팔지 않아도 삶이 유지될 수 있는 정도를 의미하는 사회권적 개념입니다."},
  {n:178, q:"2023년 장애인 실태조사 결과 장애인이 국가에 요구하는 복지서비스 1순위는?", opts:["교육 지원","문화활동 지원","소득보장","아동권 보장"], ans:2, exp:"실태조사 결과 장애인의 43.9%가 소득보장을 가장 우선적인 요구사항으로 꼽았습니다."},

  {n:267, q:"장애이론 중 사회적 모델에 대한 설명으로 옳은 것은?", opts:["차별적인 사회 기제를 없애는 것이 중요한 쟁점이다.","장애는 개인의 손상에서 비롯된 문제로 간주한다.","재활전문가의 역할이 중요하다.","장애를 스스로 극복하는 것이 중요하다."], ans:0, exp:"사회적 모델은 장애를 사회적 억압이나 환경적 장벽의 결과로 보고 이를 개선하는 것을 중시합니다."},
  {n:268, q:"장애등급제와 관련된 설명으로 적절하지 않은 것은?", opts:["장애인을 등급으로 구분하는 것은 차별하는 체제를 만드는 것이다.","장애인서비스지원종합조사는 장애등급제 폐지와 상관이 없다.","장애등급제는 온전하게 폐지되었다고 볼 수 없다.","장애등급제 폐지는 1,842일간 장애인운동의 결과로 이루어낸 결과이다."], ans:1, exp:"서비스 지원 종합조사는 장애등급제 폐지 이후 장애인의 욕구와 환경에 따른 맞춤형 지원을 위해 도입된 핵심 도구입니다."},
  {n:269, q:"장애인실태조사와 관련된 설명으로 옳지 않은 것은?", opts:["장애인실태조사는 3년의 주기로 실시한다.","장애인의 모든 삶을 드러내기에는 한계가 있다.","2023년 실태조사 결과 장애인이 사회에 요구하는 사항 중 1위는 소득보장이다.","실태조사는 일상생활에 대한 내용만 담겨있다."], ans:3, exp:"실태조사에는 일상생활뿐만 아니라 소득, 고용, 교육, 건강, 주거 등 장애인의 삶 전반에 걸친 내용이 포함됩니다."},
  {n:270, q:"급진사회복지실천에 대한 설명으로 옳은 것은?", opts:["사회관리가 아닌 사례관리 관점이다.","서비스 제공이 가장 중요하다.","개인과 환경간의 변화를 강조한다.","선별복지적 관점이다."], ans:2, exp:"급진사회복지실천은 단순히 개인을 돕는 것을 넘어 사회 구조적 변화와 환경의 변화를 추구합니다."},

  // 271~280
  {n:271, q:"우리나라 장애인복지 역사에 대한 설명으로 옳지 않은 것은?", opts:["장애인관련 다양한 법들이 제정되었다.","UN장애인권리협약이 우리나라에서는 아직 비준되지 않았다.","2000년대 이후 중증장애인 중심의 장애인운동이 시작되었다.","장애인복지법은 1980년대에 제정되었다."], ans:1, exp:"우리나라는 UN 장애인권리협약(CRPD)을 이미 비준(2008년)하였습니다."},
  {n:272, q:"관련부처가 합동으로 5년마다 수립하고 장애인정책의 종합적인 비전과 목표, 세부 과제 등의 내용을 담은 계획은 장애인정책종합계획이다.", opts:["O","X"], ans:0, exp:"법에 근거하여 5년마다 수립되는 우리나라 장애인 정책의 범정부적 중장기 계획입니다."},
  {n:273, q:"장애인 소득보장에 대한 설명으로 옳은 것은?", opts:["우리나라 장애인 소득보장제도에 장애수당은 없다.","생존권 보장 관점에서 국가가 노력하여야 한다.","장애인가구의 빈곤은 장애인 개인의 문제이다.","탈상품화와는 관련이 없는 내용이다."], ans:1, exp:"헌법 제34조 등에 근거하여 국가는 장애인의 생존권을 보장하기 위해 소득보장 제도를 마련할 의무가 있습니다."},
  {n:274, q:"한나 아렌트가 설명한 인간의 활동적 삶의 영역에 포함되지 않는 것은?", opts:["노동","작업","침묵","활동"], ans:2, exp:"아렌트는 인간의 활동적 삶을 노동(Labor), 작업(Work), 행위(Action)의 세 영역으로 구분했습니다."},
  {n:275, q:"장애인 고용과 관련된 설명으로 옳지 않은 것은?", opts:["장애인 노동을 이해하는 새로운 시각이 필요하다.","고용의 질보다 고용의 양적인 측면에 더 중점을 두고 있다.","장애인 고용률은 전체 인구보다 낮다.","장애인 고용제도 유형에는 경쟁고용만 있다."], ans:3, exp:"장애인 고용에는 경쟁고용뿐만 아니라 보호고용, 지원고용, 할당고용 등 다양한 유형이 존재합니다."},
  {n:276, q:"장애 학생 교육에 대한 내용으로 적절하지 않은 것은?", opts:["「장애인 등에 대한 특수교육법」에 관련 내용을 규정하고 있다.","「장애인평생교육법」이 제정되었다.","특수학교를 통한 분리교육이 최우선적으로 이루어져야 한다.","특수교육 대상은 장애인복지법상 장애인과 일치하지는 않는다."], ans:2, exp:"현대 특수교육은 분리가 아닌 일반 학생과 함께 배우는 통합교육을 최우선적 가치로 지향합니다."},
  {n:277, q:"장애인 건강권과 관련된 설명으로 옳지 않은 것은?", opts:["장애인 건강권 보장을 위한 법률이 제정되었다.","장애인의 건강 불평등은 확인된 바 없다.","장애친화병원 도입이 필요하다.","건강권 보장을 위한 다양한 조건이 갖추어져야 한다."], ans:1, exp:"장애인은 비장애인에 비해 만성질환 유병률이 높고 미충족 의료율이 높은 등 심각한 건강 불평등을 겪고 있습니다."},
  {n:278, q:"장애인활동지원은 대표적인 장애인복지관련 전자바우처이다.", opts:["O","X"], ans:0, exp:"장애인 활동지원 서비스는 바우처(이용권)를 통해 제공되는 대표적인 사회서비스입니다."},
  {n:279, q:"탈시설과 관련된 내용으로 적절하지 않은 것은?", opts:["좋은 시설은 없다.","우리나라는 2021년 탈시설 장애인지역사회자립지원로드맵을 발표하였다.","탈시설의 주요한 목표는 자립생활이다.","아직 관련된 법이 마련되지는 않았다."], ans:3, exp:"2021년 로드맵 발표 등 정책적 기반이 마련되고 있으며, 자립생활 지원을 위한 법적 근거가 존재합니다."},
  {n:280, q:"탈시설 관련 대담에 나온 활동가의 소속단체는 참여연대이다.", opts:["O","X"], ans:1, exp:"해당 대담자(김정아 활동가)의 소속 단체는 '장애와 인권 발바닥 행동'입니다."},

  // 281~290
  {n:281, q:"장애 여성에 대한 설명으로 옳은 것은?", opts:["우리 사회에서 다중 차별을 겪는 대표적 집단이다.","장애 남성과 고용률 차이는 없다.","실태조사 결과 대졸의 비율이 가장 높다.","장애 여성을 보호의 대상으로 보아야 한다."], ans:0, exp:"장애 여성은 장애와 성별, 빈곤 등이 겹쳐 발생하는 다중 차별의 상황에 놓여 있습니다."},
  {n:282, q:"장애인 가족에 대한 설명으로 옳지 않은 것은?", opts:["장애인 가족은 형제자매, 부모, 자녀 등 다양한 구성원이 있다.","현 정책은 장애인에 대한 책임을 가족보다는 국가와 사회에 두고 있다.","「장애아동복지지원법」은 장애인 가족 지원과 관련된 정책을 규정하는 법이다.","장애인 형제자매에 대한 지원방안이 확대될 필요가 있다."], ans:1, exp:"여전히 장애인 돌봄의 상당 부분을 가족이 부담하고 있어, 국가 책임을 더 강화해야 한다는 지적이 많습니다."},
  {n:283, q:"접근권은 이동권만을 말하는 것이다.", opts:["O","X"], ans:1, exp:"접근권은 물리적 공간의 이동권뿐만 아니라 정보 접근권 등 사회 전반의 시설과 서비스에 대한 접근을 모두 포함합니다."},
  {n:284, q:"장애인 차별에 대한 설명으로 옳은 것은?", opts:["키오스크는 장애인 차별과 전혀 상관이 없다.","구조적 차별보다는 개인적 차별 해소가 우선 이루어져야 한다.","보편적 설계가 장애인 차별을 해소해나가는 하나의 방안이 될 수 있다.","장애인 차별은 고용 영역에서만 이루어지고 있다."], ans:2, exp:"보편적 설계(유니버설 디자인)는 처음부터 장애 유무와 관계없이 누구나 편리하게 사용하도록 하여 차별적 환경을 제거합니다."},
  {n:285, q:"「장애인활동지원에 관한 법률」은 장애인 운동의 결과로 제정된 법이다.", opts:["O","X"], ans:0, exp:"장애인 활동지원 제도는 당사자들의 끊임없는 권리 투쟁과 운동을 통해 2011년 법제화되었습니다."},
  {n:286, q:"장애인 연금 기초급여액의 인상과 관련하여 정부가 목표로 했던 금액(2021년 기준)은?", opts:["20만 원","30만 원","40만 원","50만 원"], ans:1, exp:"제5차 장애인 정책종합계획에 따라 기초급여액을 30만 원까지 인상하는 것이 추진되었습니다."},
  {n:287, q:"장애인 경제 자립 기반 강화를 위해 소득보장과 함께 연계가 강화되어야 할 서비스는?", opts:["의료 서비스","고용 지원 서비스","여가 서비스","시설 수용 서비스"], ans:1, exp:"단순히 연금만 주는 것이 아니라 일할 수 있는 장애인에게는 고용 서비스를 연계하여 자립을 돕는 것이 중요합니다."},
  {n:288, q:"장애인 이동권 보장을 위해 전국적으로 도입 및 보급 확대가 필요한 버스의 종류는?", opts:["2층 버스","고속 버스","저상 버스","관광 버스"], ans:2, exp:"저상버스는 휠체어 이용자가 안전하게 탑승할 수 있도록 바닥이 낮게 설계된 버스입니다."},
  {n:289, q:"장애인 복지 실천의 패러다임이 의료적 모델에서 사회적 모델로 변화할 때 반영되어야 할 법률은?", opts:["국민연금법","장애인복지법","아동복지법","노인복지법"], ans:1, exp:"장애인복지법 상의 장애 정의와 체계를 사회적 모델에 맞게 개정하라는 UN의 권고사항이 있습니다."},
  {n:290, q:"장애인 정책 수립 시 장애를 성별, 연령, 계층 등과 함께 고려하는 관점을 무엇이라 하는가?", opts:["일차원적 관점","분리주의 관점","교차성(Intersectionality) 관점","개별화 관점"], ans:2, exp:"장애가 다른 정체성과 결합하여 복합적인 차별을 낳는 것을 이해하는 관점입니다."},

  // 291~300
  {n:291, q:"장애인의 탈시설을 위해 주거 지원뿐만 아니라 보장되어야 할 다른 영역은?", opts:["소득 및 고용","건강 및 의료","교육 및 문화","위 항목 모두 포함"], ans:3, exp:"탈시설은 삶의 전 영역에서 차별 없는 접근과 지원이 동시에 이루어져야 실현 가능합니다."},
  {n:292, q:"특수교육 지원을 내실화하기 위해 정책적으로 추진되는 과제는?", opts:["특수학교 및 특수학급 신·증설","통합교육 지원 강화","장애 학생 고등교육 지원 확대","위 항목 모두 포함"], ans:3, exp:"제5차 장애인 정책종합계획 등에서 교육권 보장을 위해 추진되는 중점 과제들입니다."},
  {n:293, q:"장애인 건강권 보장을 위해 전담 의사가 만성질환을 체계적으로 관리해주는 제도는?", opts:["장애인 활동지원 제도","장애인 건강 주치의 제도","장애인 연금 제도","장애인 보조기기 제도"], ans:1, exp:"건강 주치의는 장애 특성에 맞는 체계적인 건강 서비스를 제공하기 위해 도입되었습니다."},
  {n:294, q:"발달장애인의 개인별 특성에 맞는 복지 서비스를 연계하고 지원하는 전문 기관은?", opts:["노인복지관","장애인 자립생활센터","발달장애인지원센터","동사무소"], ans:2, exp:"발달장애인법에 근거하여 설치된 센터로 권리 옹호와 서비스 지원을 담당합니다."},
  {n:295, q:"장애인 복지의 미래 지향점 중 '포용 사회'가 의미하는 것은?", opts:["장애인이 사회에서 보이지 않게 하는 사회","장애인이 비장애인을 똑같이 닮아가는 사회","장애 여부와 관계없이 누구나 사회 시스템 내에서 권리를 누리는 사회","시설을 아주 대규모로 지어 보호하는 사회"], ans:2, exp:"다름을 인정하고 물리적·사회적 장벽을 제거하여 모두가 시민으로서 공존하는 사회입니다."},
  {n:296, q:"장애인 차별 구제를 위해 국가인권위원회에 진정을 넣었을 때 나올 수 있는 조치는?", opts:["피진정인에게 사형 선고","피진정인의 전 재산 몰수","차별 행위의 중지 및 원상 회복 등의 권고","장애 판정 즉시 취소"], ans:2, exp:"인권위는 조사 후 시정 권고를 내리며, 이를 이행하지 않을 경우 법무부 장관이 시정 명령을 내릴 수 있습니다."},
  {n:297, q:"장애인 권익 옹호 활동 중 장애인 당사자가 스스로 목소리를 내는 것을 무엇이라 하는가?", opts:["자선 활동","자기 옹호(Self-Advocacy)","대리 결정","병원 재활"], ans:1, exp:"자립생활 모델의 핵심 가치로 당사자가 자기 삶의 주권자임을 선언하는 활동입니다."},
  {n:298, q:"장애인 서비스 지원 종합조사에서 평가하는 항목이 아닌 것은?", opts:["옷 갈아입기","배변 돕기","최종 학력","사회 활동(외출 등)"], ans:2, exp:"종합조사는 일상생활 수행 능력과 서비스 필요도를 평가하며 학력 등은 직접적 항목이 아닙니다."},
  {n:299, q:"장애 발생 원인 중 사고나 질병 등 후천적 요인이 차지하는 비중은?", opts:["약 10%","약 50%","약 88% 이상","약 100%"], ans:2, exp:"대다수의 장애는 살아가면서 발생하는 사고나 질환에 의해 발생합니다."},
  {n:300, q:"장애인 복지의 궁극적인 지향점은 무엇인가?", opts:["장애인의 자립과 완전한 사회 참여","장애인의 시설 수용과 안전한 보호","장애인의 무조건적인 재활 치료 완료","장애인을 시혜와 동정의 대상으로 유지"], ans:0, exp:"모든 장애인 복지 정책과 법률은 장애인이 시민으로서 평등한 권리를 누리며 자립적으로 사회에 참여하는 것을 목표로 합니다."},
];

// ==============================
// STATE
// ==============================
let questions = [];
let currentIdx = 0;
let answers = {};       // 선택한 답 저장
let revealed = {};      // 즉시 피드백: 답을 확정(클릭)한 문제 추적
let bookmarks = new Set(JSON.parse(localStorage.getItem('pw2_bm') || '[]'));
let wrongSet = new Set(JSON.parse(localStorage.getItem('pw2_wrong') || '[]'));
let graded = false;
let currentMode = '';
let expandView = false;

let timerInterval = null;
let timerSeconds = 20 * 60;

function startTimer() {
  clearInterval(timerInterval);
  timerSeconds = 20 * 60;
  updateTimerDisplay();
  document.getElementById('timer-box').style.display = 'flex';
  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      alert('⏰ 시험 시간이 종료되었습니다!');
      gradeQuiz();
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  document.getElementById('timer-box').style.display = 'none';
}

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  const txt = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const el = document.getElementById('timer-display');
  el.textContent = txt;
  el.className = timerSeconds <= 60 ? 'timer-danger' : '';
}

function toggleExpandView() {
  expandView = !expandView;
  const btn = document.getElementById('expand-btn');
  const quizScreen = document.getElementById('quiz-screen');
  const expandScreen = document.getElementById('expand-all-screen');
  if (expandView) {
    btn.textContent = '⊟';
    quizScreen.classList.add('hidden');
    expandScreen.style.display = 'block';
    renderExpandAll();
  } else {
    btn.textContent = '⇅';
    expandScreen.style.display = 'none';
    quizScreen.classList.remove('hidden');
    renderQuestion();
  }
}

function renderExpandAll() {
  const screen = document.getElementById('expand-all-screen');
  screen.innerHTML = '';
  const nums = ['①','②','③','④'];
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'all-q-card';
    card.id = `all-q-${i}`;

    const numDiv = document.createElement('div');
    numDiv.className = 'q-num';
    numDiv.textContent = `${i + 1} / ${questions.length} 번 문제 (원번호 ${q.n}번)`;
    card.appendChild(numDiv);

    const textDiv = document.createElement('div');
    textDiv.className = 'q-text';
    textDiv.textContent = q.q;
    card.appendChild(textDiv);

    const optsDiv = document.createElement('div');
    optsDiv.className = 'options';
    const optNums = q.opts.length === 2 ? ['①','②'] : nums;
    const isRevealed = revealed[i] !== undefined;
    q.opts.forEach((opt, oi) => {
      const div = document.createElement('div');
      div.className = 'option';
      div.innerHTML = `<span class="num">${optNums[oi]}</span><span>${opt}</span>`;
      if (isRevealed) {
        if (oi === q.ans) div.classList.add('correct');
        else if (answers[i] === oi) div.classList.add('wrong');
        div.style.cursor = 'default';
        div.style.pointerEvents = 'none';
      } else {
        if (answers[i] === oi) div.classList.add('selected');
        div.onclick = () => { selectOption(oi); renderExpandAll(); };
      }
      optsDiv.appendChild(div);
    });
    card.appendChild(optsDiv);

    if (isRevealed) {
      const expDiv = document.createElement('div');
      expDiv.className = 'explanation show';
      expDiv.innerHTML = `<div class="exp-label">💡 해설</div><div>${q.exp}</div>`;
      card.appendChild(expDiv);
    }
    screen.appendChild(card);
  });
}

function saveBookmarks() { localStorage.setItem('pw2_bm', JSON.stringify([...bookmarks])); }
function saveWrong() { localStorage.setItem('pw2_wrong', JSON.stringify([...wrongSet])); }

function showStart() {
  document.getElementById('start-screen').classList.remove('hidden');
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('expand-all-screen').style.display = 'none';
  document.getElementById('tabbar').classList.add('hidden');
  document.getElementById('sidebar').classList.add('hidden');
  document.getElementById('mode-tag').textContent = '모드 선택 중';
  document.getElementById('progress-text').textContent = '';
  document.getElementById('expand-btn').style.display = 'none';
  setHeaderBtns(false, false, false);
  stopTimer();
  graded = false;
  answers = {};
  revealed = {};
  questions = [];
  currentIdx = 0;
  expandView = false;
}

function setHeaderBtns(grade, retry, home) {
  document.getElementById('btn-header-grade').style.display = grade ? 'inline-block' : 'none';
  document.getElementById('btn-header-retry').style.display = retry ? 'inline-block' : 'none';
  document.getElementById('btn-header-home').style.display = home ? 'inline-block' : 'none';
}

function retryQuiz() {
  if (!confirm('다시 풀기 하면 현재 답이 초기화됩니다. 계속하시겠습니까?')) return;
  startQuiz(currentMode);
}

function startQuiz(mode) {
  currentMode = mode;
  graded = false;
  answers = {};
  revealed = {};
  currentIdx = 0;
  expandView = false;
  let useTimer = false;

  if (mode === 'random') {
    questions = shuffle([...ALL_QUESTIONS]).slice(0, 30);
    document.getElementById('mode-tag').textContent = '랜덤 30문제';
    useTimer = true;
  } else if (mode === 'all') {
    questions = [...ALL_QUESTIONS];
    document.getElementById('mode-tag').textContent = '전체 150문제';
    useTimer = false;
  } else if (mode === 'bookmark') {
    const bmIds = [...bookmarks];
    questions = ALL_QUESTIONS.filter((_, i) => bmIds.includes(i));
    if (questions.length === 0) { alert('📌 책갈피된 문제가 없습니다.'); return; }
    document.getElementById('mode-tag').textContent = `책갈피 ${questions.length}문제`;
    useTimer = false;
  } else if (mode === 'wrong') {
    questions = [...wrongSet].map(i => ALL_QUESTIONS[i]).filter(Boolean);
    if (questions.length === 0) { alert('✅ 틀린 문제가 없습니다!'); return; }
    document.getElementById('mode-tag').textContent = `오답 ${questions.length}문제`;
    useTimer = false;
  }

  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('expand-all-screen').style.display = 'none';
  document.getElementById('quiz-screen').classList.remove('hidden');
  document.getElementById('tabbar').classList.remove('hidden');
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('expand-btn').style.display = 'flex';
  document.getElementById('expand-btn').textContent = '⇅';
  setHeaderBtns(false, true, true);

  if (useTimer) startTimer();
  else stopTimer();

  buildTabbar();
  renderQuestion();
  renderGrid();
}

function navigate(dir) {
  if (dir === 1 && currentIdx === questions.length - 1) {
    // 마지막 문제에서 '완료' 클릭 → 결과 화면
    gradeQuiz();
    return;
  }
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= questions.length) return;
  currentIdx = newIdx;
  renderQuestion();
  renderGrid();
}

function goToQuestion(i) {
  if (expandView) {
    const card = document.getElementById(`all-q-${i}`);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    currentIdx = i;
    renderGrid();
    return;
  }
  currentIdx = i;
  renderQuestion();
  renderGrid();
}

function buildTabbar() {
  const bar = document.getElementById('tabbar');
  bar.innerHTML = '';
  const total = questions.length;
  const groupSize = 10;
  const numGroups = Math.ceil(total / groupSize);
  for (let g = 0; g < numGroups; g++) {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.dataset.group = g;
    const start = g * groupSize + 1;
    const end = Math.min((g + 1) * groupSize, total);
    btn.textContent = `${start}~${end}`;
    btn.onclick = () => goToQuestion(g * groupSize);
    bar.appendChild(btn);
  }
  updateTabbar();
}

function updateTabbar() {
  const groupSize = 10;
  document.querySelectorAll('.tab-btn').forEach(btn => {
    const g = parseInt(btn.dataset.group);
    const start = g * groupSize;
    const end = Math.min((g + 1) * groupSize, questions.length);
    const total = end - start;
    const done = Object.keys(answers).filter(k => parseInt(k) >= start && parseInt(k) < end).length;
    const numStart = start + 1;
    const numEnd = end;
    btn.textContent = `${numStart}~${numEnd} (${done}/${total})`;
    const curGroup = Math.floor(currentIdx / groupSize);
    btn.classList.toggle('active', g === curGroup);
  });
}

function renderQuestion() {
  const q = questions[currentIdx];
  if (!q) return;

  const origIdx = ALL_QUESTIONS.indexOf(q);
  document.getElementById('q-num-label').textContent = `${currentIdx + 1} / ${questions.length} 번 문제 (원번호 ${q.n}번)`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('q-text').style.fontWeight = '600';

  const optsCont = document.getElementById('options');
  optsCont.innerHTML = '';

  const nums = q.opts.length === 2 ? ['①','②'] : ['①','②','③','④'];
  const isRevealed = revealed[currentIdx] !== undefined; // 이 문제에서 이미 답 클릭했는지

  q.opts.forEach((opt, oi) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = `<span class="num">${nums[oi]}</span><span>${opt}</span>`;

    if (isRevealed) {
      // 답 클릭 후: 정답/오답 색상 표시, 클릭 불가
      const chosen = answers[currentIdx];
      if (oi === q.ans) div.classList.add('correct');
      else if (chosen === oi) div.classList.add('wrong');
      // 클릭 비활성화 (pointer-events none)
      div.style.cursor = 'default';
      div.style.pointerEvents = 'none';
    } else {
      // 답 클릭 전: 선택 가능
      if (answers[currentIdx] === oi) div.classList.add('selected');
      div.onclick = () => selectOption(oi);
    }
    optsCont.appendChild(div);
  });

  // 해설: 답 클릭 후 즉시 표시
  const expEl = document.getElementById('explanation');
  const expText = document.getElementById('exp-text');
  if (isRevealed) {
    expEl.classList.add('show');
    expText.textContent = q.exp;
  } else {
    expEl.classList.remove('show');
  }

  // 책갈피
  const bmBtn = document.getElementById('bm-btn');
  if (bookmarks.has(origIdx)) {
    bmBtn.classList.add('bookmarked');
    bmBtn.textContent = '🔖 책갈피됨';
  } else {
    bmBtn.classList.remove('bookmarked');
    bmBtn.textContent = '🔖 책갈피';
  }

  document.getElementById('btn-prev').disabled = currentIdx === 0;
  document.getElementById('btn-next').textContent = currentIdx === questions.length - 1 ? '완료' : '다음 ▶';

  const answered = Object.keys(revealed).length;
  document.getElementById('progress-text').textContent = `${answered} / ${questions.length} 문제 응답`;
  document.getElementById('sb-progress').textContent = `${answered} / ${questions.length} 응답`;

  updateTabbar();
}

function selectOption(oi) {
  if (revealed[currentIdx] !== undefined) return; // 이미 확정된 경우 무시
  answers[currentIdx] = oi;
  revealed[currentIdx] = oi; // 즉시 확정 & 피드백

  // 오답 세트 업데이트
  const q = questions[currentIdx];
  const origIdx = ALL_QUESTIONS.indexOf(q);
  if (oi === q.ans) wrongSet.delete(origIdx);
  else wrongSet.add(origIdx);
  saveWrong();

  renderQuestion();
  renderGrid();
}

function toggleBookmark() {
  const q = questions[currentIdx];
  const origIdx = ALL_QUESTIONS.indexOf(q);
  if (bookmarks.has(origIdx)) bookmarks.delete(origIdx);
  else bookmarks.add(origIdx);
  saveBookmarks();
  renderQuestion();
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('q-grid');
  grid.innerHTML = '';
  const nums = ['①','②','③','④'];
  questions.forEach((q, i) => {
    const origIdx = ALL_QUESTIONS.indexOf(q);
    const div = document.createElement('div');
    div.className = 'q-dot';

    const numEl = document.createElement('span');
    numEl.className = 'dot-num';
    numEl.textContent = q.n;
    div.appendChild(numEl);

    if (answers[i] !== undefined) {
      const ansEl = document.createElement('span');
      ansEl.className = 'dot-ans';
      const optNums = q.opts.length === 2 ? ['①','②'] : nums;
      ansEl.textContent = optNums[answers[i]];
      div.appendChild(ansEl);
    }

    div.onclick = () => goToQuestion(i);

    if (i === currentIdx) div.classList.add('current');
    if (bookmarks.has(origIdx)) div.classList.add('bookmarked-dot');

    // 답을 클릭(확정)한 경우 정답/오답 색상 표시
    if (revealed[i] !== undefined) {
      if (answers[i] === q.ans) div.classList.add('correct-dot');
      else div.classList.add('wrong-dot');
    } else if (answers[i] !== undefined) {
      div.classList.add('answered');
    }
    grid.appendChild(div);
  });
}

function gradeQuiz() {
  stopTimer();
  document.getElementById('expand-btn').style.display = 'none';
  document.getElementById('expand-all-screen').style.display = 'none';
  expandView = false;

  let correct = 0, wrong = 0, unanswered = 0;
  questions.forEach((q, i) => {
    const origIdx = ALL_QUESTIONS.indexOf(q);
    if (revealed[i] === undefined) {
      unanswered++;
      wrongSet.add(origIdx);
    } else if (answers[i] === q.ans) {
      correct++;
      wrongSet.delete(origIdx);
    } else {
      wrong++;
      wrongSet.add(origIdx);
    }
  });
  saveWrong();

  const total = questions.length;
  const score = Math.round((correct / total) * 100);

  document.getElementById('result-screen').classList.remove('hidden');
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('res-score').textContent = `${score}점`;
  document.getElementById('res-sub').textContent = `총 ${total}문제 중 ${correct}문제 정답`;
  document.getElementById('res-c').textContent = correct;
  document.getElementById('res-w').textContent = wrong + unanswered;
  document.getElementById('res-b').textContent = bookmarks.size;
  setHeaderBtns(false, false, true);
  renderGrid();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
