<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프로그램 개발과 평가 예상문제</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
  :root {
    --primary: #1a5276; --primary-light: #2e86c1;
    --accent: #e74c3c; --accent2: #f39c12;
    --bg: #f0f4f8; --card: #ffffff;
    --sidebar: #1a3a5c; --sidebar-text: #cfe2f3;
    --correct: #1e8449; --wrong: #c0392b;
    --bookmark: #e67e22; --border: #d5e8f0;
    --text: #1a252f; --muted: #7f8c8d;
    --header-h: 56px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  #header { background: var(--primary); color: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: var(--header-h); flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.25); z-index: 100; }
  #header .title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  #header .title span { font-weight: 300; font-size: 14px; margin-left: 8px; opacity: 0.8; }
  #header .right-info { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  #header .right-info .tag { background: rgba(255,255,255,0.15); border-radius: 4px; padding: 3px 9px; font-size: 12px; }

  .header-action-btn { padding: 6px 13px; border-radius: 6px; border: none; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 700; transition: opacity .15s; display: none; }
  .header-action-btn:hover { opacity: .85; }
  #btn-header-grade { background: var(--accent); color: #fff; }
  #btn-header-retry { background: var(--bookmark); color: #fff; }
  #btn-header-home  { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); }

  #tabbar { background: #eaf2f8; border-bottom: 2px solid var(--border); display: flex; align-items: flex-end; padding: 0 20px; gap: 4px; flex-shrink: 0; overflow-x: auto; }
  .tab-btn { padding: 8px 14px; border: 1px solid var(--border); border-bottom: none; border-radius: 6px 6px 0 0; background: #dce9f5; color: var(--primary); font-size: 11px; cursor: pointer; font-family: inherit; font-weight: 500; white-space: nowrap; transition: background .15s; flex-shrink: 0; }
  .tab-btn.active { background: var(--card); color: var(--primary); font-weight: 700; }

  #body { display: flex; flex: 1; overflow: hidden; }
  #main { flex: 1; overflow-y: auto; padding: 24px 28px; position: relative; }

  #start-screen { max-width: 560px; margin: 60px auto; background: var(--card); border-radius: 14px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); padding: 48px 40px; text-align: center; }
  #start-screen h2 { font-size: 22px; color: var(--primary); margin-bottom: 8px; }
  #start-screen p { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
  .start-options { display: flex; flex-direction: column; gap: 14px; }
  .start-btn { padding: 18px 24px; border-radius: 10px; border: 2px solid var(--border); background: #f7fbff; cursor: pointer; font-family: inherit; font-size: 15px; font-weight: 700; color: var(--primary); transition: all .2s; text-align: left; display: flex; align-items: center; gap: 14px; }
  .start-btn:hover { border-color: var(--primary-light); background: #eaf3fb; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.08); }
  .start-btn .icon { font-size: 26px; }
  .start-btn small { display: block; font-size: 12px; font-weight: 400; color: var(--muted); margin-top: 2px; }

  .q-num { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.5px; }
  .q-text { font-size: 15px; line-height: 1.75; font-weight: 500; margin-bottom: 20px; color: var(--text); white-space: pre-line; }
  .q-box { background: #f8fbfd; border-left: 3px solid var(--primary-light); border-radius: 4px; padding: 14px 16px; margin-bottom: 20px; font-size: 14px; line-height: 1.8; color: #1c2e3e; }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option { display: flex; align-items: flex-start; gap: 12px; padding: 13px 16px; border: 1.5px solid var(--border); border-radius: 8px; cursor: pointer; background: var(--card); transition: all .15s; font-size: 14px; line-height: 1.6; }
  .option:hover { border-color: var(--primary-light); background: #eaf3fb; }
  .option.selected { border-color: var(--primary); background: #ffffff; }
  .option.correct { border-color: var(--correct); background: #eafaf1; color: var(--correct); }
  .option.wrong { border-color: var(--wrong); background: #fdedec; color: var(--wrong); }
  .option .num { font-weight: 700; min-width: 20px; }

  .feedback { display: none; margin-top: 14px; padding: 12px 16px; border-radius: 6px; font-size: 13.5px; font-weight: 600; border-left: 3px solid; }
  .feedback.correct-fb { display: block; background: #eafaf1; color: var(--correct); border-color: var(--correct); }
  .feedback.wrong-fb { display: block; background: #fdedec; color: var(--wrong); border-color: var(--wrong); }

  .q-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border); }
  .nav-btn { padding: 9px 22px; border-radius: 6px; border: 1.5px solid var(--border); background: var(--card); cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; color: var(--primary); transition: all .15s; }
  .nav-btn:hover { background: #eaf3fb; border-color: var(--primary-light); }
  .nav-btn:disabled { opacity: .35; cursor: not-allowed; }
  .nav-btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .nav-btn.primary:hover { background: var(--primary-light); }
  .bm-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; border: 1.5px solid var(--border); background: var(--card); cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600; color: var(--muted); transition: all .15s; }
  .bm-btn.bookmarked { color: var(--bookmark); border-color: var(--bookmark); background: #fef5e7; }
  .bm-btn:hover { border-color: var(--bookmark); color: var(--bookmark); }

  #sidebar { width: 220px; background: var(--sidebar); overflow-y: auto; flex-shrink: 0; padding: 16px 12px; }
  #sidebar h4 { color: var(--sidebar-text); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; opacity: 0.7; }
  #q-grid { display: flex; flex-direction: column; gap: 4px; }
  .q-dot { width: 100%; border-radius: 5px; background: rgba(255,255,255,0.1); display: flex; flex-direction: row; align-items: center; padding: 7px 10px; font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.5); cursor: pointer; transition: all .15s; border: 1.5px solid transparent; }
  .q-dot:hover { background: rgba(255,255,255,0.2); }
  .q-dot.current { border-color: #7fb3d3; color: #fff; background: rgba(100,180,255,0.25); }
  .q-dot.answered { background: rgba(255,255,255,0.22); color: #fff; border-color: rgba(255,255,255,0.35); }
  .q-dot.bookmarked-dot { background: rgba(230,126,34,0.35); border-color: var(--bookmark); color: #f0a500; }
  .q-dot.correct-dot { background: rgba(30,132,73,0.4); color: #82e0aa; }
  .q-dot.wrong-dot { background: rgba(192,57,43,0.45); color: #f1948a; }
  .q-dot .dot-num { min-width: 26px; font-weight: 700; color: rgba(255,255,255,0.75); font-size: 11px; }
  .q-dot .dot-ans { font-size: 12px; margin-left: 4px; background: rgba(255,255,255,0.85); color: var(--sidebar); border-radius: 3px; padding: 1px 5px; font-weight: 700; }

  #result-screen { max-width: 580px; margin: 40px auto; background: var(--card); border-radius: 14px; box-shadow: 0 4px 24px rgba(0,0,0,0.10); padding: 40px 36px; text-align: center; }
  #result-screen h2 { font-size: 24px; color: var(--primary); margin-bottom: 6px; }
  .score-big { font-size: 64px; font-weight: 700; color: var(--primary); line-height: 1; margin: 20px 0 8px; }
  .score-sub { font-size: 15px; color: var(--muted); margin-bottom: 24px; }
  .result-grid { display: flex; gap: 16px; justify-content: center; margin-bottom: 28px; }
  .result-stat { flex: 1; padding: 16px; border-radius: 10px; }
  .result-stat.c { background: #eafaf1; color: var(--correct); }
  .result-stat.w { background: #fdedec; color: var(--wrong); }
  .result-stat.b { background: #fef5e7; color: var(--bookmark); }
  .result-stat .label { font-size: 12px; margin-bottom: 4px; }
  .result-stat .val { font-size: 28px; font-weight: 700; }
  .result-actions { display: flex; flex-direction: column; gap: 10px; }
  .result-actions button { padding: 14px; border-radius: 8px; border: none; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 700; transition: opacity .15s; }
  .result-actions button:hover { opacity: .85; }
  .btn-a { background: var(--accent); color: #fff; }
  .btn-b { background: var(--bookmark); color: #fff; }
  .btn-c { background: var(--primary); color: #fff; }
  .btn-d { background: #ecf0f1; color: var(--text); }

  .hidden { display: none !important; }
  #expand-all-screen { display: none; padding: 24px 28px; }
  .all-q-card { background: var(--card); border-radius: 10px; border: 1.5px solid var(--border); padding: 20px 22px; margin-bottom: 18px; }
  .all-q-card .q-num { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 700; }
  .all-q-card .q-text { font-size: 14px; font-weight: 600; margin-bottom: 14px; line-height: 1.7; white-space: pre-line; }
  .all-q-card .options { gap: 7px; }
  .all-q-card .option { padding: 9px 13px; font-size: 13px; }

  #timer-box { display: none; }
  .timer-danger { color: #ff6b6b !important; animation: blink .8s step-end infinite; }
  @keyframes blink { 50% { opacity: .4; } }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: #b0c4d8; border-radius: 3px; }
</style>
</head>
<body>

<div id="header">
  <div class="title">프로그램 개발과 평가 <span>예상문제</span></div>
  <div class="right-info">
    <span class="tag" id="mode-tag">모드 선택 중</span>
    <span id="progress-text" style="font-size:13px;opacity:.85"></span>
    <div id="timer-box" style="display:none;align-items:center;gap:8px;background:rgba(255,255,255,0.12);border-radius:6px;padding:4px 12px;">
      <span style="font-size:11px;opacity:.8;line-height:1.3;">남은<br>시간</span>
      <span id="timer-display" style="font-size:20px;font-weight:700;letter-spacing:1px;font-variant-numeric:tabular-nums;">20:00</span>
    </div>
    <button id="btn-header-grade" class="header-action-btn" onclick="gradeQuiz()">📊 채점하기</button>
    <button id="btn-header-retry" class="header-action-btn" onclick="retryQuiz()">🔄 다시하기</button>
    <button id="btn-header-home"  class="header-action-btn" onclick="showStart()">🏠 처음으로</button>
    <button id="expand-btn" onclick="toggleExpandView()" title="전체 문제 보기" style="display:none;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.3);border-radius:6px;color:#fff;width:38px;height:38px;font-size:20px;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;">⇅</button>
  </div>
</div>

<div id="tabbar" class="hidden"></div>

<div id="body">
  <div id="main">
    <div id="start-screen">
      <h2>📋 프로그램 개발과 평가</h2>
      <p>제1장~종합 예상문제 · 총 <span id="total-count"></span>문항</p>
      <div class="start-options">
        <button class="start-btn" onclick="startQuiz('random')">
          <span class="icon">🎲</span>
          <div>랜덤 30문제<small>전체 문제 중 무작위로 30문항 출제 · ⏱ 20분 제한</small></div>
        </button>
        <button class="start-btn" onclick="startQuiz('all')">
          <span class="icon">📋</span>
          <div>전체 문제 풀기<small>모든 문항 출제 · 시간 제한 없음</small></div>
        </button>
        <button class="start-btn" onclick="startQuiz('bookmark')">
          <span class="icon">🔖</span>
          <div>책갈피 문제만 풀기<small>저장된 책갈피 문제만 출제</small></div>
        </button>
        <button class="start-btn" onclick="startQuiz('wrong')">
          <span class="icon">❌</span>
          <div>틀린 문제만 다시 풀기<small>이전 채점에서 틀린 문제만 출제</small></div>
        </button>
      </div>
    </div>

    <div id="quiz-screen" class="hidden">
      <div class="q-num" id="q-num-label"></div>
      <div class="q-text" id="q-text"></div>
      <div class="q-box hidden" id="q-box"></div>
      <div id="options-area"></div>
      <div class="feedback" id="q-feedback"></div>
      <div class="q-nav">
        <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">◀ 이전</button>
        <button class="bm-btn" id="bm-btn" onclick="toggleBookmark()">🔖 책갈피</button>
        <button class="nav-btn primary" id="btn-next" onclick="navigate(1)">다음 ▶</button>
      </div>
    </div>

    <div id="expand-all-screen"></div>

    <div id="result-screen" class="hidden">
      <h2>🎉 채점 결과</h2>
      <div class="score-big" id="res-score"></div>
      <div class="score-sub" id="res-sub"></div>
      <div class="result-grid">
        <div class="result-stat c"><div class="label">✅ 정답</div><div class="val" id="res-c"></div></div>
        <div class="result-stat w"><div class="label">❌ 오답</div><div class="val" id="res-w"></div></div>
        <div class="result-stat b"><div class="label">🔖 책갈피</div><div class="val" id="res-b"></div></div>
      </div>
      <div class="result-actions">
        <button class="btn-a" onclick="startQuiz('wrong')">❌ 틀린 문제만 다시 풀기</button>
        <button class="btn-b" onclick="startQuiz('bookmark')">🔖 책갈피 문제 풀기</button>
        <button class="btn-c" onclick="startQuiz('all')">📋 전체 문제 다시 풀기</button>
        <button class="btn-d" onclick="showStart()">🏠 처음으로</button>
      </div>
    </div>
  </div>

  <div id="sidebar" class="hidden">
    <h4>문제 현황</h4>
    <div id="q-grid"></div>
  </div>
</div>

<script>

const ALL_QUESTIONS = [
  {"강": "1장", "n": 1, "text": "사회복지의 어원적 의미와 정의에 대한 설명으로 옳은 것은?", "type": "mc", "opts": ["로마니쉰은 사회복지를 '한정된 사회적 노력'으로 보았다.", "국내 학자들은 공통적으로 '행복을 추구하기 위한 사회적 노력'으로 정의한다.", "사회복지는 개인의 안녕보다는 국가의 체제 유지에만 목적이 있다.", "사회적 위험에 대한 사적인 대응만을 의미한다."], "ans": 1},
  {"강": "1장", "n": 2, "text": "'복지국가 시대'의 사회복지 특성에 해당하지 않는 것은?", "type": "mc", "opts": ["국가와 시민단체가 복지 제공의 주체가 됨", "국민최저 이상, 직업보장과 복지의 관련성 중시", "시장을 보완하기 위한 사회경제정책을 도입함", "복지의 대상은 노동자 계급으로 한정됨"], "ans": 3},
  {"강": "1장", "n": 3, "text": "빈민법(Poor Law) 시대의 사회복지 대상에 대한 설명으로 옳은 것은?", "type": "mc", "opts": ["모든 시민을 대상으로 보편적 복지를 제공했다.", "노동 능력이 있는 빈민에게는 구제를 금지하고 처벌하기도 했다.", "구제 가치가 있는 빈민(걸인, 부랑자 등)에게만 한정된 구제를 제공했다.", "아동의 권리를 최우선으로 보장했다."], "ans": 2},
  {"강": "1장", "n": 4, "text": "복지국가 유형론 중 '보수주의 복지국가'에서 정부는 보조적인 역할에 머물렀다. (O/X)", "type": "mc", "opts": ["O", "X", "해당 없음", "알 수 없음"], "ans": 0},
  {"강": "1장", "n": 5, "text": "에스핑-앤더슨의 복지국가 유형 중 '자유주의 복지국가'의 특징은?", "type": "mc", "opts": ["탈상품화 효과가 매우 크다.", "공공부조 프로그램을 강조하며 시장의 효율성을 중시한다.", "보편적 수당과 서비스를 제공한다.", "국가의 개입이 가장 강력하다."], "ans": 1},
  {"강": "1장", "n": 6, "text": "에스핑-앤더슨의 유형 중 스웨덴과 같이 높은 수준의 탈상품화와 보편적 복지를 지향하는 국가는?", "type": "mc", "opts": ["자유주의", "보수주의", "사민주의", "공산주의"], "ans": 2},
  {"강": "1장", "n": 7, "text": "'유리천장(Glass Ceiling)'의 의미로 가장 적절한 것은?", "type": "mc", "opts": ["투명한 경영을 지향하는 기업 문화", "여성이나 소수자의 고위직 진출을 가로막는 보이지 않는 장벽", "고층 빌딩의 인테리어 디자인 기법", "사회복지 시설의 개방적인 구조"], "ans": 1},
  {"강": "1장", "n": 8, "text": "사회복지 프로그램의 어원 중 '그래핀(Graphein)'이 의미하는 것은?", "type": "mc", "opts": ["미리(Before)", "기록한다(to write)", "계획(Plan)", "행동(Action)"], "ans": 1},
  {"강": "1장", "n": 9, "text": "사회복지 프로그램의 정의로 가장 적절한 것은?", "type": "mc", "opts": ["우연히 발생하는 사회적 사건들의 모임", "특정 목표 달성을 위해 계획된 구조화된 활동들의 집합체", "단순히 물품을 배분하는 일회적 시혜", "사회복지사 개인의 취미 활동"], "ans": 1},
  {"강": "1장", "n": 10, "text": "사회복지 공동모금회의 배분사업 중 '자유주제 공모형태'로 신청받아 배분하는 사업은?", "type": "mc", "opts": ["신청사업", "기획사업", "긴급지원사업", "지정기탁사업"], "ans": 0},

  {"강": "종합", "n": 48, "text": "결과보고서에 반드시 포함되어야 할 내용은?", "type": "mc", "opts": ["성과 목표 달성도와 예산 결산 내역", "참여자의 상세한 개인 실명", "기관장의 개인 이력서", "타 기관의 실패 사례 비판"], "ans": 0},
  {"강": "종합", "n": 49, "text": "프로그램 기획자가 가져야 할 역량 중 \"불확실한 대안 중 최선을 선택하는 태도\"는?", "type": "mc", "opts": ["소극적 방어 정신", "모험가 정신과 용기", "무조건적 수용", "침묵의 기술"], "ans": 1},
  {"강": "종합", "n": 50, "text": "\"기획은 순환적이며 회전목마처럼 반복된다\"는 표현이 시사하는 바는?", "type": "mc", "opts": ["기획은 한 번으로 충분하다.", "평가는 기획과 무관한 별개의 단계다.", "평가 결과가 환류(Feedback)되어 다음 기획의 질을 높이는 연속적 과정이다.", "기획은 놀이처럼 가벼워야 한다."], "ans": 2}
];
document.getElementById('total-count').textContent = ALL_QUESTIONS.length;

let questions=[], currentIdx=0, answers={}, graded=false, currentMode='', expandView=false;
let bookmarks = new Set(JSON.parse(localStorage.getItem('pw_bm')||'[]'));
let wrongSet  = new Set(JSON.parse(localStorage.getItem('pw_wrong')||'[]'));

let timerInterval=null, timerSeconds=1200;
function startTimer(){clearInterval(timerInterval);timerSeconds=1200;updateTimerDisplay();const b=document.getElementById('timer-box');b.style.display='flex';timerInterval=setInterval(()=>{timerSeconds--;updateTimerDisplay();if(timerSeconds<=0){clearInterval(timerInterval);alert('⏰ 시험 시간이 종료되었습니다!');gradeQuiz();}},1000);}
function stopTimer(){clearInterval(timerInterval);document.getElementById('timer-box').style.display='none';}
function updateTimerDisplay(){const m=Math.floor(timerSeconds/60),s=timerSeconds%60,t=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`,el=document.getElementById('timer-display');el.textContent=t;el.className=timerSeconds<=60?'timer-danger':'';}

function toggleExpandView(){expandView=!expandView;const btn=document.getElementById('expand-btn'),qs=document.getElementById('quiz-screen'),es=document.getElementById('expand-all-screen');if(expandView){btn.textContent='⊟';qs.classList.add('hidden');es.style.display='block';renderExpandAll();}else{btn.textContent='⇅';es.style.display='none';qs.classList.remove('hidden');renderQuestion();}}

function renderExpandAll(){const sc=document.getElementById('expand-all-screen');sc.innerHTML='';const nums=['①','②','③','④'];questions.forEach((q,i)=>{const card=document.createElement('div');card.className='all-q-card';card.id=`all-q-${i}`;const nd=document.createElement('div');nd.className='q-num';nd.textContent=`${i+1} / ${questions.length} 번 문제 · ${q.강}`;card.appendChild(nd);const td=document.createElement('div');td.className='q-text';td.textContent=q.text;card.appendChild(td);if(q.context){const bx=document.createElement('div');bx.className='q-box';bx.textContent=q.context;card.appendChild(bx);}const oa=document.createElement('div');oa.className='options';q.opts.forEach((opt,oi)=>{const d=document.createElement('div');d.className='option';d.innerHTML=`<span class="num">${nums[oi]}</span><span>${opt}</span>`;if(answers[i]!==undefined){if(oi===q.ans)d.classList.add('correct');else if(answers[i]===oi&&answers[i]!==q.ans)d.classList.add('wrong');else if(answers[i]===oi)d.classList.add('selected');}else{if(!graded)d.onclick=()=>{answers[i]=oi;renderExpandAll();renderGrid();};}oa.appendChild(d);});card.appendChild(oa);if(answers[i]!==undefined){const fb=document.createElement('div');const ok=checkCorrect(q,answers[i]);fb.className=`feedback ${ok?'correct-fb':'wrong-fb'}`;fb.textContent=ok?'✓ 정답입니다!':`✗ 오답입니다. 정답: ${nums[q.ans]} ${q.opts[q.ans]}`;card.appendChild(fb);}sc.appendChild(card);});}

function saveBookmarks(){localStorage.setItem('pw_bm',JSON.stringify([...bookmarks]));}
function saveWrong(){localStorage.setItem('pw_wrong',JSON.stringify([...wrongSet]));}
function checkCorrect(q,ua){return parseInt(ua)===q.ans;}

function setHeaderBtns(g,r,h){document.getElementById('btn-header-grade').style.display=g?'inline-block':'none';document.getElementById('btn-header-retry').style.display=r?'inline-block':'none';document.getElementById('btn-header-home').style.display=h?'inline-block':'none';}

function showStart(){document.getElementById('start-screen').classList.remove('hidden');document.getElementById('quiz-screen').classList.add('hidden');document.getElementById('result-screen').classList.add('hidden');document.getElementById('expand-all-screen').style.display='none';document.getElementById('tabbar').classList.add('hidden');document.getElementById('sidebar').classList.add('hidden');document.getElementById('mode-tag').textContent='모드 선택 중';document.getElementById('progress-text').textContent='';document.getElementById('expand-btn').style.display='none';setHeaderBtns(false,false,false);stopTimer();graded=false;answers={};questions=[];currentIdx=0;expandView=false;}

function retryQuiz(){if(!confirm('다시 풀기 하면 현재 답이 초기화됩니다. 계속하시겠습니까?'))return;startQuiz(currentMode);}

function startQuiz(mode){currentMode=mode;graded=false;answers={};currentIdx=0;expandView=false;let useTimer=false;
if(mode==='random'){questions=shuffle([...ALL_QUESTIONS]).slice(0,30);document.getElementById('mode-tag').textContent='랜덤 30문제';useTimer=true;}
else if(mode==='all'){questions=[...ALL_QUESTIONS];document.getElementById('mode-tag').textContent=`전체 ${ALL_QUESTIONS.length}문제`;}
else if(mode==='bookmark'){const bmIds=[...bookmarks];questions=ALL_QUESTIONS.filter((_,i)=>bmIds.includes(i));if(questions.length===0){alert('📌 책갈피된 문제가 없습니다.');return;}document.getElementById('mode-tag').textContent=`책갈피 ${questions.length}문제`;}
else if(mode==='wrong'){questions=[...wrongSet].map(i=>ALL_QUESTIONS[i]).filter(Boolean);if(questions.length===0){alert('✅ 틀린 문제가 없습니다!');return;}document.getElementById('mode-tag').textContent=`오답 ${questions.length}문제`;}
document.getElementById('start-screen').classList.add('hidden');document.getElementById('result-screen').classList.add('hidden');document.getElementById('expand-all-screen').style.display='none';document.getElementById('quiz-screen').classList.remove('hidden');document.getElementById('tabbar').classList.remove('hidden');document.getElementById('sidebar').classList.remove('hidden');document.getElementById('expand-btn').style.display='flex';document.getElementById('expand-btn').textContent='⇅';setHeaderBtns(true,true,true);
if(useTimer)startTimer();else stopTimer();
buildTabbar();renderQuestion();renderGrid();}

function navigate(dir){const ni=currentIdx+dir;if(ni<0||ni>=questions.length)return;currentIdx=ni;renderQuestion();renderGrid();}
function goToQuestion(i){if(expandView){const c=document.getElementById(`all-q-${i}`);if(c)c.scrollIntoView({behavior:'smooth',block:'center'});currentIdx=i;renderGrid();return;}currentIdx=i;renderQuestion();renderGrid();}

function buildTabbar(){const bar=document.getElementById('tabbar');bar.innerHTML='';const groups=[...new Set(questions.map(q=>q.강))];groups.forEach(g=>{const btn=document.createElement('button');btn.className='tab-btn';btn.dataset.group=g;btn.onclick=()=>{const idx=questions.findIndex(q=>q.강===g);if(idx>=0)goToQuestion(idx);};bar.appendChild(btn);});updateTabbar();}
function updateTabbar(){document.querySelectorAll('.tab-btn').forEach(btn=>{const g=btn.dataset.group,total=questions.filter(q=>q.강===g).length,done=questions.filter((q,i)=>q.강===g&&answers[i]!==undefined).length;btn.textContent=`${g}(${done}/${total})`;btn.classList.toggle('active',questions[currentIdx]&&questions[currentIdx].강===g);});}

function renderQuestion(){const q=questions[currentIdx];if(!q)return;document.getElementById('q-num-label').textContent=`${currentIdx+1} / ${questions.length} 번 문제 · ${q.강}`;document.getElementById('q-text').textContent=q.text;const qBox=document.getElementById('q-box');if(q.context){qBox.textContent=q.context;qBox.classList.remove('hidden');}else{qBox.classList.add('hidden');}const oa=document.getElementById('options-area');oa.innerHTML='';const nums=['①','②','③','④'],ua=answers[currentIdx];const wrap=document.createElement('div');wrap.className='options';q.opts.forEach((opt,oi)=>{const d=document.createElement('div');d.className='option';d.innerHTML=`<span class="num">${nums[oi]}</span><span>${opt}</span>`;if(ua!==undefined){if(oi===q.ans)d.classList.add('correct');else if(ua===oi&&ua!==q.ans)d.classList.add('wrong');else if(ua===oi)d.classList.add('selected');}else{d.onclick=()=>selectOption(oi);}wrap.appendChild(d);});oa.appendChild(wrap);
const fb=document.getElementById('q-feedback');if(ua!==undefined){const ok=checkCorrect(q,ua);fb.className=`feedback ${ok?'correct-fb':'wrong-fb'}`;fb.textContent=ok?'✓ 정답입니다!':`✗ 오답입니다. 정답: ${nums[q.ans]} ${q.opts[q.ans]}`;}else{fb.className='feedback';}
const origIdx=ALL_QUESTIONS.indexOf(q),bmBtn=document.getElementById('bm-btn');if(bookmarks.has(origIdx)){bmBtn.classList.add('bookmarked');bmBtn.textContent='🔖 책갈피됨';}else{bmBtn.classList.remove('bookmarked');bmBtn.textContent='🔖 책갈피';}
document.getElementById('btn-prev').disabled=currentIdx===0;document.getElementById('btn-next').textContent=currentIdx===questions.length-1?'완료':'다음 ▶';document.getElementById('progress-text').textContent=`${Object.keys(answers).length} / ${questions.length} 문제 응답`;updateTabbar();}

function selectOption(val){if(graded)return;answers[currentIdx]=val;renderQuestion();renderGrid();document.getElementById('progress-text').textContent=`${Object.keys(answers).length} / ${questions.length} 문제 응답`;}
function toggleBookmark(){const q=questions[currentIdx],origIdx=ALL_QUESTIONS.indexOf(q);if(bookmarks.has(origIdx))bookmarks.delete(origIdx);else bookmarks.add(origIdx);saveBookmarks();renderQuestion();renderGrid();}

function renderGrid(){const grid=document.getElementById('q-grid');grid.innerHTML='';const nums=['①','②','③','④'];questions.forEach((q,i)=>{const origIdx=ALL_QUESTIONS.indexOf(q),div=document.createElement('div');div.className='q-dot';const ne=document.createElement('span');ne.className='dot-num';ne.textContent=i+1;div.appendChild(ne);if(answers[i]!==undefined){const ae=document.createElement('span');ae.className='dot-ans';ae.textContent=nums[answers[i]];div.appendChild(ae);}div.onclick=()=>goToQuestion(i);if(graded){if(checkCorrect(q,answers[i]))div.classList.add('correct-dot');else if(answers[i]!==undefined)div.classList.add('wrong-dot');}else{if(answers[i]!==undefined)div.classList.add('answered');}if(bookmarks.has(origIdx))div.classList.add('bookmarked-dot');if(i===currentIdx)div.classList.add('current');grid.appendChild(div);});}

function gradeQuiz(){graded=true;stopTimer();document.getElementById('expand-btn').style.display='none';document.getElementById('expand-all-screen').style.display='none';expandView=false;let correct=0,wrong=0;questions.forEach((q,i)=>{const origIdx=ALL_QUESTIONS.indexOf(q);if(checkCorrect(q,answers[i])){correct++;wrongSet.delete(origIdx);}else{wrong++;wrongSet.add(origIdx);}});saveWrong();const unanswered=questions.length-Object.keys(answers).length,score=Math.round((correct/questions.length)*100);document.getElementById('result-screen').classList.remove('hidden');document.getElementById('quiz-screen').classList.add('hidden');document.getElementById('res-score').textContent=`${score}점`;document.getElementById('res-sub').textContent=`총 ${questions.length}문제 중 ${correct}문제 정답`;document.getElementById('res-c').textContent=correct;document.getElementById('res-w').textContent=wrong+unanswered;document.getElementById('res-b').textContent=bookmarks.size;setHeaderBtns(false,false,true);renderGrid();}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
</script></body></html>
