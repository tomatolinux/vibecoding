<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사회복지법제와실천 예상문제</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --primary: #1a5276;
    --primary-light: #2e86c1;
    --accent: #e74c3c;
    --accent2: #f39c12;
    --bg: #f0f4f8;
    --card: #ffffff;
    --sidebar: #1a3a5c;
    --sidebar-text: #cfe2f3;
    --correct: #1e8449;
    --wrong: #c0392b;
    --bookmark: #e67e22;
    --border: #d5e8f0;
    --text: #1a252f;
    --muted: #7f8c8d;
    --header-h: 56px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  #header {
    background: var(--primary);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    height: var(--header-h);
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    z-index: 100;
  }
  #header .title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  #header .title span { font-weight: 300; font-size: 14px; margin-left: 8px; opacity: 0.8; }
  #header .right-info { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  #header .right-info .tag { background: rgba(255,255,255,0.15); border-radius: 4px; padding: 3px 9px; font-size: 12px; }

  /* 헤더 채점/다시하기 버튼 */
  .header-action-btn {
    padding: 6px 13px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    transition: opacity .15s;
    display: none;
  }
  .header-action-btn:hover { opacity: .85; }
  #btn-header-grade { background: var(--accent); color: #fff; }
  #btn-header-retry { background: var(--bookmark); color: #fff; }
  #btn-header-home  { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); }

  /* ── TAB BAR ── */
  #tabbar {
    background: #eaf2f8;
    border-bottom: 2px solid var(--border);
    display: flex;
    align-items: flex-end;
    padding: 0 20px;
    gap: 4px;
    flex-shrink: 0;
    overflow-x: auto;
  }
  .tab-btn {
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    background: #dce9f5;
    color: var(--primary);
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    white-space: nowrap;
    transition: background .15s;
    flex-shrink: 0;
  }
  .tab-btn.active { background: var(--card); color: var(--primary); font-weight: 700; }

  /* ── BODY LAYOUT ── */
  #body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── MAIN AREA ── */
  #main {
    flex: 1;
    overflow-y: auto;
    padding: 24px 28px;
    position: relative;
  }

  /* ── START SCREEN ── */
  #start-screen {
    max-width: 560px;
    margin: 60px auto;
    background: var(--card);
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    padding: 48px 40px;
    text-align: center;
  }
  #start-screen h2 { font-size: 22px; color: var(--primary); margin-bottom: 8px; }
  #start-screen p { font-size: 14px; color: var(--muted); margin-bottom: 32px; }
  .start-options { display: flex; flex-direction: column; gap: 14px; }
  .start-btn {
    padding: 18px 24px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: #f7fbff;
    cursor: pointer;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    color: var(--primary);
    transition: all .2s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .start-btn:hover { border-color: var(--primary-light); background: #eaf3fb; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.08); }
  .start-btn .icon { font-size: 26px; }
  .start-btn small { display: block; font-size: 12px; font-weight: 400; color: var(--muted); margin-top: 2px; }

  /* ── QUESTION CARD ── */
  .q-num { font-size: 12px; font-weight: 700; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.5px; }
  .q-text {
    font-size: 15px;
    line-height: 1.75;
    font-weight: 500;
    margin-bottom: 20px;
    color: var(--text);
    white-space: pre-line;
  }
  .q-box {
    background: #f8fbfd;
    border-left: 3px solid var(--primary-light);
    border-radius: 4px;
    padding: 14px 16px;
    margin-bottom: 20px;
    font-size: 14px;
    line-height: 1.8;
    color: #1c2e3e;
  }

  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    background: var(--card);
    transition: all .15s;
    font-size: 14px;
    line-height: 1.6;
  }
  .option:hover { border-color: var(--primary-light); background: #eaf3fb; }
  /* 선택된 답: 흰 배경 + 파란 테두리 (일반 선택 상태) */
  .option.selected { border-color: var(--primary); background: #ffffff; }
  .option.correct { border-color: var(--correct); background: #eafaf1; color: var(--correct); }
  .option.wrong { border-color: var(--wrong); background: #fdedec; color: var(--wrong); }
  .option .num { font-weight: 700; min-width: 20px; }

  /* feedback */
  .feedback {
    display: none;
    margin-top: 14px;
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 13.5px;
    font-weight: 600;
    border-left: 3px solid;
  }
  .feedback.correct-fb { display: block; background: #eafaf1; color: var(--correct); border-color: var(--correct); }
  .feedback.wrong-fb { display: block; background: #fdedec; color: var(--wrong); border-color: var(--wrong); }

  /* bottom nav */
  .q-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .nav-btn {
    padding: 9px 22px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--card);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--primary);
    transition: all .15s;
  }
  .nav-btn:hover { background: #eaf3fb; border-color: var(--primary-light); }
  .nav-btn:disabled { opacity: .35; cursor: not-allowed; }
  .nav-btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
  .nav-btn.primary:hover { background: var(--primary-light); }

  .bm-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 16px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--card);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    transition: all .15s;
  }
  .bm-btn.bookmarked { color: var(--bookmark); border-color: var(--bookmark); background: #fef5e7; }
  .bm-btn:hover { border-color: var(--bookmark); color: var(--bookmark); }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 220px;
    background: var(--sidebar);
    overflow-y: auto;
    flex-shrink: 0;
    padding: 16px 12px;
  }
  #sidebar h4 { color: var(--sidebar-text); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; opacity: 0.7; }
  #q-grid { display: flex; flex-direction: column; gap: 4px; }
  .q-dot {
    width: 100%;
    border-radius: 5px;
    background: rgba(255,255,255,0.1);
    display: flex;
    flex-direction: row;
    align-items: center;
    padding: 7px 10px;
    font-size: 12px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: all .15s;
    border: 1.5px solid transparent;
  }
  .q-dot:hover { background: rgba(255,255,255,0.2); }
  /* 현재 문제: 엷은 파란 배경 */
  .q-dot.current { border-color: #7fb3d3; color: #fff; background: rgba(100,180,255,0.25); }
  /* 답 선택됨: 흰색 계열 강조 */
  .q-dot.answered { background: rgba(255,255,255,0.22); color: #fff; border-color: rgba(255,255,255,0.35); }
  .q-dot.bookmarked-dot { background: rgba(230,126,34,0.35); border-color: var(--bookmark); color: #f0a500; }
  .q-dot.correct-dot { background: rgba(30,132,73,0.4); color: #82e0aa; }
  .q-dot.wrong-dot { background: rgba(192,57,43,0.45); color: #f1948a; }

  .q-dot .dot-num { min-width: 26px; font-weight: 700; color: rgba(255,255,255,0.75); font-size: 11px; }
  /* 선택된 답 표시: 흰색 배경 작은 뱃지 */
  .q-dot .dot-ans {
    font-size: 12px;
    margin-left: 4px;
    background: rgba(255,255,255,0.85);
    color: var(--sidebar);
    border-radius: 3px;
    padding: 1px 5px;
    font-weight: 700;
  }

  /* result screen */
  #result-screen {
    max-width: 580px;
    margin: 40px auto;
    background: var(--card);
    border-radius: 14px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    padding: 40px 36px;
    text-align: center;
  }
  #result-screen h2 { font-size: 24px; color: var(--primary); margin-bottom: 6px; }
  .score-big { font-size: 64px; font-weight: 700; color: var(--primary); line-height: 1; margin: 20px 0 8px; }
  .score-sub { font-size: 15px; color: var(--muted); margin-bottom: 24px; }
  .result-grid { display: flex; gap: 16px; justify-content: center; margin-bottom: 28px; }
  .result-stat { flex: 1; padding: 16px; border-radius: 10px; }
  .result-stat.c { background: #eafaf1; color: var(--correct); }
  .result-stat.w { background: #fdedec; color: var(--wrong); }
  .result-stat.b { background: #fef5e7; color: var(--bookmark); }
  .result-stat .label { font-size: 12px; margin-bottom: 4px; }
  .result-stat .val { font-size: 28px; font-weight: 700; }
  .result-actions { display: flex; flex-direction: column; gap: 10px; }
  .result-actions button {
    padding: 14px; border-radius: 8px; border: none;
    cursor: pointer; font-family: inherit;
    font-size: 14px; font-weight: 700; transition: opacity .15s;
  }
  .result-actions button:hover { opacity: .85; }
  .btn-a { background: var(--accent); color: #fff; }
  .btn-b { background: var(--bookmark); color: #fff; }
  .btn-c { background: var(--primary); color: #fff; }
  .btn-d { background: #ecf0f1; color: var(--text); }

  .hidden { display: none !important; }

  /* ── EXPAND ALL VIEW ── */
  #expand-all-screen { display: none; padding: 24px 28px; }
  .all-q-card {
    background: var(--card);
    border-radius: 10px;
    border: 1.5px solid var(--border);
    padding: 20px 22px;
    margin-bottom: 18px;
  }
  .all-q-card .q-num { font-size: 12px; color: var(--muted); margin-bottom: 6px; font-weight: 700; }
  .all-q-card .q-text { font-size: 14px; font-weight: 600; margin-bottom: 14px; line-height: 1.7; white-space: pre-line; }
  .all-q-card .q-box { margin-bottom: 14px; }
  .all-q-card .options { gap: 7px; }
  .all-q-card .option { padding: 9px 13px; font-size: 13px; }

  /* timer */
  #timer-box { display: none; }
  .timer-danger { color: #ff6b6b !important; animation: blink .8s step-end infinite; }
  @keyframes blink { 50% { opacity: .4; } }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: #b0c4d8; border-radius: 3px; }
</style>
</head>
<body>

<div id="header">
  <div class="title">사회복지법제와실천 <span>예상문제</span></div>
  <div class="right-info">
    <span class="tag" id="mode-tag">모드 선택 중</span>
    <span id="progress-text" style="font-size:13px;opacity:.85"></span>
    <div id="timer-box" style="display:none;align-items:center;gap:8px;background:rgba(255,255,255,0.12);border-radius:6px;padding:4px 12px;">
      <span style="font-size:11px;opacity:.8;line-height:1.3;">남은<br>시간</span>
      <span id="timer-display" style="font-size:20px;font-weight:700;letter-spacing:1px;font-variant-numeric:tabular-nums;">20:00</span>
    </div>
    <!-- 헤더 우상단 채점/다시하기/홈 버튼 -->
    <button id="btn-header-grade" class="header-action-btn" onclick="gradeQuiz()">📊 채점하기</button>
    <button id="btn-header-retry" class="header-action-btn" onclick="retryQuiz()">🔄 다시하기</button>
    <button id="btn-header-home"  class="header-action-btn" onclick="showStart()">🏠 처음으로</button>
    <button id="expand-btn" onclick="toggleExpandView()" title="전체 문제 보기" style="display:none;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.3);border-radius:6px;color:#fff;width:38px;height:38px;font-size:20px;cursor:pointer;align-items:center;justify-content:center;flex-shrink:0;">⇅</button>
  </div>
</div>

<div id="tabbar" class="hidden"></div>

<div id="body">
  <div id="main">
    <!-- Start Screen -->
    <div id="start-screen">
      <h2>⚖️ 사회복지법제와실천</h2>
      <p>1강~15강 예상문제 · 총 <span id="total-count"></span>문항</p>
      <div class="start-options">
        <button class="start-btn" onclick="startQuiz('random')">
          <span class="icon">🎲</span>
          <div>랜덤 30문제<small>전체 문제 중 무작위로 30문항 출제 · ⏱ 20분 제한</small></div>
        </button>
        <button class="start-btn" onclick="startQuiz('all')">
          <span class="icon">📋</span>
          <div>전체 문제 풀기<small>1강부터 15강까지 전체 문항 · 시간 제한 없음</small></div>
        </button>
        <button class="start-btn" onclick="startQuiz('bookmark')">
          <span class="icon">🔖</span>
          <div>책갈피 문제만 풀기<small>저장된 책갈피 문제만 출제</small></div>
        </button>
        <button class="start-btn" onclick="startQuiz('wrong')">
          <span class="icon">❌</span>
          <div>틀린 문제만 다시 풀기<small>이전 채점에서 틀린 문제만 출제</small></div>
        </button>
      </div>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="hidden">
      <div class="q-num" id="q-num-label"></div>
      <div class="q-text" id="q-text"></div>
      <div class="q-box hidden" id="q-box"></div>
      <div id="options-area"></div>
      <div class="feedback" id="q-feedback"></div>
      <div class="q-nav">
        <button class="nav-btn" id="btn-prev" onclick="navigate(-1)">◀ 이전</button>
        <div style="display:flex;gap:10px;">
          <button class="bm-btn" id="bm-btn" onclick="toggleBookmark()">🔖 책갈피</button>
        </div>
        <button class="nav-btn primary" id="btn-next" onclick="navigate(1)">다음 ▶</button>
      </div>
    </div>

    <!-- Expand All Screen -->
    <div id="expand-all-screen"></div>

    <!-- Result Screen -->
    <div id="result-screen" class="hidden">
      <h2>🎉 채점 결과</h2>
      <div class="score-big" id="res-score"></div>
      <div class="score-sub" id="res-sub"></div>
      <div class="result-grid">
        <div class="result-stat c"><div class="label">✅ 정답</div><div class="val" id="res-c"></div></div>
        <div class="result-stat w"><div class="label">❌ 오답</div><div class="val" id="res-w"></div></div>
        <div class="result-stat b"><div class="label">🔖 책갈피</div><div class="val" id="res-b"></div></div>
      </div>
      <div class="result-actions">
        <button class="btn-a" onclick="startQuiz('wrong')">❌ 틀린 문제만 다시 풀기</button>
        <button class="btn-b" onclick="startQuiz('bookmark')">🔖 책갈피 문제 풀기</button>
        <button class="btn-c" onclick="startQuiz('all')">📋 전체 문제 다시 풀기</button>
        <button class="btn-d" onclick="showStart()">🏠 처음으로</button>
      </div>
    </div>
  </div>

  <div id="sidebar" class="hidden">
    <h4>문제 현황</h4>
    <div id="q-grid"></div>
  </div>
</div>

<script>

const ALL_QUESTIONS = [
  {"강": "1강", "n": 1, "text": "사회복지법을 공부한 사회복지 실천가의 역할이 아닌 것은?", "type": "mc", "opts": ["합법적으로 주어진 전문가적 재량권 발휘", "새로운 사회복지정책과 프로그램 수립", "장기적으로 사회복지기관 경영자로서의 역량을 갖춤", "법을 위반한 사람의 재판을 진행"], "ans": 3},
  {"강": "1강", "n": 2, "text": "사회복지 실천가가 사회복지법을 공부해야 하는 이유로 볼 수 없는 것은?", "type": "mc", "opts": ["보다 나은 사회복지정책 수립에 기여", "법적 심판자의 역할 준비", "전문가적 재량권 발휘", "슈퍼바이저로서의 역량을 갖춤"], "ans": 1},
  {"강": "1강", "n": 3, "text": "사회복지 실천가가 사회복지법을 학습해야 하는 이유가 아닌 것은?", "type": "mc", "opts": ["사회복지서비스 내용 파악", "법을 위반한 사람의 재판 진행", "보다 나은 사회복지정책 수립에 기여", "권리로서의 사회복지 이해"], "ans": 1},
  {"강": "1강", "n": 4, "text": "법의 이념으로 적절하지 않은 것은?", "type": "mc", "opts": ["합목적성", "봉사", "법적 안정성", "정의"], "ans": 1},
  {"강": "1강", "n": 5, "text": "법의 이념으로 볼 수 없는 것은?", "type": "mc", "opts": ["정의", "합목적성", "법적 안정성", "경쟁"], "ans": 3},
  {"강": "1강", "n": 6, "text": "'국가의 법질서가 어떠한 표준과 가치관에 의하여 구체적으로 제정되고 실시되는 원리'로 설명할 수 있는 법의 이념은?", "type": "mc", "opts": ["합목적성", "법적안정성", "정의", "공공복지"], "ans": 0},

  {"강": "15강", "n": 4, "text": "다음 중 긴급복지지원법상 '위기상황'에 해당하지 않는 것은 무엇인가?", "type": "mc", "opts": ["중한 질병 또는 부상을 당한 경우", "이혼한 경우", "주소득자가 구금시설에 수용되는 등의 사유로 소득을 상실한 경우", "화재 등으로 거주하는 주택에서 생활하기 곤란하게 된 경우"], "ans": 1},
  {"강": "15강", "n": 5, "text": "「긴급복지지원법」에서 정하고 있는 생계유지 등에 필요한 기본적인 긴급지원 기간은?", "type": "mc", "opts": ["2개월", "1개월", "1일", "3개월"], "ans": 1},
  {"강": "15강", "n": 6, "text": "「긴급복지지원법」상 위기상황에 해당하지 않은 것은?", "type": "mc", "opts": ["주 소득자의 사망으로 생계유지 등이 어렵게 된 경우", "주 소득자의 중한 질병 또는 부상으로 생계유지 등이 어렵게 된 경우", "주 소득자가 화재를 당해 생계유지 등이 어렵게 된 경우", "주 소득자가 이혼을 하여 생계유지 등이 어렵게 된 경우"], "ans": 3},
  {"강": "15강", "n": 7, "text": "「긴급복지지원법」에 대한 설명으로 옳지 않은 것은?", "type": "mc", "opts": ["급변하는 사회의 새로운 문제에 대응하여 제정된 법이다.", "위기상황에 처한 사람에게 신속하게 지원하는 것을 원칙으로 한다.", "긴급지원대상자 발견 시 관할 시장·군수·구청장에게 이 사실을 신고하여야 한다.", "생계유지 등에 필요한 긴급지원 기간은 3개월이다."], "ans": 3},
  {"강": "15강", "n": 8, "text": "「긴급복지지원법」에 대한 설명으로 옳은 것은?", "type": "mc", "opts": ["기존 관련 법률에서 지원할 수 있는 사람이나 문제는 제외하는 것이 원칙이다.", "생계유지 등에 필요한 긴급지원 기간은 6개월이다.", "긴급지원 종류에는 금전지원만 있다.", "동 법은 2015년에 제정되었다."], "ans": 3}
];

document.getElementById('total-count').textContent = ALL_QUESTIONS.length;

// ==============================
// STATE
// ==============================
let questions = [];
let currentIdx = 0;
let answers = {};
let bookmarks = new Set(JSON.parse(localStorage.getItem('sw_law_bm') || '[]'));
let wrongSet = new Set(JSON.parse(localStorage.getItem('sw_law_wrong') || '[]'));
let graded = false;
let currentMode = '';
let expandView = false;

// ── TIMER ──
let timerInterval = null;
let timerSeconds = 20 * 60;

function startTimer() {
  clearInterval(timerInterval);
  timerSeconds = 20 * 60;
  updateTimerDisplay();
  const box = document.getElementById('timer-box');
  box.style.display = 'flex';
  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      alert('⏰ 시험 시간이 종료되었습니다!');
      gradeQuiz();
    }
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  document.getElementById('timer-box').style.display = 'none';
}

function updateTimerDisplay() {
  const m = Math.floor(timerSeconds / 60);
  const s = timerSeconds % 60;
  const txt = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const el = document.getElementById('timer-display');
  el.textContent = txt;
  el.className = timerSeconds <= 60 ? 'timer-danger' : '';
}

// ── EXPAND / COLLAPSE ──
function toggleExpandView() {
  expandView = !expandView;
  const btn = document.getElementById('expand-btn');
  const quizScreen = document.getElementById('quiz-screen');
  const expandScreen = document.getElementById('expand-all-screen');
  if (expandView) {
    btn.textContent = '⊟';
    btn.title = '한 문제씩 보기';
    quizScreen.classList.add('hidden');
    expandScreen.style.display = 'block';
    renderExpandAll();
  } else {
    btn.textContent = '⇅';
    btn.title = '전체 문제 보기';
    expandScreen.style.display = 'none';
    quizScreen.classList.remove('hidden');
    renderQuestion();
  }
}

function renderExpandAll() {
  const screen = document.getElementById('expand-all-screen');
  screen.innerHTML = '';
  const nums = ['①','②','③','④'];
  questions.forEach((q, i) => {
    const card = document.createElement('div');
    card.className = 'all-q-card';
    card.id = `all-q-${i}`;

    const numDiv = document.createElement('div');
    numDiv.className = 'q-num';
    numDiv.textContent = `${i + 1} / ${questions.length} 번 문제 · ${q.강}`;
    card.appendChild(numDiv);

    const textDiv = document.createElement('div');
    textDiv.className = 'q-text';
    textDiv.textContent = q.text;
    card.appendChild(textDiv);

    if (q.context) {
      const box = document.createElement('div');
      box.className = 'q-box';
      box.textContent = q.context;
      card.appendChild(box);
    }

    const optsArea = document.createElement('div');
    optsArea.className = 'options';
    q.opts.forEach((opt, oi) => {
      const div = document.createElement('div');
      div.className = 'option';
      div.innerHTML = `<span class="num">${nums[oi]}</span><span>${opt}</span>`;
      if (answers[i] !== undefined) {
        if (oi === q.ans) div.classList.add('correct');
        else if (answers[i] === oi && answers[i] !== q.ans) div.classList.add('wrong');
        else if (answers[i] === oi) div.classList.add('selected');
      } else {
        if (!graded) div.onclick = () => { answers[i] = oi; renderExpandAll(); renderGrid(); };
      }
      optsArea.appendChild(div);
    });
    card.appendChild(optsArea);

    if (answers[i] !== undefined) {
      const fb = document.createElement('div');
      const ok = checkCorrect(q, answers[i]);
      fb.className = `feedback ${ok ? 'correct-fb' : 'wrong-fb'}`;
      if (ok) fb.textContent = '✓ 정답입니다!';
      else {
        fb.textContent = `✗ 오답입니다. 정답: ${nums[q.ans]} ${q.opts[q.ans]}`;
      }
      card.appendChild(fb);
    }

    screen.appendChild(card);
  });
}

function saveBookmarks() { localStorage.setItem('sw_law_bm', JSON.stringify([...bookmarks])); }
function saveWrong() { localStorage.setItem('sw_law_wrong', JSON.stringify([...wrongSet])); }

function checkCorrect(q, ua) {
  return parseInt(ua) === q.ans;
}

// ==============================
// NAVIGATION
// ==============================
function showStart() {
  document.getElementById('start-screen').classList.remove('hidden');
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('expand-all-screen').style.display = 'none';
  document.getElementById('tabbar').classList.add('hidden');
  document.getElementById('sidebar').classList.add('hidden');
  document.getElementById('mode-tag').textContent = '모드 선택 중';
  document.getElementById('progress-text').textContent = '';
  document.getElementById('expand-btn').style.display = 'none';
  setHeaderBtns(false, false, false);
  stopTimer();
  graded = false; answers = {}; questions = []; currentIdx = 0; expandView = false;
}

function setHeaderBtns(grade, retry, home) {
  document.getElementById('btn-header-grade').style.display = grade ? 'inline-block' : 'none';
  document.getElementById('btn-header-retry').style.display = retry ? 'inline-block' : 'none';
  document.getElementById('btn-header-home').style.display = home ? 'inline-block' : 'none';
}

function retryQuiz() {
  if (!confirm('다시 풀기 하면 현재 답이 초기화됩니다. 계속하시겠습니까?')) return;
  startQuiz(currentMode);
}

function startQuiz(mode) {
  currentMode = mode;
  graded = false; answers = {}; currentIdx = 0; expandView = false;
  let useTimer = false;

  if (mode === 'random') {
    questions = shuffle([...ALL_QUESTIONS]).slice(0, 30);
    document.getElementById('mode-tag').textContent = '랜덤 30문제';
    useTimer = true;
  } else if (mode === 'all') {
    questions = [...ALL_QUESTIONS];
    document.getElementById('mode-tag').textContent = `전체 ${ALL_QUESTIONS.length}문제`;
    useTimer = false;
  } else if (mode === 'bookmark') {
    const bmIds = [...bookmarks];
    questions = ALL_QUESTIONS.filter((_, i) => bmIds.includes(i));
    if (questions.length === 0) { alert('📌 책갈피된 문제가 없습니다.'); return; }
    document.getElementById('mode-tag').textContent = `책갈피 ${questions.length}문제`;
    useTimer = false;
  } else if (mode === 'wrong') {
    questions = [...wrongSet].map(i => ALL_QUESTIONS[i]).filter(Boolean);
    if (questions.length === 0) { alert('✅ 틀린 문제가 없습니다!'); return; }
    document.getElementById('mode-tag').textContent = `오답 ${questions.length}문제`;
    useTimer = false;
  }

  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('result-screen').classList.add('hidden');
  document.getElementById('expand-all-screen').style.display = 'none';
  document.getElementById('quiz-screen').classList.remove('hidden');
  document.getElementById('tabbar').classList.remove('hidden');
  document.getElementById('sidebar').classList.remove('hidden');
  document.getElementById('expand-btn').style.display = 'flex';
  document.getElementById('expand-btn').textContent = '⇅';
  setHeaderBtns(true, true, true);

  if (useTimer) {
    startTimer();
  } else {
    stopTimer();
  }

  buildTabbar();
  renderQuestion();
  renderGrid();
}

function navigate(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= questions.length) return;
  currentIdx = newIdx;
  renderQuestion();
  renderGrid();
}

function goToQuestion(i) {
  if (expandView) {
    const card = document.getElementById(`all-q-${i}`);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    currentIdx = i; renderGrid(); return;
  }
  currentIdx = i; renderQuestion(); renderGrid();
}

// ── TABBAR (강 단위) ──
function buildTabbar() {
  const bar = document.getElementById('tabbar');
  bar.innerHTML = '';
  const groups = [...new Set(questions.map(q => q.강))];
  groups.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'tab-btn';
    btn.dataset.group = g;
    btn.onclick = () => {
      const idx = questions.findIndex(q => q.강 === g);
      if (idx >= 0) goToQuestion(idx);
    };
    bar.appendChild(btn);
  });
  updateTabbar();
}

function updateTabbar() {
  const groups = [...new Set(questions.map(q => q.강))];
  document.querySelectorAll('.tab-btn').forEach(btn => {
    const g = btn.dataset.group;
    const total = questions.filter(q => q.강 === g).length;
    const done = questions.filter((q, idx) => q.강 === g && answers[idx] !== undefined).length;
    btn.textContent = `${g} (${done}/${total})`;
    btn.classList.toggle('active', questions[currentIdx] && questions[currentIdx].강 === g);
  });
}

// ==============================
// RENDER QUESTION
// ==============================
function renderQuestion() {
  const q = questions[currentIdx];
  if (!q) return;

  document.getElementById('q-num-label').textContent = `${currentIdx + 1} / ${questions.length} 번 문제 · ${q.강}`;
  document.getElementById('q-text').textContent = q.text;

  const qBox = document.getElementById('q-box');
  if (q.context) { qBox.textContent = q.context; qBox.classList.remove('hidden'); }
  else { qBox.classList.add('hidden'); }

  const optsArea = document.getElementById('options-area');
  optsArea.innerHTML = '';

  const nums = ['①','②','③','④'];
  const ua = answers[currentIdx];

  const wrap = document.createElement('div');
  wrap.className = 'options';
  q.opts.forEach((opt, oi) => {
    const div = document.createElement('div');
    div.className = 'option';
    div.innerHTML = `<span class="num">${nums[oi]}</span><span>${opt}</span>`;
    if (ua !== undefined) {
      if (oi === q.ans) div.classList.add('correct');
      else if (ua === oi && ua !== q.ans) div.classList.add('wrong');
      else if (ua === oi) div.classList.add('selected');
    } else {
      div.onclick = () => selectOption(oi);
    }
    wrap.appendChild(div);
  });
  optsArea.appendChild(wrap);

  // feedback
  const fb = document.getElementById('q-feedback');
  if (ua !== undefined) {
    const ok = checkCorrect(q, ua);
    fb.className = `feedback ${ok ? 'correct-fb' : 'wrong-fb'}`;
    if (ok) fb.textContent = '✓ 정답입니다!';
    else {
      fb.textContent = `✗ 오답입니다. 정답: ${nums[q.ans]} ${q.opts[q.ans]}`;
    }
  } else {
    fb.className = 'feedback';
  }

  // bookmark
  const origIdx = ALL_QUESTIONS.indexOf(q);
  const bmBtn = document.getElementById('bm-btn');
  if (bookmarks.has(origIdx)) { bmBtn.classList.add('bookmarked'); bmBtn.textContent = '🔖 책갈피됨'; }
  else { bmBtn.classList.remove('bookmarked'); bmBtn.textContent = '🔖 책갈피'; }

  document.getElementById('btn-prev').disabled = currentIdx === 0;
  document.getElementById('btn-next').textContent = currentIdx === questions.length - 1 ? '완료' : '다음 ▶';

  const answered = Object.keys(answers).length;
  document.getElementById('progress-text').textContent = `${answered} / ${questions.length} 문제 응답`;

  updateTabbar();
}

function selectOption(val) {
  if (graded) return;
  answers[currentIdx] = val;
  renderQuestion();
  renderGrid();
  document.getElementById('progress-text').textContent = `${Object.keys(answers).length} / ${questions.length} 문제 응답`;
}

function toggleBookmark() {
  const q = questions[currentIdx];
  const origIdx = ALL_QUESTIONS.indexOf(q);
  if (bookmarks.has(origIdx)) bookmarks.delete(origIdx);
  else bookmarks.add(origIdx);
  saveBookmarks();
  renderQuestion();
  renderGrid();
}

// ==============================
// RENDER GRID
// ==============================
function renderGrid() {
  const grid = document.getElementById('q-grid');
  grid.innerHTML = '';
  const nums = ['①','②','③','④'];
  questions.forEach((q, i) => {
    const origIdx = ALL_QUESTIONS.indexOf(q);
    const div = document.createElement('div');
    div.className = 'q-dot';

    const numEl = document.createElement('span');
    numEl.className = 'dot-num';
    numEl.textContent = i + 1;
    div.appendChild(numEl);

    if (answers[i] !== undefined) {
      const ansEl = document.createElement('span');
      ansEl.className = 'dot-ans';
      ansEl.textContent = nums[answers[i]];
      div.appendChild(ansEl);
    }

    div.onclick = () => goToQuestion(i);

    // 우선순위: current > correct/wrong (채점 후) > answered > bookmark
    if (graded) {
      if (checkCorrect(q, answers[i])) div.classList.add('correct-dot');
      else if (answers[i] !== undefined) div.classList.add('wrong-dot');
    } else {
      if (answers[i] !== undefined) div.classList.add('answered');
    }
    if (bookmarks.has(origIdx)) div.classList.add('bookmarked-dot');
    if (i === currentIdx) div.classList.add('current');

    grid.appendChild(div);
  });
}

// ==============================
// GRADE
// ==============================
function gradeQuiz() {
  graded = true;
  stopTimer();
  document.getElementById('expand-btn').style.display = 'none';
  document.getElementById('expand-all-screen').style.display = 'none';
  expandView = false;

  let correct = 0, wrong = 0;
  questions.forEach((q, i) => {
    const origIdx = ALL_QUESTIONS.indexOf(q);
    if (checkCorrect(q, answers[i])) { correct++; wrongSet.delete(origIdx); }
    else { wrong++; wrongSet.add(origIdx); }
  });
  saveWrong();

  const unanswered = questions.length - Object.keys(answers).length;
  const score = Math.round((correct / questions.length) * 100);

  document.getElementById('result-screen').classList.remove('hidden');
  document.getElementById('quiz-screen').classList.add('hidden');
  document.getElementById('res-score').textContent = `${score}점`;
  document.getElementById('res-sub').textContent = `총 ${questions.length}문제 중 ${correct}문제 정답`;
  document.getElementById('res-c').textContent = correct;
  document.getElementById('res-w').textContent = wrong + unanswered;
  document.getElementById('res-b').textContent = bookmarks.size;
  setHeaderBtns(false, false, true);
  renderGrid();
}

// ==============================
// UTILS
// ==============================
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}
